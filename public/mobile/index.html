  /* ─── Live search (oninput) ─── */
  _ivTimeout: null,
  async validateIvInput(q) {
    clearTimeout(this._ivTimeout);
    const sug  = document.getElementById('m-iv-suggestions');
    const list = document.getElementById('m-iv-suggestions-list');
    if (!q || q.length < 1) { sug.style.display = 'none'; return; }

    if (!this._curLoc) {
      /* ── Modo ubicación ── */
      this._ivTimeout = setTimeout(async () => {
        try {
          const r    = await mApi('GET', '/param/ubicaciones?codigo=' + encodeURIComponent(q));
          const locs = Array.isArray(r.data) ? r.data : [];
          if (!locs.length) { sug.style.display = 'none'; return; }
          /* auto-select si hay único match exacto */
          const norm = this._ubicNorm(q);
          const exact = locs.filter(l => this._ubicNorm(l.codigo) === norm);
          if (exact.length === 1) { this.selectIvLocation(exact[0]); return; }
          list.innerHTML = locs.slice(0, 8).map(l => `
            <div onclick="MWMS.selectIvLocation(${JSON.stringify(l).replace(/"/g,'&quot;')})"
                 style="padding:10px 12px;border-bottom:1px solid #f1f5f9;display:flex;justify-content:space-between;align-items:center;cursor:pointer;">
              <div>
                <span style="font-weight:700;color:#1e293b;font-size:.82rem;">${this.esc(l.codigo)}</span>
                <span style="font-size:.65rem;color:#64748b;margin-left:6px;">${this.esc(l.zona||'')}</span>
              </div>
              <span style="font-size:.62rem;background:#f1f5f9;padding:2px 6px;border-radius:10px;color:#475569;">${this.esc(l.tipo_ubicacion||'')}</span>
            </div>`).join('');
          sug.style.display = 'block';
        } catch(e) { console.error(e); }
      }, 350);
    } else {
      /* ── Modo producto ── */
      this._ivTimeout = setTimeout(async () => {
        try {
          const r     = await mApi('GET', '/param/productos/buscar?q=' + encodeURIComponent(q) + '&limit=8');
          const prods = Array.isArray(r.data) ? r.data : [];
          if (!prods.length) { sug.style.display = 'none'; return; }
          list.innerHTML = prods.map(p => `
            <div onclick="MWMS._selectIvProd(${JSON.stringify({id:p.id,nombre:p.nombre,codigo_interno:p.codigo_interno,codigo_ean:p.codigo_ean,unidades_caja:p.unidades_caja,unidad_contenido:p.unidad_contenido,factor_udm:p.factor_udm,controla_vencimiento:p.controla_vencimiento}).replace(/"/g,'&quot;')})"
                 style="padding:10px 12px;border-bottom:1px solid #f1f5f9;cursor:pointer;">
              <div style="font-weight:700;color:#1e293b;font-size:.82rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${this.esc(p.nombre)}</div>
              <div style="font-size:.65rem;color:#64748b;margin-top:2px;">
                Ref: ${this.esc(p.codigo_interno||'-')}
                ${p.codigo_ean ? `&nbsp;·&nbsp;EAN: ${this.esc(p.codigo_ean)}` : ''}
              </div>
            </div>`).join('');
          sug.style.display = 'block';
        } catch(e) { console.error(e); }
      }, 350);
    }
  },

  /* ─── Confirmar con botón (Enter/check) ─── */
  async doIv() {
    const inp = document.getElementById('m-iv-scan');
    const q   = (inp?.value || '').trim();
    const sug = document.getElementById('m-iv-suggestions');
    sug.style.display = 'none';
    if (!q) return;

    this.loading(true);
    try {
      if (!this._curLoc) {
        /* Buscar ubicación */
        const r    = await mApi('GET', '/param/ubicaciones?codigo=' + encodeURIComponent(q));
        const locs = Array.isArray(r.data) ? r.data : [];
        if (locs.length === 1) {
          this.selectIvLocation(locs[0]);
        } else if (locs.length > 1) {
          const norm  = this._ubicNorm(q);
          const exact = locs.filter(l => this._ubicNorm(l.codigo) === norm);
          if (exact.length === 1) { this.selectIvLocation(exact[0]); return; }
          const list = document.getElementById('m-iv-suggestions-list');
          list.innerHTML = locs.map(l => `
            <div onclick="MWMS.selectIvLocation(${JSON.stringify(l).replace(/"/g,'&quot;')})"
                 style="padding:10px 12px;border-bottom:1px solid #f1f5f9;display:flex;justify-content:space-between;align-items:center;cursor:pointer;">
              <div>
                <span style="font-weight:700;color:#1e293b;font-size:.82rem;">${this.esc(l.codigo)}</span>
                <span style="font-size:.65rem;color:#64748b;margin-left:6px;">${this.esc(l.zona||'')}</span>
              </div>
              <span style="font-size:.62rem;background:#f1f5f9;padding:2px 6px;border-radius:10px;color:#475569;">${this.esc(l.tipo_ubicacion||'')}</span>
            </div>`).join('');
          sug.style.display = 'block';
        } else {
          this.toast('Ubicación no encontrada', 'error');
        }
      } else {
        /* Buscar producto */
        const r     = await mApi('GET', '/param/productos/buscar?q=' + encodeURIComponent(q) + '&limit=8');
        const prods = Array.isArray(r.data) ? r.data : [];
        if (prods.length === 1) {
          this._selectIvProd(prods[0]);
        } else if (prods.length > 1) {
          const list = document.getElementById('m-iv-suggestions-list');
          list.innerHTML = prods.map(p => `
            <div onclick="MWMS._selectIvProd(${JSON.stringify({id:p.id,nombre:p.nombre,codigo_interno:p.codigo_interno,codigo_ean:p.codigo_ean,unidades_caja:p.unidades_caja,unidad_contenido:p.unidad_contenido,factor_udm:p.factor_udm,controla_vencimiento:p.controla_vencimiento}).replace(/"/g,'&quot;')})"
                 style="padding:10px 12px;border-bottom:1px solid #f1f5f9;cursor:pointer;">
              <div style="font-weight:700;color:#1e293b;font-size:.82rem;">${this.esc(p.nombre)}</div>
              <div style="font-size:.65rem;color:#64748b;">Ref: ${this.esc(p.codigo_interno||'-')} ${p.codigo_ean?'· EAN: '+this.esc(p.codigo_ean):''}</div>
            </div>`).join('');
          sug.style.display = 'block';
        } else {
          this.toast('Producto no reconocido', 'error');
          inp.value = ''; inp.focus();
        }
      }
    } catch(e) { this.toast(e.message, 'error'); }
    finally { this.loading(false); }
  },

    document.getElementById('m-iv-suggestions').style.display = 'none';
    this._submitIvConteo(p);
  },

  startNotif() { this.chkN(); if(this._timer) clearInterval(this._timer); this._timer=setInterval(()=>this.chkN(),15000); },
  async chkN() {
    if(!_mUser) return;
    try {
      const r=await mApi('GET','/notificaciones/badge'); 
      const c = parseInt(r.badge || 0);
      const b=document.getElementById('m-notif-badge'), b2=document.getElementById('nav-badge');
      if(c>0) { 
        b.textContent=c; b.classList.remove('hidden'); 
        b2.textContent=c; b2.classList.remove('hidden'); 
        if(c>this._lastCnt) { this.pA(); b2.classList.add('pulse'); setTimeout(()=>b2.classList.remove('pulse'),2000); }
      } else { b.classList.add('hidden'); b2.classList.add('hidden'); }
      this._lastCnt=c;
    } catch(e){}
  },

  async finalizarTarea(id, btn) {
    btn.disabled = true;
    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';
    try {
      await mApi('PUT', '/notificaciones/' + id + '/completar', {});
      this.toast('Tarea marcada como completada', 'success');
      const card = btn.closest('div[style*="border-radius:12px"]');
      if (card) { card.style.transition = 'opacity .3s'; card.style.opacity = '0'; setTimeout(() => card.remove(), 300); }

  async opT(id, mod) {
    try {
      await mApi('PUT', '/notificaciones/' + id + '/leer');
      this.chkN();
      if (mod === 'Recepcion') this.viewRecO();
      else if (mod === 'Picking') this.viewPicking();
      else if (mod === 'inventario') this.viewInventario();
      else this.showHome();
    } catch(e) { this.toast(e.message, 'error'); }
  },

  async saveCita() {
    const proveedor = document.getElementById('m-cita-proveedor').value.trim();
    const fecha = document.getElementById('m-cita-fecha').value;
    const hora = document.getElementById('m-cita-hora').value;

    const vehiculo = document.getElementById('m-cita-vehiculo').value.trim();

      return this.toast('Proveedor, fecha y hora son requeridos', 'error');

        proveedor,
        fecha,
        hora_programada: hora,
        cantidad_cajas: parseInt(cajas) || 0,
        tipo_vehiculo: vehiculo || null,

      });

  async completeCita(id) {
    const evaluacion = prompt('Evalúe al proveedor (1-10):', '8');
    if (!evaluacion || isNaN(evaluacion) || parseInt(evaluacion) < 1 || parseInt(evaluacion) > 10) {
      return this.toast('Evaluación debe ser de 1 a 10', 'error');
    }
    this.loading(true);
    try {
      const now = new Date();
      const hora = now.toTimeString().split(' ')[0];
      await mApi('POST', `/citas/${id}`, {
        estado: 'Completada',
        hora_fin_descargue: hora,
        evaluacion_proveedor: parseInt(evaluacion)
      });
      this.toast('Cita completada con evaluación', 'success');
      this.viewCitas();
    } catch(e) { this.toast(e.message, 'error'); }
    this.loading(false);
  },

        <div style="display:flex;align-items:center;gap:8px;">
          <input id="swal-tolerancia" type="number" value="${actual}" min="0" max="100" step="1"
            style="flex:1;border:2px solid #0F4C81;border-radius:8px;padding:10px;font-size:1.5rem;font-weight:900;text-align:center;">
          <span style="font-size:1.5rem;font-weight:700;color:#64748b;">%</span>
        </div>`,
      showCancelButton: true,
      confirmButtonText: 'Guardar',
      cancelButtonText: 'Cancelar',
      confirmButtonColor: '#0F4C81',
      preConfirm: () => {
        const v = parseFloat(document.getElementById('swal-tolerancia').value);
        if (isNaN(v) || v < 0 || v > 100) {
          Swal.showValidationMessage('Ingrese un valor entre 0 y 100');
          return false;
        }
        return v;
      },
    });
    if (!isConfirmed || value === false) return;
    try {
      await mApi('PUT', '/picking/parametros', { tolerancia_bajo_picking: value });
      this._toleranciaBajoPicking = value;
      this.toast(`Tolerancia actualizada a ${value}%`, 'success');
      this.viewPicking();
    } catch(e) {
      this.toast(e.message || 'Error al guardar', 'error');
    }
  },

  _shortUbic(codigo) {
    if (!codigo) return null;
    const i = codigo.indexOf('/');
    if (i < 0) return codigo;
    const ABREV = { CONGELACION: 'CONG', REFRIGERACION: 'REF', SECO: 'SECO', PATIO: 'PAT' };
    const zona = ABREV[codigo.substring(0, i).toUpperCase()] || codigo.substring(0, 4);
    return zona + codigo.substring(i);
  },

  async iniciarPicking(numero) {
    this.loading(true);
    try {
      await mApi('POST', `/picking/planilla/${numero}/iniciar`);
      this.toast("Picking iniciado", "success");
      this.viewPlanilla(numero);
    } catch(e) { this.toast(e.message, "error"); }
    this.loading(false);
  },

  async finalizarPicking(numero) {
    const ok = await Swal.fire({
      title: '¿Cerrar planilla?',
      html: 'Todas las líneas deben estar <b>separadas</b> o <b>marcadas como agotadas</b>.<br>El sistema bloqueará el cierre si hay líneas sin resolver.',
      icon: 'warning',
      showCancelButton: true,
      confirmButtonText: 'Sí, cerrar',
      cancelButtonText: 'Cancelar',
      confirmButtonColor: '#0F4C81',
    });
    if (!ok.isConfirmed) return;
    this.loading(true);
    try {
      const r = await mApi('POST', `/picking/planilla/${numero}/completar`);
      if (r.data?.parcial) {
        await Swal.fire({
          title: 'Tu ambiente está listo ✓',
          html: `Tus referencias están separadas.<br><b>La planilla permanece abierta</b> hasta que los otros ambientes terminen.`,
          icon: 'info',
          confirmButtonText: 'Entendido',
          confirmButtonColor: '#0F4C81',
        });
        this.viewPlanilla(numero, true);
      } else {
        await Swal.fire({
          title: '¡Picking cerrado!',
          html: `La planilla <b>${numero}</b> fue cerrada.<br><span style="color:#0F4C81;font-weight:700;">Pasa al módulo de <i class="fa-solid fa-clipboard-check"></i> Certificar.</span>`,
          icon: 'success',
          confirmButtonText: 'Entendido',
        });
        await new Promise(r => setTimeout(r, 500));
        this.viewPicking();
      }
    } catch(e) {
      const d = e.data || {};
      const lineas = d.lineas_bloqueadas || [];

      if (lineas.length) {
        // Mostrar qué líneas bloquean el cierre
        const items = lineas.map(l =>
          `<div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid rgba(0,0,0,.06);">
            <div style="flex:1;min-width:0;">
              <div style="font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${l.codigo||''} — ${l.nombre_producto||''}</div>
              <div style="font-size:11px;color:#6b7280;">Pedido ${l.numero_orden||''} · Sol: <b>${l.cantidad_solicitada}</b> · Pick: <b style="color:${l.cantidad_pickeada>0?'#16a34a':'#dc2626'};">${l.cantidad_pickeada}</b></div>
            </div>
            <span style="background:#fef3c7;color:#92400e;padding:2px 7px;border-radius:12px;font-size:10px;font-weight:700;white-space:nowrap;">${l.estado}</span>
          </div>`
        ).join('');

        // Revisar si el usuario puede liberar (Supervisor/Admin)
        const puedeForz = d.puede_forzar;
        const result = await Swal.fire({
          title: `${lineas.length} línea(s) sin separar`,
          html: `<p style="color:#6b7280;font-size:12px;margin-bottom:10px;">${e.message}</p>
                 <div style="max-height:220px;overflow-y:auto;text-align:left;">${items}</div>`,
          icon: 'warning',
          showCancelButton: puedeForz,
          confirmButtonText: puedeForz ? 'Liberar para separar' : 'Entendido',
          cancelButtonText: 'Cancelar',
          confirmButtonColor: '#0F4C81',
        });

        if (result.isConfirmed && puedeForz) {
          this.loading(true);
          try {
            const r2 = await mApi('POST', `/picking/planilla/${numero}/liberar-vacias`);
            await Swal.fire({
              title: 'Líneas liberadas',
              html: `<b>${r2.data?.liberadas||0}</b> línea(s) restablecidas a <b>Pendiente</b>.<br>Los auxiliares ya pueden separar esas referencias.`,
              icon: 'success',
              confirmButtonText: 'Entendido',
            });
            this.viewPlanilla(numero, true);
          } catch(e2) {
            await Swal.fire({ title: 'Error', text: e2.message, icon: 'error' });
          }
          this.loading(false);
        }
      } else {
        await Swal.fire({
          title: 'No se puede cerrar',
          text: e.message || 'Error al cerrar planilla',
          icon: 'error',
          confirmButtonText: 'Entendido',
        });
      }
    }
    this.loading(false);
  },

  initPKConsolidado(idx, planillaNumero) {
    const it = this._itemsPlanilla[idx];
    if (!it) return this.toast("Error al recuperar item", "error");
    this._idxActual = idx;
    this.renderPKConsolidado(it, planillaNumero);
  },

  renderPKConsolidado(it, planillaNumero) {
    const factor    = parseInt(it.unidades_caja) || 1;
    const usaCajas  = factor > 1;
    const sugCajas  = it.cantidad_total;
    const sucEnt    = it.sucursal_entrega || '';
    const vence     = it.fecha_vencimiento ? this.formatDateShort(it.fecha_vencimiento) : null;
    const venceTxt  = vence || 'Sin fecha venc.';
    const tienesFotos = Array.isArray(it.fotos) ? it.fotos.length > 0
                        : (it.fotos && Object.keys(it.fotos).length > 0);
    const numFotos    = Array.isArray(it.fotos) ? it.fotos.length
                        : (it.fotos ? Object.keys(it.fotos).length : 0);

    const allItems = this._itemsPlanilla || [];
    const nextIdx  = (() => {
      for (let i = this._idxActual + 1; i < allItems.length; i++) {
        if ((allItems[i].cantidad_pick || 0) < allItems[i].cantidad_total) return i;
      }
      for (let i = 0; i < this._idxActual; i++) {
        if ((allItems[i].cantidad_pick || 0) < allItems[i].cantidad_total) return i;
      }
      return -1;
    })();

    let locValidated = false;

    // ─── Render único (sin pasos bloqueantes) ─────────────────────────────────
    const renderAll = () => {
      document.getElementById('m-content').innerHTML = `
        <div class="op-view" style="padding-bottom:20px;">

          <!-- ── Cabecera compacta: cliente + acciones ── -->
          <div style="background:#0f172a;color:#fff;margin:-10px -10px 8px;padding:8px 10px;">
            <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;">
              <div style="flex:1;min-width:0;">
                <div style="font-size:.5rem;font-weight:700;opacity:.55;text-transform:uppercase;letter-spacing:.5px;">CLIENTE</div>
                <div style="font-size:.82rem;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${this.esc(sucEnt || 'Sin cliente asignado')}</div>
              </div>
              <div style="font-size:.8rem;font-weight:900;font-family:monospace;background:rgba(255,255,255,.12);border-radius:5px;padding:3px 8px;flex-shrink:0;">${planillaNumero}</div>
            </div>
            <div style="display:flex;gap:5px;margin-top:6px;">
              <button onclick="MWMS._pkVerAlternativas(${it.producto_id},'${it.lote||''}',${it.ubicacion_id||'null'})"
                style="flex:1;background:rgba(59,130,246,.18);border:1px solid #3b82f6;color:#93c5fd;border-radius:6px;padding:6px 2px;font-size:.6rem;font-weight:800;cursor:pointer;line-height:1.2;">
                <i class="fa-solid fa-magnifying-glass-location"></i><br>UBICACIÓN
              </button>
              ${['Admin','Supervisor','SuperAdmin'].includes(_mUser?.rol) ? `
              <button onclick="MWMS._pkReemplazarProducto('${planillaNumero}','${it.ids}')"
                style="flex:1;background:rgba(217,119,6,.18);border:1px solid #d97706;color:#fde68a;border-radius:6px;padding:6px 2px;font-size:.6rem;font-weight:800;cursor:pointer;line-height:1.2;">
                <i class="fa-solid fa-arrow-right-arrow-left"></i><br>REEMPLAZAR
              </button>` : ''}
              <button onclick="MWMS.viewPlanilla('${planillaNumero}')"
                style="flex:1;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.3);color:#e2e8f0;border-radius:6px;padding:6px 2px;font-size:.6rem;font-weight:800;cursor:pointer;line-height:1.2;">
                <i class="fa-solid fa-list-ul"></i><br>LISTA
              </button>
            </div>
          </div>

          <!-- ── Principal: ubicación + vencimiento + producto ── -->
          <div class="op-card" style="padding:9px 12px;margin-bottom:8px;">
            <div style="display:flex;justify-content:space-between;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:4px;">
              ${it.ubicacion_codigo
                ? `<div id="pk-ubi-txt" style="font-size:1.25rem;font-weight:900;font-family:monospace;color:#0F4C81;letter-spacing:.5px;line-height:1.1;">${this._shortUbic(it.ubicacion_codigo)}</div>`
                : `<div style="font-size:.85rem;color:#dc2626;font-weight:800;"><i class="fa-solid fa-triangle-exclamation"></i> SIN UBICACIÓN</div>`
              }
              <div style="display:flex;align-items:center;gap:5px;">
                <span style="background:${vence ? '#fef2f2' : '#f1f5f9'};color:${vence ? '#dc2626' : '#64748b'};border-radius:5px;padding:3px 7px;font-weight:700;font-size:.68rem;white-space:nowrap;">
                  <i class="fa-solid fa-calendar-days" style="font-size:.58rem;"></i> ${venceTxt}
                </span>
                ${tienesFotos ? `
                <button onclick="MWMS.viewProductoDetail(${it.producto_id},'MWMS.renderPKConsolidado(MWMS._itemsPlanilla[MWMS._idxActual],\\'${planillaNumero}\\')')"
                  style="background:#e0f2fe;border:1px solid #bae6fd;color:#0284c7;border-radius:5px;padding:3px 7px;font-size:.65rem;font-weight:700;cursor:pointer;">
                  <i class="fa-solid fa-camera"></i> ${numFotos}
                </button>` : ''}
              </div>
            </div>
            <div style="font-weight:800;color:#1e293b;font-size:.9rem;line-height:1.2;">${this.esc(it.producto_nombre)}</div>
            <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;font-size:.66rem;color:#64748b;margin-top:3px;">
              <span style="font-family:monospace;font-weight:700;">${it.producto_codigo}</span>
              ${it.lote ? `<span>· Lote <b>${it.lote}</b></span>` : ''}
              <span style="margin-left:auto;font-weight:700;color:#0F4C81;white-space:nowrap;">
                Pedido: ${it.cantidad_total}${usaCajas ? ` cj (${it.cantidad_total * factor} und${factor > 1 ? `, UxC ${factor}` : ''})` : ' und'}
              </span>
            </div>
          </div>

          <!-- ── Scan ubicación (opcional, no bloquea) ── -->
          ${it.ubicacion_codigo ? `
          <div id="pk-scan-bar" style="display:flex;align-items:center;gap:8px;background:#fff8e1;border:1px solid #f59e0b;border-radius:9px;padding:6px 10px;margin-bottom:8px;">
            <i id="pk-loc-icon" class="fa-solid fa-location-crosshairs" style="color:#d97706;font-size:.9rem;flex-shrink:0;"></i>
            <input type="text" id="m-pk-scan" placeholder="Escanee ubicación para confirmar (opcional)"
              style="flex:1;border:none;background:transparent;font-size:.75rem;font-weight:700;color:#374151;outline:none;min-width:0;"
              onkeydown="if(event.key==='Enter'){const v=this.value.trim();if(v)MWMS._pkValidarLoc(v);}">
            <button onclick="(()=>{const v=document.getElementById('m-pk-scan')?.value?.trim();if(v)MWMS._pkValidarLoc(v);})()"
              style="background:#d97706;color:#fff;border:none;border-radius:6px;padding:4px 10px;font-size:.7rem;font-weight:800;cursor:pointer;white-space:nowrap;flex-shrink:0;">
              <i class="fa-solid fa-check"></i>
            </button>
          </div>` : ''}

          <!-- ── Formulario cantidades: SIEMPRE VISIBLE ── -->
          <div style="background:#f0fdf4;border:2px solid #10b981;padding:10px;border-radius:11px;margin-bottom:8px;">
            <div style="font-size:.66rem;font-weight:800;color:#059669;text-align:center;margin-bottom:8px;text-transform:uppercase;letter-spacing:.3px;">
              <i class="fa-solid fa-boxes-stacked"></i> CANTIDAD A SEPARAR
            </div>
            <div style="display:grid;grid-template-columns:${usaCajas ? '1fr 1fr' : '1fr'};gap:8px;margin-bottom:8px;">
              <div>
                <label style="font-size:.64rem;font-weight:700;color:#1e293b;display:block;margin-bottom:3px;">
                  <i class="fa-solid fa-box-archive" style="color:#0F4C81;"></i>
                  ${usaCajas ? 'Cajas' : 'Cantidad (und)'}
                </label>
                <input type="number" id="pk-inline-cajas" value="${sugCajas}" min="0" inputmode="numeric"
                  style="width:100%;border:2px solid #0F4C81;border-radius:8px;padding:8px 6px;font-size:1.7rem;font-weight:900;text-align:center;box-sizing:border-box;"
                  oninput="MWMS._updPKInlineTotal(${factor},${usaCajas})">
              </div>
              ${usaCajas ? `
              <div>
                <label style="font-size:.64rem;font-weight:700;color:#d97706;display:block;margin-bottom:3px;">
                  <i class="fa-solid fa-layer-group" style="color:#d97706;"></i> Saldos (sueltos)
                </label>
                <input type="number" id="pk-inline-saldos" value="0" min="0" inputmode="numeric"
                  style="width:100%;border:2px solid #d97706;border-radius:8px;padding:8px 6px;font-size:1.7rem;font-weight:900;text-align:center;box-sizing:border-box;"
                  oninput="MWMS._updPKInlineTotal(${factor},${usaCajas})">
              </div>` : ''}
            </div>
            <!-- Total UND/TOTAL -->
            <div style="background:#dcfce7;border-radius:8px;padding:6px;text-align:center;margin-bottom:8px;">
              <div style="font-size:.56rem;font-weight:700;color:#166534;text-transform:uppercase;">UND / TOTAL A SEPARAR</div>
              <div id="pk-inline-total" style="font-size:1.7rem;font-weight:900;color:#15803d;line-height:1.1;">—</div>
              <div id="pk-inline-und" style="font-size:.58rem;color:#166534;margin-top:2px;"></div>
            </div>
            <!-- Aviso dinámico de faltante (cajas/saldos), solo si la cantidad digitada es menor a lo pedido -->
            <div id="pk-inline-faltante" style="display:none;background:#fef2f2;border:1px solid #fca5a5;border-radius:8px;padding:6px 10px;text-align:center;margin-bottom:8px;font-size:.72rem;font-weight:700;color:#b91c1c;"></div>
            <!-- Agotado + Confirmar, lado a lado -->
            <div style="display:grid;grid-template-columns:1fr 1.4fr;gap:8px;">
              <button onclick="MWMS._pkMarcarAgotado('${planillaNumero}','${it.ids}')"
                style="background:#450a0a;color:#fca5a5;border:1px solid #991b1b;border-radius:9px;height:46px;font-size:.68rem;font-weight:800;cursor:pointer;letter-spacing:.2px;">
                <i class="fa-solid fa-circle-xmark"></i><br>AGOTADO
              </button>
              <button onclick="MWMS._confirmarPKInline('${planillaNumero}',${factor},${it.cantidad_total},${usaCajas})"
                style="background:#059669;color:#fff;border:none;border-radius:9px;height:46px;font-size:.85rem;font-weight:900;cursor:pointer;letter-spacing:.2px;">
                <i class="fa-solid fa-check-double"></i> CONFIRMAR
              </button>
            </div>
          </div>

          <!-- ── RUTA FEFO DINÁMICA ── -->
          ${(() => {
            const split   = it.fifo_split || [];
            const dispAsig = it.stock_disponible ?? null;
            const necesario = it.cantidad_total;
            const factor    = parseInt(it.unidades_caja) || 1;

            // Sin split y stock suficiente → solo botón manual de alternativas
            if (!split.length) {
              const alertaStock = (dispAsig !== null && dispAsig < necesario)
                ? `<div style="background:#fef9c3;border:1px solid #f59e0b;border-radius:8px;padding:8px 12px;margin-bottom:6px;font-size:.72rem;font-weight:700;color:#92400e;">
                     <i class="fa-solid fa-triangle-exclamation"></i> Stock en ubicación: <b>${dispAsig}</b> und — insuficiente para <b>${necesario}</b> und
                   </div>` : '';
              return `${alertaStock}
              <div id="pk-alternativas" style="display:none;background:#eff6ff;border:1px solid #bfdbfe;border-radius:10px;padding:10px;margin-bottom:6px;"></div>`;
            }

            // Hay split → guardar en memoria y mostrar ruta FEFO proactiva con botones
            MWMS._pkFifoSplit = split;
            const fifoCards = split.map((loc, i) => {
              const esAsig    = loc.es_asignada;
              const puedeUsar = !esAsig && loc.disponible >= necesario; // tiene todo lo necesario
              const esParcial = !esAsig && loc.disponible > 0 && loc.disponible < necesario;
              const vencLabel = loc.fecha_vencimiento
                ? `<span style="background:#fef2f2;color:#dc2626;border-radius:3px;padding:0 5px;font-size:.6rem;font-weight:700;">Vence: ${this.formatDateShort(loc.fecha_vencimiento)}</span>` : '';
              const fefoLabel = i === 0
                ? `<span style="background:#dcfce7;color:#15803d;border-radius:3px;padding:0 5px;font-size:.6rem;font-weight:800;">FEFO ★</span>` : '';
              const cajasLabel = factor > 1
                ? ` (${Math.floor(loc.tomar/factor)} cj${loc.tomar%factor>0?' +'+Math.round(loc.tomar%factor)+' u':''})` : '';
              const btnAccion = esAsig
                ? `<span style="font-size:.6rem;font-weight:800;color:#1e40af;background:#dbeafe;border-radius:5px;padding:5px 8px;white-space:nowrap;">AQUÍ ESTÁS</span>`
                : puedeUsar
                  ? `<button onclick="MWMS._pkUsarFifoLoc(${i},'${planillaNumero}')"
                       style="flex-shrink:0;background:#059669;color:#fff;border:none;border-radius:7px;padding:8px 12px;font-size:.72rem;font-weight:800;cursor:pointer;white-space:nowrap;">
                       <i class="fa-solid fa-check"></i> USAR
                     </button>`
                  : esParcial
                    ? `<button onclick="MWMS._pkUsarFifoLoc(${i},'${planillaNumero}')"
                         style="flex-shrink:0;background:#d97706;color:#fff;border:none;border-radius:7px;padding:8px 10px;font-size:.68rem;font-weight:800;cursor:pointer;white-space:nowrap;">
                         <i class="fa-solid fa-split"></i> PARCIAL
                       </button>`
                    : '';
              return `
              <div style="background:#fff;border-radius:8px;border:2px solid ${esAsig?'#0F4C81':'#e2e8f0'};padding:10px 12px;margin-bottom:5px;display:flex;align-items:center;gap:8px;">
                <div style="width:22px;height:22px;border-radius:50%;background:${esAsig?'#0F4C81':'#e2e8f0'};color:${esAsig?'#fff':'#64748b'};display:flex;align-items:center;justify-content:center;font-size:.68rem;font-weight:900;flex-shrink:0;">${i+1}</div>
                <div style="flex:1;min-width:0;">
                  <div style="display:flex;align-items:center;gap:4px;flex-wrap:wrap;margin-bottom:2px;">
                    <span style="font-family:monospace;font-size:.95rem;font-weight:900;color:#0F4C81;">${this.esc(loc.ubicacion_codigo)}</span>
                    ${fefoLabel}${vencLabel}
                  </div>
                  <div style="font-size:.68rem;color:#64748b;">
                    ${loc.lote ? `Lote <b>${this.esc(loc.lote)}</b> · ` : ''}
                    Disp: <b style="color:#059669;">${loc.disponible}</b> und ·
                    <b style="color:#dc2626;">TOMAR: ${loc.tomar}${cajasLabel}</b>
                  </div>
                </div>
                ${btnAccion}
              </div>`;
            }).join('');

            const pendienteTxt = (it.fifo_pendiente && it.fifo_pendiente > 0)
              ? `<div style="background:#fef2f2;border:1px solid #fca5a5;border-radius:6px;padding:6px 10px;font-size:.7rem;font-weight:700;color:#dc2626;text-align:center;">
                   <i class="fa-solid fa-triangle-exclamation"></i> Sin stock suficiente: faltan <b>${it.fifo_pendiente}</b> und en el sistema
                 </div>` : '';

            return `
            <div style="background:#f0fdf4;border:2px solid #10b981;border-radius:10px;padding:10px 12px;margin-bottom:6px;">
              <div style="font-size:.62rem;font-weight:800;color:#059669;text-transform:uppercase;letter-spacing:.3px;margin-bottom:8px;">
                <i class="fa-solid fa-route"></i> RUTA FEFO — SEPARAR EN ORDEN
              </div>
              ${fifoCards}
              ${pendienteTxt}
            </div>
            <div id="pk-alternativas" style="display:none;background:#eff6ff;border:1px solid #bfdbfe;border-radius:10px;padding:10px;margin-bottom:6px;"></div>`;
          })()}

          ${nextIdx !== -1 ? `
          <button onclick="MWMS.initPKConsolidado(${nextIdx},'${planillaNumero}')"
            style="width:100%;background:transparent;color:#64748b;border:1px solid #e2e8f0;border-radius:8px;padding:8px;font-size:.72rem;font-weight:700;cursor:pointer;margin-top:2px;">
            <i class="fa-solid fa-forward-step"></i> Saltar a siguiente pendiente
          </button>` : ''}
        </div>`;

      // Inicializar total
      setTimeout(() => MWMS._updPKInlineTotal(factor, usaCajas), 50);

      const inp = document.getElementById('m-pk-scan');
      if (inp) inp.focus();
    };

    // ─── Validar ubicación (actualiza barra inline sin re-renderizar) ─────────
    this._pkValidarLoc = (val) => {
      const targetLoc = (it.ubicacion_codigo || '').toUpperCase();
      const targetId  = (it.ubicacion_id  || '').toString();
      if (val.toUpperCase() === targetLoc || val === targetId) {
        locValidated = true;
        const bar  = document.getElementById('pk-scan-bar');
        const icon = document.getElementById('pk-loc-icon');
        const inp  = document.getElementById('m-pk-scan');
        const ubiTxt = document.getElementById('pk-ubi-txt');
        if (bar)    { bar.style.background = '#f0fdf4'; bar.style.borderColor = '#10b981'; }
        if (icon)   { icon.className = 'fa-solid fa-circle-check'; icon.style.color = '#059669'; }
        if (inp)    { inp.value = ''; inp.placeholder = 'Ubicación confirmada ✓'; inp.style.color = '#059669'; }
        if (ubiTxt) { ubiTxt.style.color = '#10b981'; }
        this.toast('UBICACIÓN CONFIRMADA ✓', 'success');
      } else {
        this.pA();
        this.toast('UBICACIÓN INCORRECTA ✗', 'error');
        const inp = document.getElementById('m-pk-scan');
        if (inp) { inp.value = ''; inp.focus(); }
      }
    };

    // ─── Actualizar display UND/TOTAL ──────────────────────────────────────────
    this._updPKInlineTotal = (factor, usaCajas) => {
      const c   = parseFloat(document.getElementById('pk-inline-cajas')?.value  || 0) || 0;
      const s   = usaCajas ? (parseFloat(document.getElementById('pk-inline-saldos')?.value || 0) || 0) : 0;
      const tot = usaCajas ? c * factor + s : c;
      const el  = document.getElementById('pk-inline-total');
      const elU = document.getElementById('pk-inline-und');
      if (el)  el.textContent  = isNaN(tot) ? '—' : tot;
      if (elU) elU.textContent = usaCajas
        ? `${c} cj × ${factor}${s > 0 ? ' + ' + s + ' sueltos' : ''} = ${tot} und`
        : 'unidades';

      // ── Aviso dinámico de faltante: si lo digitado es menor a lo pedido,
      // descompone el déficit en cajas + saldos (no en cajas fraccionadas) ──
      const pedidoUnd = (it.cantidad_total || 0) * factor;
      const faltanteEl = document.getElementById('pk-inline-faltante');
      if (faltanteEl) {
        const deficit = Math.round((pedidoUnd - tot) * 1000) / 1000;
        if (!isNaN(tot) && deficit > 0.001) {
          const deficitCajas = usaCajas ? Math.floor(deficit / factor) : 0;
          const deficitSaldo = usaCajas ? Math.round((deficit - deficitCajas * factor) * 1000) / 1000 : deficit;
          const partes = [];
          if (deficitCajas > 0) partes.push(`${deficitCajas} caja${deficitCajas === 1 ? '' : 's'}`);
          if (deficitSaldo > 0) partes.push(`${deficitSaldo} suelto${deficitSaldo === 1 ? '' : 's'}`);
          faltanteEl.textContent = `⚠ Faltarían ${partes.join(' + ')} por separar (${deficit} und) — quedará marcado como faltante`;
          faltanteEl.style.display = 'block';
        } else {
          faltanteEl.style.display = 'none';
        }
      }
    };

    // ─── Confirmar separación ─────────────────────────────────────────────────
    this._confirmarPKInline = async (planilla, factor, maxCajas, usaCajas) => {
      const c = parseFloat(document.getElementById('pk-inline-cajas')?.value || 0) || 0;
      const s = usaCajas ? (parseFloat(document.getElementById('pk-inline-saldos')?.value || 0) || 0) : 0;
      const totalUnd = usaCajas ? c * factor + s : c;
      if (totalUnd <= 0) { this.toast('Ingrese una cantidad mayor a 0', 'error'); return; }

      const totalEnviar = usaCajas ? parseFloat((c + (s / factor)).toFixed(4)) : c;

      if (c < maxCajas) {
        const tolerancia  = this._toleranciaBajoPicking ?? 0;
        const pctPickeado = maxCajas > 0 ? (c / maxCajas * 100) : 100;
        const minReq      = 100 - tolerancia;
        const dentroTol   = pctPickeado >= minReq;
        const ok = await Swal.fire({
          title: dentroTol ? 'Cajas incompletas' : '⚠ Bajo del mínimo permitido',
          html: `<div style="text-align:left;font-size:.88rem;">
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;">
              <div style="background:#f1f5f9;padding:8px;border-radius:8px;text-align:center;">
                <div style="font-size:.62rem;color:#64748b;font-weight:700;">SEPARADO</div>
                <div style="font-size:1.4rem;font-weight:900;color:${dentroTol ? '#d97706' : '#dc2626'};">${c}</div>
                <div style="font-size:.6rem;color:#64748b;">de ${maxCajas} cajas</div>
              </div>
              <div style="background:#f1f5f9;padding:8px;border-radius:8px;text-align:center;">
                <div style="font-size:.62rem;color:#64748b;font-weight:700;">% SEPARADO</div>
                <div style="font-size:1.4rem;font-weight:900;color:${dentroTol ? '#d97706' : '#dc2626'};">${pctPickeado.toFixed(0)}%</div>
                <div style="font-size:.6rem;color:#64748b;">Mín: ${minReq.toFixed(0)}%</div>
              </div>
            </div>
            <div style="background:${dentroTol ? '#fef3c7' : '#fef2f2'};border-radius:8px;padding:8px;text-align:center;font-size:.8rem;">
              Diferencia de <b>${(maxCajas - c).toFixed(0)} cajas</b> quedará como <b>FALTANTE</b>.
            </div>
          </div>`,
          icon: dentroTol ? 'warning' : 'error',
          showCancelButton: true,
          confirmButtonText: dentroTol ? 'Confirmar faltante' : 'Confirmar de todas formas',
          cancelButtonText: 'Corregir',
          confirmButtonColor: dentroTol ? '#d97706' : '#dc2626',
        });
        if (!ok.isConfirmed) return;
      } else if (c > maxCajas) {
        const ok = await Swal.fire({
          title: 'Cajas adicionales',
          text: `Separando ${c} cajas (pedido: ${maxCajas})${s > 0 ? ' + ' + s + ' sueltos' : ''}. ¿Confirmar excedente?`,
          icon: 'info', showCancelButton: true,
          confirmButtonText: 'Sí, confirmar', cancelButtonText: 'Corregir',
          confirmButtonColor: '#0F4C81',
        });
        if (!ok.isConfirmed) return;
      }
      this.confirmarPKActual(planilla, totalEnviar, c, s);
    };

    renderAll();
  },

  async confirmarPKActual(planillaNumero, qtyTomada = null, cajasTomadas = null, saldosTomados = null) {
    const it = this._itemsPlanilla[this._idxActual];
    const qtyActual = qtyTomada !== null ? qtyTomada : it.cantidad_total;
    this.loading(true);
    try {
      await mApi('POST', '/picking/confirmar-consolidado', {
        ids: it.ids,
        cantidad_tomada: qtyActual,
        cajas_tomadas:   cajasTomadas !== null ? cajasTomadas : undefined,
        saldos_tomados:  saldosTomados !== null ? saldosTomados : undefined,
        planilla_numero: planillaNumero
      });
      this.toast("Confirmado " + qtyActual + " und", "success");
      
      // Pasar a la siguiente tarea automáticamente
      const r = await mApi('GET', `/picking/planilla/${planillaNumero}`);
      this._itemsPlanilla = r.data || [];
      const nextIdx = this._itemsPlanilla.findIndex(x => x.cantidad_pick < x.cantidad_total);

      if (nextIdx !== -1) {
        this.initPKConsolidado(nextIdx, planillaNumero);
      } else {
        // Sin más pendientes — el picking queda abierto hasta que el auxiliar lo cierre
        this.toast('Sin más pendientes. Cierra el picking cuando estés listo.', 'info');
        this.viewPlanilla(planillaNumero);
      }
    } catch(e) { this.toast(e.message, "error"); }
    this.loading(false);
  },

  async _pkSeleccionarAlternativa(idx) {
    const alt = this._pkAltRows?.[idx];
    if (!alt) return;
    const it  = this._itemsPlanilla?.[this._idxActual];
    if (!it) return;

    const lineaIds = String(it.ids).split(',').map(Number).filter(Boolean);
    if (!lineaIds.length) {
      this.toast('No se encontraron líneas para reasignar', 'error');
      return;
    }

    this.loading(true);
    try {
      const r = await mApi('POST', '/picking/reasignar-ubicacion', {
        linea_ids:        lineaIds,
        inventario_id:    alt.inventario_id,
        ubicacion_id:     alt.ubicacion_id,
        lote:             alt.lote || null,
        fecha_vencimiento: alt.fecha_vencimiento || null,
      });

      if (r.error) { this.toast(r.message || 'Error al reasignar', 'error'); return; }

      this.toast(`Ubicación cambiada a ${alt.ubicacion_codigo} ✓`, 'success');

      // Recargar planilla y re-renderizar el ítem actual con la nueva ubicación
      const planillaNum = it.planilla_numero || it.planilla_lote || '';
      const planillaR = await mApi('GET', `/picking/planilla/${planillaNum}`);
      this._itemsPlanilla = planillaR.data || [];

      // Buscar el índice del mismo producto actualizado
      const newIdx = this._itemsPlanilla.findIndex(x => x.producto_id === it.producto_id && (x.cantidad_pick || 0) < x.cantidad_total);
      this.initPKConsolidado(newIdx !== -1 ? newIdx : this._idxActual, planillaNum);
    } catch(e) {
      this.toast(e.message || 'Error al cambiar ubicación', 'error');
    } finally {
      this.loading(false);
    }
  },

  async _pkUsarFifoLoc(idx, planillaNumero) {
    const loc = this._pkFifoSplit?.[idx];
    if (!loc) return;
    const it = this._itemsPlanilla?.[this._idxActual];
    if (!it) return;

    const lineaIds = String(it.ids).split(',').map(Number).filter(Boolean);
    if (!lineaIds.length) { this.toast('No se encontraron líneas para reasignar', 'error'); return; }

    // Si la ubicación tiene menos stock que el total pedido → confirmar que es split parcial
    const esParcial = loc.disponible < it.cantidad_total;
    if (esParcial) {
      const { isConfirmed } = await Swal.fire({
        title: 'Ubicación con stock parcial',
        html: `<p style="font-size:.85rem;margin-bottom:8px;">Esta ubicación tiene <b>${loc.disponible}</b> und disponibles pero se necesitan <b>${it.cantidad_total}</b>.</p>
               <p style="font-size:.82rem;color:#64748b;">Se reasignará el picking a esta ubicación. Luego confirma solo las unidades disponibles y el sistema generará una novedad por el resto.</p>`,
        icon: 'warning',
        showCancelButton: true,
        confirmButtonText: '<i class="fa-solid fa-check"></i> Ir de todas formas',
        cancelButtonText: 'Cancelar',
        confirmButtonColor: '#d97706',
      });
      if (!isConfirmed) return;
    }

    this.loading(true);
    try {
      await mApi('POST', '/picking/reasignar-ubicacion', {
        linea_ids:         lineaIds,
        ubicacion_id:      loc.ubicacion_id,
        lote:              loc.lote || null,
        fecha_vencimiento: loc.fecha_vencimiento || null,
      });
      this.toast(`Ubicación cambiada a ${loc.ubicacion_codigo} ✓`, 'success');
      const planillaR = await mApi('GET', `/picking/planilla/${planillaNumero}`);
      this._itemsPlanilla = planillaR.data || [];
      const newIdx = this._itemsPlanilla.findIndex(x => x.producto_id === it.producto_id && (x.cantidad_pick || 0) < x.cantidad_total);
      this.initPKConsolidado(newIdx !== -1 ? newIdx : this._idxActual, planillaNumero);
    } catch(e) {
      this.toast(e.message || 'Error al cambiar ubicación', 'error');
    } finally {
      this.loading(false);
    }
  },

  async _pkMarcarAgotado(planillaNumero, idsStr) {

    const { value: formData, isConfirmed } = await Swal.fire({

      </div>`,
      icon: 'warning',
      showCancelButton: true,
      confirmButtonText: '<i class="fa-solid fa-circle-xmark"></i> Confirmar Agotado',
      cancelButtonText: 'Cancelar',
      confirmButtonColor: '#7f1d1d',
      preConfirm: () => {
        const causalId = document.getElementById('pk-agotado-causal')?.value;

  // ── Búsqueda de producto reutilizable para agregar/reemplazar ──────────────
  async _pkBuscarProducto(titulo) {
    this._pkAddProdSel = null;
    return new Promise(resolve => {
      Swal.fire({
        title: titulo,
        html: `
          <div style="position:relative;">
            <input type="text" id="pk-add-search" class="swal2-input"
              placeholder="Nombre, código o EAN..."
              style="margin:0 0 4px;width:100%;box-sizing:border-box;" autocomplete="off">
            <div id="pk-add-dd" style="display:none;max-height:200px;overflow-y:auto;border:1px solid #e2e8f0;border-radius:8px;text-align:left;background:#fff;"></div>
          </div>
          <div id="pk-add-sel-info" style="display:none;margin-top:8px;background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;padding:8px;text-align:left;font-size:.8rem;">
            <i class="fa-solid fa-check-circle" style="color:#059669;"></i> <span id="pk-add-sel-name"></span>
          </div>`,
        showCancelButton: true,
        confirmButtonText: 'Continuar →',
        cancelButtonText: 'Cancelar',
        confirmButtonColor: '#7c3aed',
        didOpen: () => {
          const inp = document.getElementById('pk-add-search');
          if (inp) {
            inp.focus();
            let timer;
            inp.addEventListener('input', () => {
              clearTimeout(timer);
              timer = setTimeout(async () => {
                const q = inp.value.trim();
                const dd = document.getElementById('pk-add-dd');
                if (!dd) return;
                if (!q || q.length < 2) { dd.style.display='none'; return; }
                try {
                  const r = await mApi('GET', '/param/productos/buscar?q=' + encodeURIComponent(q) + '&limit=30');
                  const prods = r.data || r || [];
                  if (!prods.length) {
                    dd.innerHTML = '<div style="padding:8px 10px;color:#94a3b8;font-size:.78rem;">Sin resultados</div>';
                    dd.style.display = 'block'; return;
                  }
                  dd.innerHTML = prods.map(p =>
                    `<div data-pd="${JSON.stringify(p).replace(/"/g,'&quot;')}"
                       style="padding:8px 10px;border-bottom:1px solid #f1f5f9;cursor:pointer;font-size:.78rem;">
                       <b>${MWMS.esc(p.nombre)}</b>
                       <span style="color:#64748b;font-size:.65rem;font-family:monospace;margin-left:4px;">${p.codigo_interno}</span>
                     </div>`
                  ).join('');
                  dd.style.display = 'block';
                  dd.querySelectorAll('[data-pd]').forEach(el => {
                    el.onclick = () => {
                      const pd = JSON.parse(el.getAttribute('data-pd').replace(/&quot;/g,'"'));
                      MWMS._pkAddProdSel = pd;
                      document.getElementById('pk-add-sel-name').textContent = pd.nombre;
                      document.getElementById('pk-add-sel-info').style.display = 'block';
                      dd.style.display = 'none';
                      inp.value = pd.nombre;
                    };
                  });
                } catch(_) {}
              }, 200);
            });
          }
        },
        preConfirm: () => {
          if (!MWMS._pkAddProdSel) { Swal.showValidationMessage('Seleccione un producto de la lista'); return false; }
          return MWMS._pkAddProdSel;
        }
      }).then(r => resolve(r.isConfirmed ? r.value : null));
    });
  },

  // ── Diálogo de cantidad (cajas + saldos) para agregar/reemplazar ──────────
  async _pkPedirCantidad(prod, titulo) {
    const factor   = parseInt(prod.unidades_caja) || 1;
    const usaCajas = factor > 1;
    return new Promise(resolve => {
      Swal.fire({
        title: titulo || '<i class="fa-solid fa-boxes-stacked" style="color:#7c3aed;"></i> Cantidad',
        html: `
          <div style="font-size:.8rem;font-weight:700;color:#1e293b;margin-bottom:10px;text-align:left;">${MWMS.esc(prod.nombre)}</div>
          <div style="display:grid;grid-template-columns:${usaCajas ? '1fr 1fr' : '1fr'};gap:10px;text-align:left;">
            <div>
              <label style="font-size:.68rem;font-weight:700;color:#0F4C81;display:block;margin-bottom:4px;">
                <i class="fa-solid fa-box-archive"></i> ${usaCajas ? `Cajas (UxC: ${factor})` : 'Cantidad (und)'}
              </label>
              <input type="number" id="pk-qty-cajas" value="1" min="1" inputmode="numeric"
                style="width:100%;border:2px solid #0F4C81;border-radius:8px;padding:10px;font-size:1.8rem;font-weight:900;text-align:center;box-sizing:border-box;">
            </div>
            ${usaCajas ? `
            <div>
              <label style="font-size:.68rem;font-weight:700;color:#d97706;display:block;margin-bottom:4px;">
                <i class="fa-solid fa-layer-group"></i> Saldos (sueltos)
              </label>
              <input type="number" id="pk-qty-saldos" value="0" min="0" inputmode="numeric"
                style="width:100%;border:2px solid #d97706;border-radius:8px;padding:10px;font-size:1.8rem;font-weight:900;text-align:center;box-sizing:border-box;">
            </div>` : ''}
          </div>
          ${usaCajas ? `
          <div style="margin-top:10px;background:#f0fdf4;border-radius:8px;padding:6px;text-align:center;">
            <div style="font-size:.55rem;color:#166534;font-weight:700;">UND / TOTAL</div>
            <div id="pk-qty-total" style="font-size:1.5rem;font-weight:900;color:#15803d;">${factor}</div>
          </div>` : ''}`,
        didOpen: () => {
          if (usaCajas) {
            const upd = () => {
              const c = parseInt(document.getElementById('pk-qty-cajas')?.value || 0) || 0;
              const s = parseInt(document.getElementById('pk-qty-saldos')?.value || 0) || 0;
              const tot = document.getElementById('pk-qty-total');
              if (tot) tot.textContent = c * factor + s;
            };
            document.getElementById('pk-qty-cajas')?.addEventListener('input', upd);
            document.getElementById('pk-qty-saldos')?.addEventListener('input', upd);
            document.getElementById('pk-qty-cajas')?.focus();
          }
        },
        showCancelButton: true,
        confirmButtonText: '<i class="fa-solid fa-check"></i> Confirmar',
        cancelButtonText: 'Cancelar',
        confirmButtonColor: '#7c3aed',
        preConfirm: () => {
          const c = parseInt(document.getElementById('pk-qty-cajas')?.value || 0) || 0;
          const s = usaCajas ? (parseInt(document.getElementById('pk-qty-saldos')?.value || 0) || 0) : 0;
          if (c <= 0 && s <= 0) { Swal.showValidationMessage('Ingrese al menos 1'); return false; }
          return { cajas: c, saldos: s };
        }
      }).then(r => resolve(r.isConfirmed ? r.value : null));
    });
  },

  async _pkAgregarProducto(planillaNumero) {
    const prod = await this._pkBuscarProducto('<i class="fa-solid fa-plus-circle" style="color:#7c3aed;"></i> Agregar Referencia');
    if (!prod) return;

    const qtys = await this._pkPedirCantidad(prod, '<i class="fa-solid fa-boxes-stacked" style="color:#7c3aed;"></i> Cantidad a separar');
    if (!qtys) return;

    this.loading(true);
    try {
      await mApi('POST', `/picking/planilla/${planillaNumero}/agregar-linea`, {
        producto_id:   prod.id,
        cantidad_cajas: qtys.cajas,
        saldos:         qtys.saldos,
      });
      this.toast('Referencia agregada a la planilla ✓', 'success');
      const r = await mApi('GET', `/picking/planilla/${planillaNumero}`);
      this._itemsPlanilla = r.data || [];
      this.viewPlanilla(planillaNumero);
    } catch(e) {
      this.toast(e.message || 'Error al agregar producto', 'error');
    } finally {
      this.loading(false);
    }
  },

  async promptPKActualQty(planillaNumero) {
    const it = this._itemsPlanilla[this._idxActual];
    // Factor de conversion
    const factor = it.unidades_caja || it.producto?.unidades_caja || parseInt(it.producto_unidades_caja) || 1;
    const maxCant = it.cantidad_total;

    // Sugerencia: usar valores ya calculados del backend, o calcularlos
    const sugCajas  = (it.cajas  !== undefined && it.cajas  !== null) ? it.cajas  : Math.floor(it.cantidad_total / factor);
    const sugSaldos = (it.picos  !== undefined && it.picos  !== null) ? it.picos  : (it.cantidad_total - sugCajas * factor);

    let html = `
      <div style="text-align: left; font-size: 0.9rem;">
        <div style="background: #0f172a; padding: 12px; border-radius: 10px; margin-bottom: 14px; color:#fff;">
           <div style="font-size:.65rem;font-weight:700;opacity:.7;text-transform:uppercase;margin-bottom:4px;">PRODUCTO</div>
           <div style="font-size:.85rem;font-weight:800;line-height:1.2;">${this.esc ? this.esc(it.producto_nombre) : (it.producto_nombre||'')}</div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;">
          <div style="background:#f1f5f9;padding:10px;border-radius:8px;text-align:center;">
            <div style="color:#64748b;font-size:.65rem;font-weight:700;">SOLICITADO</div>
            <div style="font-size:1.3rem;font-weight:900;color:#0F4C81;">${maxCant}</div>
            <div style="font-size:.6rem;color:#64748b;">UND/TOTAL</div>
          </div>
          <div style="background:#f1f5f9;padding:10px;border-radius:8px;text-align:center;">
            <div style="color:#64748b;font-size:.65rem;font-weight:700;">UxC</div>
            <div style="font-size:1.3rem;font-weight:900;color:#1e293b;">${factor}</div>
            <div style="font-size:.6rem;color:#64748b;">${factor > 1 ? 'und/caja' : 'unidades'}</div>
          </div>
        </div>

        <div style="margin-bottom: 10px;">
           <label style="font-size: 0.8rem; font-weight: 700; color: #1e293b; display: block; margin-bottom: 4px;">
             <i class="fa-solid fa-box-archive" style="color:#0F4C81;"></i> ${factor > 1 ? 'Cajas completas' : 'Cantidad (unidades)'}
           </label>
           <input type="number" id="pk-swal-qty" class="swal2-input" value="${sugCajas}" min="0" style="margin: 0; width: 100%; box-sizing: border-box; font-size:1.3rem; font-weight:900; text-align:center;" oninput="MWMS._updPKSwalTotal(${factor})">
        </div>
    `;

    if (factor > 1) {
       html += `
        <div style="margin-bottom: 10px;">
           <label style="font-size: 0.8rem; font-weight: 700; color: #d97706; display: block; margin-bottom: 4px;">
             <i class="fa-solid fa-layer-group" style="color:#d97706;"></i> Saldos (unidades sueltas)
           </label>
           <input type="number" id="pk-swal-saldos" class="swal2-input" value="${sugSaldos}" min="0" style="margin: 0; width: 100%; box-sizing: border-box; font-size:1.3rem; font-weight:900; text-align:center;" oninput="MWMS._updPKSwalTotal(${factor})">
        </div>
       `;
    }

    html += `
        <div style="background:#dcfce7;padding:10px;border-radius:8px;margin-top:12px;text-align:center;">
           <div style="font-size:.7rem;font-weight:700;color:#166534;margin-bottom:4px;">TOTAL A DESCONTAR</div>
           <input type="text" id="pk-swal-total" readonly style="border:none;background:transparent;font-size:1.8rem;font-weight:900;color:#15803d;text-align:center;width:100%;outline:none;">
           <div style="font-size:.65rem;color:#166534;font-weight:600;">${factor > 1 ? `cajas × ${factor} + saldos` : 'unidades'}</div>
        </div>
      </div>
    `;

    const result = await Swal.fire({
      title: '<i class="fa-solid fa-boxes-stacked" style="color:#0F4C81;margin-right:8px;"></i>Confirmar Separación',
      html: html,
      showCancelButton: true,
      confirmButtonText: '<i class="fa-solid fa-check-double"></i> Confirmar',
      cancelButtonText: 'Cancelar',
      confirmButtonColor: '#059669',
      width: '360px',
      didOpen: () => {
         MWMS._updPKSwalTotal(factor);
      },
      preConfirm: () => {
        const q = parseFloat(document.getElementById('pk-swal-qty').value || 0);
        const s = factor > 1 ? parseFloat(document.getElementById('pk-swal-saldos').value || 0) : 0;
        if (isNaN(q) || q < 0) return Swal.showValidationMessage('Cantidad de cajas inválida');
        if (factor > 1 && (isNaN(s) || s < 0)) return Swal.showValidationMessage('Saldos inválidos');
        let total = factor > 1 ? q * factor + s : q;
        if (total <= 0) return Swal.showValidationMessage('El total debe ser mayor a 0');
        return { total: parseFloat(total.toFixed(2)), cajas: q, saldos: s };
      }
    });

    if (result.isConfirmed) {
      const { total: nQty, cajas: nCajas, saldos: nSaldos } = result.value;
      if (nQty < maxCant) {
        const ok = await Swal.fire({
          title: 'Cantidad Menor',
          text: 'Está ingresando menos de lo solicitado. Se generará una NOVEDAD (Faltante). ¿Desea continuar?',
          icon: 'warning',
          showCancelButton: true,
          confirmButtonText: 'Sí, confirmar',
          cancelButtonText: 'No, corregir',
          confirmButtonColor: '#d97706',
        });
        if (!ok.isConfirmed) return;
      } else if (nQty > maxCant) {
        const ok = await Swal.fire({
          title: 'Cantidad Mayor',
          text: 'Está ingresando más de lo solicitado (saldos adicionales). ¿Desea continuar?',
          icon: 'info',
          showCancelButton: true,
          confirmButtonText: 'Sí, confirmar',
          cancelButtonText: 'No, corregir',
          confirmButtonColor: '#0F4C81',
        });
        if (!ok.isConfirmed) return;
      }
      this.confirmarPKActual(planillaNumero, nQty, nCajas, nSaldos);
    }
  },

  _updPKSwalTotal(factor) {
      const q = parseFloat(document.getElementById('pk-swal-qty')?.value || 0);
      const s = factor > 1 ? parseFloat(document.getElementById('pk-swal-saldos')?.value || 0) : 0;
      let total = q;
      if (factor > 1) {
          total = q * factor + s;
      }
      const tInput = document.getElementById('pk-swal-total');
      if (tInput) {
          tInput.value = total.toFixed(2).replace(/\.00$/, '');
      }
  },

  async reportPKError(lineaId, ordenId) {
    const causa = prompt("Reportar problema (Ej: Pasillo Obstruido, Stock no físico, Dañado):");
    if (!causa) return;
    this.loading(true);
    try {
      await mApi('POST', `/picking/${ordenId}/marcar-faltante`, { 
        linea_id: lineaId, 
        observacion: causa 
      });
      this.toast("Novedad reportada", "warning");
      this.viewPicking();
    } catch(e) { 
        this.toast(e.message, "error"); 
    } finally {
        this.loading(false);
    }
  },

  async doPKScan(d) {
    const i = document.getElementById('m-pk-scan'); 
    const q = i.value.trim(); 
    if (!q) return;
    i.value = '';
    
    if (q !== d.linea.producto_ean && q !== d.linea.producto_codigo) {
      this.pA(); 
      return this.toast("CÓDIGO INCORRECTO: " + q, "error");
    }
    
    // Modal cajas + saldos para confirmación individual de línea
    const factor   = d.linea.unidades_caja || 1;
    const maxCant  = d.linea.cantidad_solicitada;
    const sugCajas = Math.floor(maxCant / factor);
    const sugSalHtml = factor > 1
      ? `<div style="margin-bottom:10px;">
           <label style="font-size:.8rem;font-weight:700;color:#d97706;display:block;margin-bottom:4px;"><i class="fa-solid fa-layer-group" style="color:#d97706;"></i> Saldos (sueltos)</label>
           <input type="number" id="pk-swal-saldos" class="swal2-input" value="${maxCant - sugCajas * factor}" min="0" style="margin:0;width:100%;box-sizing:border-box;font-size:1.3rem;font-weight:900;text-align:center;" oninput="MWMS._updPKSwalTotal(${factor})">
         </div>` : '';
    const lineaHtml = `
      <div style="text-align:left;font-size:.9rem;">
        <div style="background:#0f172a;padding:10px;border-radius:8px;margin-bottom:12px;color:#fff;">
          <div style="font-size:.65rem;opacity:.7;font-weight:700;">PRODUCTO</div>
          <div style="font-size:.85rem;font-weight:800;">${this.esc ? this.esc(d.linea.producto_nombre || '') : (d.linea.producto_nombre || '')}</div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;">
          <div style="background:#f1f5f9;padding:8px;border-radius:8px;text-align:center;">
            <div style="font-size:.6rem;font-weight:700;color:#64748b;">SOLICITADO</div>
            <div style="font-size:1.3rem;font-weight:900;color:#0F4C81;">${maxCant}</div>
          </div>
          <div style="background:#f1f5f9;padding:8px;border-radius:8px;text-align:center;">
            <div style="font-size:.6rem;font-weight:700;color:#64748b;">UxC</div>
            <div style="font-size:1.3rem;font-weight:900;color:#1e293b;">${factor}</div>
          </div>
        </div>
        <div style="margin-bottom:10px;">
          <label style="font-size:.8rem;font-weight:700;color:#1e293b;display:block;margin-bottom:4px;"><i class="fa-solid fa-box-archive" style="color:#0F4C81;"></i> ${factor > 1 ? 'Cajas completas' : 'Cantidad'}</label>
          <input type="number" id="pk-swal-qty" class="swal2-input" value="${sugCajas}" min="0" style="margin:0;width:100%;box-sizing:border-box;font-size:1.3rem;font-weight:900;text-align:center;" oninput="MWMS._updPKSwalTotal(${factor})">
        </div>
        ${sugSalHtml}
        <div style="background:#dcfce7;padding:8px;border-radius:8px;text-align:center;">
          <div style="font-size:.65rem;font-weight:700;color:#166534;">TOTAL</div>
          <input type="text" id="pk-swal-total" readonly style="border:none;background:transparent;font-size:1.8rem;font-weight:900;color:#15803d;text-align:center;width:100%;outline:none;">
        </div>
      </div>`;
    const pkRes = await Swal.fire({
      title: '<i class="fa-solid fa-boxes-stacked" style="color:#0F4C81;margin-right:6px;"></i>Confirmar Separación',
      html: lineaHtml,
      showCancelButton: true,
      confirmButtonText: '<i class="fa-solid fa-check-double"></i> Confirmar',
      cancelButtonText: 'Cancelar',
      confirmButtonColor: '#059669',
      width: '360px',
      didOpen: () => MWMS._updPKSwalTotal(factor),
      preConfirm: () => {
        const cj = parseFloat(document.getElementById('pk-swal-qty').value || 0);
        const sl = factor > 1 ? parseFloat(document.getElementById('pk-swal-saldos').value || 0) : 0;
        if (isNaN(cj) || cj < 0) return Swal.showValidationMessage('Cajas inválidas');
        const tot = factor > 1 ? cj * factor + sl : cj;
        if (tot <= 0) return Swal.showValidationMessage('Total debe ser > 0');
        return parseFloat(tot.toFixed(2));
      }
    });
    if (!pkRes.isConfirmed) return;
    const nQty = pkRes.value;
    if (nQty < maxCant) {
      const ok = await Swal.fire({ title:'Cantidad Menor', text:'Se generará una NOVEDAD. ¿Continuar?', icon:'warning', showCancelButton:true, confirmButtonText:'Sí', cancelButtonText:'No' });
      if (!ok.isConfirmed) return;
    }

    const ordenId  = d.orden.id;
    const lineaId  = d.linea.id;
    this.loading(true);
    try {
      const r = await mApi('POST', `/picking/${ordenId}/confirmar-linea`, {
        linea_id: lineaId,
        cantidad_tomada: nQty

      if (r.status === 'pending_approval') {
        this.loading(false);
        this._showExpiryModal(r.aprobacion_id, r.message, async () => {
          this.loading(true);
          try {
            await mApi('POST', `/picking/${ordenId}/confirmar-linea`, {
              linea_id: lineaId,
              cantidad_tomada: nQty

            this.goPK(ordenId);
          } catch(e) {
            this.toast(e.message, "error");
          } finally {
            this.loading(false);
          }
        });
        return;
      }
      this.toast("Línea confirmada", "success");
      this.goPK(ordenId);
    } catch(e) {
        this.toast(e.message, "error");
    } finally {
        this.loading(false);
    }
  },

              <div>

  async _packingIniciar(sucursal, ambiente = null) {
    this._activeAmbienteFilter = ambiente ? ambiente.toLowerCase() : null;
    this.loading(true);
    try {
      // Verificar sesión activa existente
      const activa = await mApi('GET', `/packing/sesion/activa/${encodeURIComponent(sucursal)}`).catch(() => null);
      if (activa?.data?.sesion_id) {
        await this._packingRenderSesion(activa.data.sesion_id);
        return;
      }
    } catch(_) {}
    this.loading(false);

    const { value: tipoEmp } = await Swal.fire({
      title: 'Iniciar packing',
      html: `<div style="font-weight:700;margin-bottom:6px;">${sucursal}</div>
             <div style="font-size:.82rem;color:#64748b;">Selecciona el tipo de empaque</div>`,
      input: 'select',
      inputOptions: { canasta: 'Canasta', caja: 'Caja', paquete: 'Paquete' },
      inputPlaceholder: 'Seleccionar tipo',
      showCancelButton: true,
      confirmButtonText: 'Iniciar',
      cancelButtonText: 'Cancelar',
      confirmButtonColor: '#0F4C81',
    });
    if (!tipoEmp) return;
    this.loading(true);
    try {
      const r = await mApi('POST', '/packing/sesion', { sucursal_entrega: sucursal, tipo_empaque: tipoEmp });
      await this._packingRenderSesion(r.data.sesion_id);
    } catch(e) {
      this.toast(e.message || 'Error al iniciar sesión', 'error');
    }
    this.loading(false);
  },

      if (!sesion) {
        cont.innerHTML = `<div style="text-align:center;padding:40px 16px;">
          <i class="fa-solid fa-triangle-exclamation" style="font-size:2rem;color:#f59e0b;display:block;margin-bottom:12px;"></i>

            <i class="fa-solid fa-arrow-left"></i> Ir a Packing

        </div>`;

      const canatasCerradas = unidades.filter(u => u.estado === 'Cerrada').length;
