  // ── CÁMARA: abre cámara trasera via input capture (funciona en HTTP) ───────
  // NOTA: getUserMedia requiere HTTPS. El atributo capture="environment" en un
  // <input type="file"> funciona en HTTP y abre la cámara nativa del dispositivo.
  // La clave es llamar inp.click() SINCRÓNICAMENTE dentro del evento de usuario.
  _openCamera(onCapture) {
    // Crear input fuera del DOM visible y sin pointer-events.
    // CLAVE: NO usar accept="image/*" en Android — el atributo accept junto con
    // capture dispara el picker de fuente en muchos Android. Solo capture abre cámara.
    // En iOS sí necesita accept para que el sistema diferencie cámara vs galería.
    const isIOS = /iP(ad|hone|od)/i.test(navigator.userAgent);
    const inp = document.createElement('input');
    inp.type = 'file';
    if (isIOS) inp.accept = 'image/*';
    inp.setAttribute('capture', 'environment');
    // Colocar en DOM pero fuera de viewport (sin display:none ni visibility:hidden
    // porque algunos navegadores bloquean el click en inputs ocultos con esos métodos)
    inp.style.cssText = 'position:fixed;top:0;left:0;width:0;height:0;opacity:0;z-index:-1;';
    document.body.appendChild(inp);
    inp.addEventListener('change', function() {
      try { document.body.removeChild(inp); } catch(_) {}
      if (this.files && this.files[0]) onCapture(this.files[0]);
    });
    // Cancel: si el usuario cierra la cámara sin tomar foto, limpiar el DOM
    window.addEventListener('focus', function onFocus() {
      window.removeEventListener('focus', onFocus);
      setTimeout(() => { try { if (inp.parentNode) document.body.removeChild(inp); } catch(_) {} }, 500);
    }, { once: true });
    inp.click();
  },

  // ── UPLOAD FOTO (acepta File o Blob) ──────────────────────────────────────
  async _uploadFotoProducto(id, fileOrBlob, backFn) {
    this.loading(true);
    try {
      const formData = new FormData();
      const nombre   = 'foto_prod_' + id + '_' + Date.now() + '.jpg';
      formData.append('fotos[]', fileOrBlob instanceof File ? fileOrBlob : new File([fileOrBlob], nombre, { type: 'image/jpeg' }));
      const token = localStorage.getItem('wms_token');
      const res   = await fetch(`${M_API}/param/productos/${id}/fotos`, {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${token}` },
        body: formData
      });
      const data = await res.json();
      if (data.error) throw new Error(data.message || 'Error al subir');
      this.toast('Foto subida con éxito', 'success');
      this.viewProductoDetail(id, backFn || 'MWMS.viewProductos()');
    } catch(e) {
      this.toast(e.message || 'Error al subir foto', 'error');
    } finally {
      this.loading(false);
    }
  },

  // ── SCANNER DE CÓDIGO DE BARRAS ────────────────────────────────────────────
  // Estrategia: file input con capture → foto → BarcodeDetector sobre imagen.
  // Funciona en HTTP (a diferencia de getUserMedia que requiere HTTPS).
  // Si BarcodeDetector no está disponible → muestra SweetAlert para ingreso manual.
  scanBarcode(callback) {
    if ('BarcodeDetector' in window) {
      // Tomar foto con la cámara y detectar el código
      const inp = document.createElement('input');
      inp.type = 'file';
      const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
      if (isIOS) inp.accept = 'image/*';
      inp.setAttribute('capture', 'environment');
      inp.style.cssText = 'position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;opacity:0;';
      document.body.appendChild(inp);
      inp.addEventListener('change', async () => {
        document.body.removeChild(inp);
        if (!inp.files || !inp.files[0]) return;
        this.loading(true);
        try {
          const bitmap   = await createImageBitmap(inp.files[0]);
          const detector = new BarcodeDetector({
            formats: ['code_128','code_39','code_93','ean_13','ean_8','upc_a','upc_e','qr_code','data_matrix']
          });
          const codes = await detector.detect(bitmap);
          this.loading(false);
          if (codes.length > 0) { callback(codes[0].rawValue); return; }
          this.toast('No se detectó código en la imagen. Intente de nuevo o ingréselo manualmente.', 'warning');
        } catch(_e) {
          this.loading(false);
          this.toast('Error al leer la imagen. Ingréselo manualmente.', 'warning');
        }
      });
      inp.click(); // SÍNCRONO — dentro del gesto de usuario
      return;
    }

    // BarcodeDetector no disponible (iOS Safari, navegadores antiguos) → ingreso manual
    Swal.fire({
      title: '<i class="fa-solid fa-barcode"></i> Código de Barras',
      html: `<p style="font-size:.8rem;color:#475569;margin-bottom:8px;">BarcodeDetector no disponible. Ingrese el código manualmente o use un escáner físico.</p>
             <input type="text" id="swal-scan-manual" class="swal2-input" placeholder="Ej: 7701234567890" inputmode="numeric" autocomplete="off" style="font-size:1rem;">`,
      showCancelButton: true,
      confirmButtonText: 'Usar',
      cancelButtonText: 'Cancelar',
      confirmButtonColor: '#0F4C81',
      didOpen: () => setTimeout(() => document.getElementById('swal-scan-manual')?.focus(), 80),
      preConfirm: () => {
        const v = document.getElementById('swal-scan-manual')?.value.trim();
        if (!v) return Swal.showValidationMessage('Ingrese un código');
        return v;
      }
    }).then(r => { if (r.isConfirmed && r.value) callback(r.value); });
  },

  async saveProducto(id) {
    const data = {
      codigo_interno: document.getElementById('m-pr-ean').value.trim(),
      nombre: document.getElementById('m-pr-desc').value.trim(),
      categoria_id: document.getElementById('m-pr-cat').value || null,
      unidad_medida: document.getElementById('m-pr-um').value,
      unidades_caja: parseInt(document.getElementById('m-pr-uxc').value || 1),
      controla_vencimiento: document.getElementById('m-pr-cvenc').checked ? 1 : 0
    };
    if (!data.nombre || !data.codigo_interno) { return this.toast('Código y Nombre son obligatorios', 'warning'); }
    this.loading(true);
    try {
      const r = id ? await mApi('PUT', '/param/productos/' + id, data) : await mApi('POST', '/param/productos', data);
      this.toast('Producto guardado con éxito', 'success');
      if (id) {
        this.viewProductoDetail(id);
      } else {
        // If created new, show detail of the new product
        if (r.data && r.data.id) this.viewProductoDetail(r.data.id, 'MWMS.viewProductos()');
        else this.viewProductos();
      }
    } catch (e) {
      this.toast(e.message || 'Error al guardar', 'error');
    } finally {
      this.loading(false);
    }
  },

  _ciMode: 'producto',
  _ciTimer: null,
  _ciSuggs: [],

  _setCIMode(mode) {
    this._ciMode = mode;
    const sugg = document.getElementById('ci-suggestions');
    if (sugg) sugg.innerHTML = '';
    this._ciSuggs = [];
    clearTimeout(this._ciTimer);
    const pBtn = document.getElementById('ci-btn-prod');
    const uBtn = document.getElementById('ci-btn-ubic');
    if (mode === 'producto') {
      pBtn.style.cssText += 'background:#e0f2fe;color:#0284c7;border-color:#0ea5e9;';
      uBtn.style.cssText += 'background:#f8fafc;color:#64748b;border-color:#e2e8f0;';
      const inp = document.getElementById('ci-query');
      if (inp) { inp.placeholder = 'Nombre, código, EAN, descripción...'; inp.focus(); }
    } else {
      uBtn.style.cssText += 'background:#e0f2fe;color:#0284c7;border-color:#0ea5e9;';
      pBtn.style.cssText += 'background:#f8fafc;color:#64748b;border-color:#e2e8f0;';
      const inp = document.getElementById('ci-query');
      if (inp) { inp.placeholder = 'Código de ubicación...'; inp.focus(); }
    }
  },

  _ciOnInput() {
    const q = (document.getElementById('ci-query')?.value || '').trim();
    const sugg = document.getElementById('ci-suggestions');
    if (!sugg) return;
    clearTimeout(this._ciTimer);
    if (q.length < 2 || this._ciMode !== 'producto') {
      sugg.innerHTML = '';
      this._ciSuggs = [];
      return;
    }
    sugg.innerHTML = '<div style="text-align:center;padding:8px;"><i class="fa-solid fa-spinner fa-spin" style="color:#0ea5e9;font-size:.85rem;"></i></div>';
    this._ciTimer = setTimeout(() => this._ciSearchProductos(q), 300);
  },

  async _ciSearchProductos(q) {
    const sugg = document.getElementById('ci-suggestions');
    if (!sugg) return;
    try {
      const r = await mApi('GET', '/param/productos/buscar?q=' + encodeURIComponent(q) + '&limit=200');
      const prods = Array.isArray(r.data) ? r.data : [];
      this._ciSuggs = prods;
      if (!prods.length) {
        sugg.innerHTML = '<div style="padding:8px 0;text-align:center;color:#94a3b8;font-size:.75rem;">Sin resultados para "' + this.esc(q) + '"</div>';
        return;
      }
      sugg.innerHTML =
        '<div style="font-size:.65rem;font-weight:700;color:#94a3b8;letter-spacing:.5px;margin-bottom:4px;">' +
          prods.length + ' RESULTADO' + (prods.length > 1 ? 'S' : '') +
        '</div>' +
        prods.map((p, i) =>
          '<div onclick="MWMS._ciSelectIdx(' + i + ')"' +
               ' style="background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:10px 12px;' +
                        'margin-bottom:5px;display:flex;justify-content:space-between;align-items:center;' +
                        'cursor:pointer;min-height:46px;-webkit-tap-highlight-color:rgba(14,165,233,.12);">' +
            '<div style="flex:1;min-width:0;">' +
              '<div style="font-weight:700;font-size:.82rem;color:#1e293b;' +
                           'white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' +
                this.esc(p.nombre) +
              '</div>' +
              '<div style="font-size:.68rem;color:#64748b;margin-top:2px;">' +
                (p.codigo_interno ? 'Cód: <b>' + this.esc(p.codigo_interno) + '</b>' : '') +
                (p.codigo_ean && p.codigo_ean !== p.codigo_interno
                  ? '&nbsp;·&nbsp;<span style="font-family:monospace">EAN ' + this.esc(p.codigo_ean) + '</span>'
                  : '') +
                (p.marca_nombre && p.marca_nombre !== '-'
                  ? '&nbsp;·&nbsp;' + this.esc(p.marca_nombre)
                  : '') +
              '</div>' +
            '</div>' +
            '<div style="text-align:right;flex-shrink:0;margin-left:10px;">' +
              '<div style="font-weight:900;color:#0ea5e9;font-size:.95rem;">' +
                parseFloat(p.stock || 0).toLocaleString('es-CO') +
              '</div>' +
              '<div style="font-size:.6rem;color:#94a3b8;">UND/TOTAL</div>' +
            '</div>' +
          '</div>'
        ).join('');
    } catch(e) {
      sugg.innerHTML = '';
      this._ciSuggs = [];
    }

  _ciSelectIdx(i) {
    const p = this._ciSuggs[i];
    if (!p) return;
    const inp = document.getElementById('ci-query');
    if (inp) inp.value = p.nombre;
    const sugg = document.getElementById('ci-suggestions');
    if (sugg) sugg.innerHTML = '';
    this._ciSuggs = [];
    clearTimeout(this._ciTimer);
    this._loadStockProducto(p.id, p.nombre);
  },

  async runConsultaInteligente() {
    const q = document.getElementById('ci-query')?.value?.trim();
    if (!q || q.length < 2) return this.toast('Escriba al menos 2 caracteres', 'warning');
    clearTimeout(this._ciTimer);
    const sugg = document.getElementById('ci-suggestions');
    if (sugg) sugg.innerHTML = '';
    this._ciSuggs = [];
    const results = document.getElementById('ci-results');
    results.innerHTML = '<div style="text-align:center;padding:20px;"><i class="fa-solid fa-spinner fa-spin" style="color:#0ea5e9;font-size:1.5rem;"></i></div>';
    this.loading(true);
    try {
      if (this._ciMode === 'producto') {
        const rP = await mApi('GET', '/odc/buscar-producto?q=' + encodeURIComponent(q));
        const prods = rP.data || [];
        if (!prods.length) { 
          results.innerHTML = '<div class="m-empty"><i class="fa-solid fa-box-open"></i><p>Sin productos encontrados</p></div>'; 
          return; 
        }
        
        if (prods.length > 1) {
          results.innerHTML = `
            <div style="font-size:.7rem;font-weight:700;color:#64748b;margin-bottom:8px;">SELECCIONE UN PRODUCTO:</div>
            ${prods.map(p => `
              <div class="op-card" onclick="MWMS._loadStockProducto(${p.id},'${this.esc(p.nombre)}')"
                style="padding:10px;display:flex;justify-content:space-between;align-items:center;">
                <div><div style="font-weight:700;font-size:.82rem;">${this.esc(p.nombre)}</div><small style="color:#64748b;">SKU: ${this.esc(p.codigo_interno||'-')}</small></div>
                <i class="fa-solid fa-chevron-right" style="color:#94a3b8;"></i>
              </div>`).join('')}`;
        } else {
          await this._loadStockProducto(prods[0].id, prods[0].nombre);
        }
      } else {
        const rU = await mApi('GET', '/param/ubicaciones?codigo=' + encodeURIComponent(q));
        const ubics = Array.isArray(rU.data) ? rU.data : [];
        const exact = ubics.find(u => (u.codigo||'').toUpperCase() === q.toUpperCase()) || ubics[0];
        if (!exact) { 
          results.innerHTML = '<div class="m-empty"><i class="fa-solid fa-location-dot"></i><p>Ubicación no encontrada</p></div>'; 
          return; 
        }
        await this._loadStockUbicacion(exact);
      }
    } catch(e) { 
        results.innerHTML = `<div style="padding:16px;color:#dc2626;font-size:.8rem;"><i class="fa-solid fa-exclamation-circle"></i> ${this.esc(e.message)}</div>`; 
    } finally {
        this.loading(false);
    }
  },

    try {
      const r = await mApi('GET', '/inventario/stock?producto_id=' + productoId);
      const stock = (r.data || []).filter(s => parseFloat(s.cantidad) > 0);
      const total = stock.reduce((a, s) => a + parseFloat(s.cantidad), 0);
      results.innerHTML = `
        <div style="font-size:.82rem;font-weight:800;color:#1e293b;margin-bottom:10px;padding:10px;background:#f0f9ff;border-radius:8px;border-left:4px solid #0ea5e9;">
          <i class="fa-solid fa-box" style="color:#0ea5e9;"></i> ${this.esc(nombre)}
          <span style="float:right;background:#0ea5e9;color:#fff;padding:2px 10px;border-radius:99px;font-size:.7rem;">Total: ${total} UND/TOTAL</span>
        </div>
        ${stock.length === 0
          ? '<div class="m-empty"><i class="fa-solid fa-box-open"></i><p>Sin stock disponible</p></div>'
          : `<div style="font-size:.7rem;font-weight:700;color:#64748b;margin-bottom:6px;">UBICACIONES CON STOCK:</div>
             ${stock.map(s => `
               <div style="background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:10px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;">
                 <div>
                   <div style="font-weight:700;font-size:.82rem;">${this.esc(s.ubicacion_nombre||s.ubicacion_codigo||s.ubicacion_id)}</div>
                   <small style="color:#64748b;">Lote: ${this.esc(s.lote||'N/A')} | ${this.esc(s.estado||'Disponible')}</small>

  async doRecOScan() {
    const input = document.getElementById('m-odc-scan');
    const ean = input.value.trim();
    if (!ean) return;
    input.value = '';
    this.loading(true);
    try {
      const r = await mApi('GET', `/odc/${this._op.odc.id}/verificar-ean?q=${encodeURIComponent(ean)}`);
      const p = r.data.producto;
      const det = r.data.detalle;
      
      this.openCapture(p, async res => {
          this.loading(true);
          try {
              await mApi('POST', '/recepciones/detalles-operativa', {
                  odc_id: this._op.odc.id,
                  producto_id: p.id,
                  cantidad: res.q,
                  cantidad_cajas: res.cantidad_cajas,
                  saldos: res.saldos,
                  lote: res.l,
                  fecha_vencimiento: res.fv,
                  numero_pallet: this._op.currentPallet
              });
              
              this.loading(false);
              const result = await Swal.fire({
                title: `Guardado en Pallet #${this._op.currentPallet}`,
                html: `<div style="text-align:left;">
                  <p style="margin-bottom:12px;font-size:.85rem;color:#374151;">¿Pallet para el <b>siguiente</b> producto?</p>
                  <label style="display:flex;align-items:center;gap:8px;padding:10px;border:2px solid #3b82f6;border-radius:8px;margin-bottom:8px;cursor:pointer;background:#eff6ff;">
                    <input type="radio" name="odc-pal-mode" value="mismo" checked style="width:16px;height:16px;accent-color:#3b82f6;">
                    <span style="font-size:.85rem;font-weight:600;color:#1e40af;">Mismo pallet <b>#${this._op.currentPallet}</b></span>
                  </label>
                  <label style="display:flex;align-items:center;gap:8px;padding:10px;border:1px solid #d1fae5;border-radius:8px;margin-bottom:8px;cursor:pointer;background:#f0fdf4;">
                    <input type="radio" name="odc-pal-mode" value="nuevo" style="width:16px;height:16px;accent-color:#10b981;">
                    <span style="font-size:.85rem;font-weight:600;color:#065f46;">Nuevo pallet (siguiente consecutivo)</span>
                  </label>
                  <label style="display:flex;align-items:center;gap:8px;padding:10px;border:1px solid #fef3c7;border-radius:8px;cursor:pointer;background:#fffbeb;">
                    <input type="radio" name="odc-pal-mode" value="especifico" style="width:16px;height:16px;accent-color:#d97706;">
                    <span style="font-size:.82rem;font-weight:600;color:#92400e;white-space:nowrap;">Pallet específico #</span>
                    <input type="number" id="odc-pal-especifico" min="1" placeholder="Nro."
                      style="width:80px;padding:6px 8px;border:1px solid #d97706;border-radius:6px;font-weight:700;text-align:center;font-size:.9rem;"
                      onfocus="document.querySelector('input[name=odc-pal-mode][value=especifico]').checked=true">
                  </label>
                </div>`,
                showCancelButton: false,
                confirmButtonText: 'Confirmar',
                confirmButtonColor: '#3b82f6',
                preConfirm: () => {
                  const mode = document.querySelector('input[name="odc-pal-mode"]:checked')?.value || 'mismo';
                  if (mode === 'especifico') {
                    const num = parseInt(document.getElementById('odc-pal-especifico')?.value);
                    if (!num || num < 1) {
                      Swal.showValidationMessage('Ingrese un número de pallet válido');
                      return false;
                    }
                    return { mode, num };
                  }
                  return { mode, num: null };
                }
              });

              if (result.value) {
                const { mode, num } = result.value;
                if (mode === 'nuevo') {
                  this.loading(true);
                  try {
                    const next = await mApi('GET', '/recepciones/proximo-pallet');
                    this._op.currentPallet = next.proximo;
                    this.renderRecO();
                  } finally {
                    this.loading(false);
                  }
                } else if (mode === 'especifico') {
                  this._op.currentPallet = num;
                  this.renderRecO();

                // mode === 'mismo': no change needed
              }

              this.toast("Producto capturado", "success");
              await this.refreshRecOLines();
              await this.checkODCCompletion();

              this.toast(e.message, "error"); 
          } finally {
              this.loading(false);

      });

        this.toast(e.message, "error"); 
        this.pA(); 
    } finally {
        this.loading(false);

  async checkODCCompletion() {
      try {
          const r = await mApi('GET', `/odc/${this._op.odc.id}`);
          const odc = r.data || r;
          const totalSolicitado = odc.detalles.reduce((acc, d) => acc + parseFloat(d.cantidad_solicitada), 0);
          const totalRecibido = odc.detalles.reduce((acc, d) => acc + parseFloat(d.cantidad_recibida), 0);
          
          if (totalRecibido >= totalSolicitado && totalSolicitado > 0) {
              // Notificar al backend para cerrar/completar si no lo hace ya
              await mApi('POST', `/odc/${odc.id}/cerrar`);
              
              // Alerta visual pro
              this.loading(false);
              alert(`¡ORDEN #${odc.numero_odc} COMPLETADA!\n\nSe han recibido todos los productos solicitados.`);
              this.viewRecO();
              return true;
          }
      } catch(e) { console.error("Error checkODC:", e); }
      return false;
  },

  async lTS(preSelected = false) {
    let locs = [];
    if (preSelected && this._tmpLoc) {
        locs = [this._tmpLoc];
        this._tmpLoc = null;
    } else {
        const q=document.getElementById('m-t-o').value.trim(); if(!q) return;
        this.loading(true);
        try {
            const rl = await mApi('GET','/param/ubicaciones?codigo='+encodeURIComponent(q));
            locs = Array.isArray(rl.data) ? rl.data : [];
        } catch(e) { this.toast(e.message, "error"); this.loading(false); return; }
    }

    try {
      if(locs.length === 0) throw new Error("Ubicación no encontrada");
      
      const selectUbic = async (loc) => {
        this.loading(true);
        try {
            const rs=await mApi('GET','/inventario/stock?ubicacion_id='+loc.id);
            const stock = (rs.data||[]).filter(x => parseFloat(x.cantidad) > 0);
            
            if(stock.length === 0) {
                this.toast("Sin stock disponible en esa ubicación", "warning");
                document.getElementById('m-t-s').innerHTML = '';
                return;
            }
            
            if(stock.length === 1) {
              this.selT(loc, stock[0]);
            } else {
              document.getElementById('m-t-s').innerHTML = `
                <div style="margin-top:8px;">
                  <div style="font-size:.7rem;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;">
                    Selecciona el producto a trasladar:
                  </div>
                  ${stock.map(s => {
                    const fv = s.fecha_vencimiento
                      ? `<span style="background:#fef2f2;border:1px solid #fca5a5;border-radius:4px;padding:1px 6px;color:#dc2626;font-size:.68rem;font-weight:700;">Vence: ${this.formatDateShort(s.fecha_vencimiento)}</span>`
                      : '';
                    return `<div onclick="MWMS.selT(${JSON.stringify(loc).replace(/"/g,'&quot;')}, ${JSON.stringify(s).replace(/"/g,'&quot;')})"
                         style="display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:#fff;border:1.5px solid #fed7aa;border-radius:8px;margin-bottom:6px;cursor:pointer;">
                      <div>
                        <div style="font-size:.82rem;font-weight:700;color:#1e293b;">${this.esc(s.producto_nombre)}</div>
                        <div style="display:flex;gap:4px;margin-top:3px;flex-wrap:wrap;">
                          <span style="font-size:.68rem;color:#64748b;">Lote: ${this.esc(s.lote||'Sin lote')}</span>
                          ${fv}
                        </div>
                      </div>
                      <div style="text-align:right;flex-shrink:0;margin-left:8px;">
                        <div style="font-weight:900;color:#10b981;font-size:.95rem;">${s.cantidad}</div>
                        <div style="font-size:.65rem;color:#94a3b8;">und</div>
                      </div>
                    </div>`;
                  }).join('')}
                </div>`;
                document.getElementById('m-t-a').style.display='none';
            }
        } finally { this.loading(false); }
      };

      if (locs.length === 1) {
          await selectUbic(locs[0]);
      } else {
          // Mostrar lista de ubicaciones para seleccionar
          document.getElementById('m-t-s').innerHTML = `
            <div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:10px;margin-top:10px;">
              <p style="font-size:.7rem;font-weight:700;margin-bottom:8px;color:#64748b;">SELECCIONE LA UBICACIÓN:</p>
              ${locs.map(l => `
                <div onclick='MWMS._tmpLoc=${JSON.stringify(l).replace(/"/g,'&quot;')}; MWMS.lTS(true)' 
                     style="padding:10px;background:#fff;border:1px solid #cbd5e1;border-radius:8px;margin-bottom:6px;cursor:pointer;">
                  <div style="font-size:.8rem;font-weight:700;">${this.esc(l.codigo)}</div>
                  <div style="font-size:.65rem;color:#64748b;">${this.esc(l.descripcion || 'Sin descripción')}</div>
                </div>
              `).join('')}
            </div>`;
            document.getElementById('m-t-a').style.display='none';
      }
    } catch(e) { 
        this.toast(e.message,"error"); 
        document.getElementById('m-t-s').innerHTML=''; 
    } finally {
        this.loading(false);
    }
  },
  selT(loc, item) {
    this._td={o:loc, i:item, d:null};
    const upc = Math.max(1, parseInt(item.unidades_caja || 1));
    this._tUpc = upc;
    // Disponible real = cantidad física menos lo ya reservado (picking/despacho en curso).
    // No usar item.cantidad_cajas/item.saldos directo: son el desglose del total físico,
    // no del neto disponible, y podrían sobrestimar lo que realmente se puede trasladar.
    const reservada = parseFloat(item.cantidad_reservada || 0);
    const dispNeto  = Math.max(0, Math.round((parseFloat(item.cantidad || 0) - reservada) * 1000) / 1000);
    this._td.dispNeto = dispNeto;
    const maxCajas  = upc > 1 ? Math.floor(dispNeto / upc) : 0;
    const maxSaldos = upc > 1 ? Math.round((dispNeto - maxCajas * upc) * 1000) / 1000 : dispNeto;
    const maxTotal  = dispNeto;
    const dispTxt = upc > 1
      ? `${maxCajas} caj × ${upc} + ${maxSaldos} sueltos = <b>${maxTotal} UND/T</b>`
      : `<b>${maxTotal} UND/T disponibles</b>`;
    const fvBadge = item.fecha_vencimiento
      ? `<span style="background:#fef2f2;border:1px solid #fca5a5;border-radius:4px;padding:2px 8px;color:#dc2626;font-size:.72rem;font-weight:700;">
           <i class="fa-solid fa-calendar-xmark"></i> Vence: ${this.formatDateShort(item.fecha_vencimiento)}
         </span>`
      : '<span style="background:#f1f5f9;border:1px solid #e2e8f0;border-radius:4px;padding:2px 8px;color:#94a3b8;font-size:.72rem;">Sin vencimiento</span>';
    document.getElementById('m-t-prod-info').innerHTML = `
      <div style="margin-bottom:6px;font-weight:700;font-size:.88rem;color:#1e293b;">${this.esc(item.producto_nombre)}</div>
      <div style="display:flex;flex-wrap:wrap;gap:4px;align-items:center;margin-bottom:8px;">
        <span style="background:#fff7ed;border:1px solid #fed7aa;border-radius:4px;padding:2px 8px;color:#c2410c;font-size:.72rem;font-weight:700;">
          <i class="fa-solid fa-location-dot"></i> Desde: ${this.esc(this._td.o?.codigo || '')}
        </span>
        <span style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:4px;padding:2px 8px;color:#475569;font-size:.72rem;">
          Lote: ${this.esc(item.lote || 'Sin lote')}
        </span>
        ${fvBadge}
      </div>
      <div style="font-size:.78rem;color:#475569;">${dispTxt}</div>`;
    document.getElementById('m-t-a').style.display = 'block';
    // Mostrar/ocultar campo cajas según UPC
    const cajasGroup = document.getElementById('m-t-cajas-group');
    const cajasEl    = document.getElementById('m-t-cajas');
    const saldosEl   = document.getElementById('m-t-saldos');
    const saldosLbl  = document.getElementById('m-t-saldos-label');
    if (cajasGroup) cajasGroup.style.display = upc > 1 ? '' : 'none';
    if (cajasEl) {
      cajasEl.value = upc > 1 ? maxCajas : '';
      cajasEl.max   = maxCajas;
      cajasEl.placeholder = `0 – ${maxCajas}`;
    }
    if (saldosEl) {
      saldosEl.value = upc > 1 ? maxSaldos : maxTotal;
      saldosEl.max   = upc > 1 ? (upc - 1) : maxTotal;
      saldosEl.placeholder = upc > 1 ? `0 – ${upc - 1}` : `0 – ${maxTotal}`;
    }
    if (saldosLbl) saldosLbl.textContent = upc > 1 ? 'Sueltos a Trasladar' : 'Cantidad a Trasladar';
    this._updTTotal();
    document.getElementById('m-t-d').focus();
  },

  _tUpc: 1,

  _updTTotal() {
    const upc     = this._tUpc || 1;
    const cajas   = parseFloat(document.getElementById('m-t-cajas')?.value  || 0) || 0;
    const saldos  = parseFloat(document.getElementById('m-t-saldos')?.value || 0) || 0;
    const total   = upc > 1 ? cajas * upc + saldos : saldos;
    const maxTotal = parseFloat(this._td?.dispNeto ?? this._td?.i?.cantidad ?? 0);
    const el = document.getElementById('m-t-total-preview');
    if (!el) return;
    if (total <= 0) {
      el.style.display = 'none';
      return;
    }
    el.style.display = 'block';
    if (total > maxTotal) {
      el.style.cssText = 'background:#fee2e2;border:1px solid #fca5a5;border-radius:6px;padding:8px;font-size:.8rem;font-weight:700;color:#991b1b;margin-bottom:8px;';
      el.textContent = `Excede disponible: ${total} > ${maxTotal} UND/T`;
    } else {
      el.style.cssText = 'background:#eff6ff;border:1px solid #bfdbfe;border-radius:6px;padding:8px;font-size:.8rem;font-weight:700;color:#1d4ed8;margin-bottom:8px;';
      const pend = Math.round((maxTotal - total) * 1000) / 1000;
      el.textContent = pend > 0
        ? `Total a trasladar: ${total} UND/T · Pendiente: ${pend} UND/T`
        : `Total a trasladar: ${total} UND/T (todo disponible)`;
    }
  },

  async doT() {
    const upc    = this._tUpc || 1;
    const cajas  = parseFloat(document.getElementById('m-t-cajas')?.value  || 0) || 0;
    const saldos = parseFloat(document.getElementById('m-t-saldos')?.value || 0) || 0;
    const q      = upc > 1 ? cajas * upc + saldos : saldos;

    if (q <= 0) return this.toast("Ingrese la cantidad a trasladar", "warning");

    const maxTotal = parseFloat(this._td?.dispNeto ?? this._td?.i?.cantidad ?? 0);
    if (q > maxTotal) return this.toast(`Máximo disponible: ${maxTotal} UND/T`, "error");

    const dest = this._td.d;
    if(!dest) {
       // Si no seleccionó de la lista, intentar validar lo que hay en el input
       const dVal = document.getElementById('m-t-d').value.trim();
       if(!dVal) return this.toast("Seleccione un destino", "warning");
       this.loading(true);
       try {
         const rl=await mApi('GET','/param/ubicaciones?codigo='+encodeURIComponent(dVal));
         const locs = Array.isArray(rl.data) ? rl.data : [];
         if(locs.length === 0) throw new Error("Ubicación destino no encontrada");
         this._td.d = locs[0];
       } catch(e) { this.toast(e.message, "error"); this.loading(false); return; }
    }

    this.loading(true);
    try {
      const s = this._td.i;
      const loc = this._td.d;
      await mApi('POST','/inventario/traslado',{
        producto_id:          s.producto_id,
        ubicacion_origen_id:  this._td.o.id,
        ubicacion_destino_id: loc.id,
        cantidad:             q,
        cantidad_cajas:       upc > 1 ? cajas : 0,
        saldos:               saldos,
        lote:                 s.lote,
        fecha_vencimiento:    s.fecha_vencimiento,
        numero_pallet:        s.numero_pallet
      });
      this.toast("Traslado registrado correctamente","success");
      this.showHome();
    } catch(e) {
        this.toast(e.message,"error");
    } finally {
        this.loading(false);
    }
  },

  _mciSearchProd(q) {
    const dd = document.getElementById('mci-prod-dd');
    if (!dd) return;
    if (!q || q.length < 1) { dd.style.display='none'; return; }
    clearTimeout(this._mciTimer);
    this._mciTimer = setTimeout(async () => {
      try {
        const r = await mApi('GET', '/param/productos?q=' + encodeURIComponent(q) + '&limit=30');
        const prods = r.data || r || [];
        if (!prods.length) { dd.innerHTML='<div style="padding:10px;color:#94a3b8;font-size:.8rem;">Sin resultados</div>'; dd.style.display='block'; return; }
        dd.innerHTML = prods.map(p => {
          const upc = p.unidades_caja > 1 ? ` · ${p.unidades_caja}u/caja` : '';
          return `<div style="padding:10px;border-bottom:1px solid #f0f0f0;cursor:pointer;"
            onclick="MWMS._mciSelProd(${JSON.stringify(p).replace(/"/g,'&quot;')})"
            ontouchstart="this.style.background='#eff6ff'" ontouchend="this.style.background=''">
            <div style="font-weight:600;font-size:.85rem;">${this.esc(p.nombre)}${p.control_vencimientos?' 📅':''}</div>
            <div style="font-size:.75rem;color:#64748b;">${this.esc(p.codigo_interno||'')}${upc}</div>
          </div>`;
        }).join('');
        dd.style.display = 'block';
      } catch(e) { dd.style.display='none'; }
    }, 300);
  },

  _mciSelProd(p) {
    if (typeof p === 'string') p = JSON.parse(p);
    this._mciProd = p;
    const inp  = document.getElementById('mci-prod-q');
    const dd   = document.getElementById('mci-prod-dd');
    const info = document.getElementById('mci-prod-info');
    const lbl  = document.getElementById('mci-fvenc-label');
    const hint = document.getElementById('mci-fvenc-hint');
    const fvi  = document.getElementById('mci-fvenc');
    if (inp) inp.value = p.nombre;
    if (dd)  dd.style.display='none';
    const upc = Math.max(1, parseInt(p.unidades_caja)||1);
    if (info) {
      info.style.display = 'block';
      info.innerHTML = `<b>${this.esc(p.nombre)}</b> · ${upc}u/caja${p.control_vencimientos ? ' · <span style="color:#dc2626;font-weight:700;">📅 Requiere vencimiento</span>' : ''}`;
    }
    if (lbl) {
      lbl.innerHTML = p.control_vencimientos
        ? '<i class="fa-solid fa-calendar-xmark" style="color:#dc2626;"></i> Fecha de Vencimiento <span style="color:#dc2626;">*</span>'
        : '<i class="fa-solid fa-calendar-days"></i> Fecha de Vencimiento';
    }
    if (hint) hint.style.display = p.control_vencimientos ? 'block' : 'none';
    if (fvi)  fvi.style.borderColor = p.control_vencimientos ? '#dc2626' : '';
    this._mciPreview();
  },

  // Normaliza código: quita guiones, barras, espacios → UPPER
  _ubicNorm(s) { return (s || '').replace(/[^A-Za-z0-9]/g, '').toUpperCase(); },

  _mciSearchUbic(q) {
    const dd   = document.getElementById('mci-ubic-dd');
    const info = document.getElementById('mci-ubic-info');
    this._mciUbicId = null;
    if (info) info.innerHTML = '';
    if (!dd) return;
    const norm = this._ubicNorm(q);
    if (!norm || norm.length < 2) { dd.style.display = 'none'; return; }

    const scored = [];
    for (const u of (this._mciUbis || [])) {
      const un = this._ubicNorm(u.codigo);
      if      (un === norm)        scored.push({ u, score: 3 }); // exacto normalizado
      else if (un.endsWith(norm))  scored.push({ u, score: 2 }); // sin ambiente
      else if (un.includes(norm))  scored.push({ u, score: 1 }); // parcial
    }
    scored.sort((a, b) => b.score - a.score || (a.u.codigo||'').localeCompare(b.u.codigo||''));

    // Auto-selección si hay exactamente 1 match exacto
    const exactos = scored.filter(m => m.score === 3);
    if (exactos.length === 1) { this._mciSelUbic(exactos[0].u.id, exactos[0].u.codigo); dd.style.display='none'; return; }

    if (!scored.length) { dd.style.display = 'none'; return; }
    dd.innerHTML = scored.slice(0, 15).map(({ u, score }) =>
      `<div style="padding:10px;border-bottom:1px solid #f0f0f0;cursor:pointer;"
        onclick="MWMS._mciSelUbic(${u.id},'${this.esc(u.codigo||'')}')"
        ontouchstart="this.style.background='#f0fdf4'" ontouchend="this.style.background=''">
        <div style="font-weight:600;font-size:.83rem;display:flex;align-items:center;gap:6px;">
          ${this.esc(u.codigo||'')}
          ${score===2 ? '<span style="font-size:.6rem;background:#fef3c7;color:#92400e;padding:1px 4px;border-radius:3px;">sin ambiente</span>'
          : score===1 ? '<span style="font-size:.6rem;background:#f1f5f9;color:#64748b;padding:1px 4px;border-radius:3px;">parcial</span>' : ''}
        </div>
        <div style="font-size:.72rem;color:#64748b;">${this.esc(u.zona||'')} · ${this.esc(u.tipo_ubicacion||'')}</div>
      </div>`
    ).join('');
    dd.style.display = 'block';
  },

  _mciSelUbic(id, codigo) {
    this._mciUbicId = id;
    const inp  = document.getElementById('mci-ubic-q');
    const dd   = document.getElementById('mci-ubic-dd');
    const info = document.getElementById('mci-ubic-info');
    if (inp)  inp.value = codigo;
    if (dd)   dd.style.display='none';
    if (info) info.innerHTML = '<span style="color:#16a34a;"><i class="fa-solid fa-circle-check"></i> Ubicación validada</span>';
  },

  _mciPreview() {
    const p = this._mciProd;
    const prev = document.getElementById('mci-preview');
    const txt  = document.getElementById('mci-preview-txt');
    if (!prev || !p) { if(prev) prev.style.display='none'; return; }
    const upc    = Math.max(1, parseInt(p.unidades_caja)||1);
    const cajas  = parseFloat(document.getElementById('mci-cajas')?.value||'0')||0;
    const saldos = parseFloat(document.getElementById('mci-saldos')?.value||'0')||0;
    const total  = cajas*upc + saldos;
    prev.style.display = 'block';
    if (txt) txt.textContent = upc > 1
      ? `${cajas}caj × ${upc}u + ${saldos} = ${total.toFixed(2)} UND/TOTAL`
      : `${cajas} + ${saldos} = ${total.toFixed(2)} UND/TOTAL`;
  },

  async _mciEnviar() {
    const p = this._mciProd;
    if (!p) { this.toast('Seleccione un producto','warning'); return; }
    const ubicQ = document.getElementById('mci-ubic-q')?.value?.trim();
    if (!ubicQ) { this.toast('Ingrese el código de ubicación','warning'); return; }
    const cajas  = parseFloat(document.getElementById('mci-cajas')?.value||'0')||0;
    const saldos = parseFloat(document.getElementById('mci-saldos')?.value||'0')||0;
    const upc    = Math.max(1, parseInt(p.unidades_caja)||1);
    const esVaciado = (cajas*upc + saldos) <= 0;
    if (esVaciado && !confirm(`¿Registrar "${p.nombre}" en esta ubicación con cantidad CERO?\n\nGenerará un ajuste negativo si había inventario previo.`)) return;
    const fvenc = document.getElementById('mci-fvenc')?.value || null;
    /* FV solo obligatoria si no es vaciado y el producto controla vencimiento */
    if (!esVaciado && p.control_vencimientos && !fvenc) { this.toast('Este producto requiere fecha de vencimiento','warning'); return; }
    const lote = document.getElementById('mci-lote')?.value?.trim() || null;
    this.loading(true);
    try {
      const r = await mApi('POST', '/inventario/cargue-inicial/linea', {
        producto_id:      p.id,
        ubicacion_codigo: ubicQ.toUpperCase(),
        lote,
        fecha_vencimiento: fvenc || null,
        cantidad_cajas:   Math.floor(cajas),
        saldos,
      });
      const adv = r.data?.advertencia;
      this.toast(adv ? `Guardado — Advertencia: ${adv}` : `"${p.nombre}" enviado a pendientes`, adv ? 'warning' : 'success');
      // Reset
      ['mci-cajas','mci-saldos','mci-lote'].forEach(id => { const el=document.getElementById(id); if(el) el.value=id==='mci-cajas'||id==='mci-saldos'?'0':''; });
      document.getElementById('mci-fvenc').value  = '';
      document.getElementById('mci-prod-q').value = '';
      document.getElementById('mci-ubic-q').value = '';
      document.getElementById('mci-prod-info').style.display='none';
      document.getElementById('mci-preview').style.display='none';
      document.getElementById('mci-ubic-dd').style.display='none';
      document.getElementById('mci-ubic-info').innerHTML='';
      this._mciProd   = null;
      this._mciUbicId = null;
      await this._mciRefrescarPend();
    } catch(e) { this.toast(e.message||'Error enviando línea','error'); }
    finally { this.loading(false); }
  },

  async _mciRefrescarPend() {
    const rol     = WMS?.user?.rol || localStorage.getItem('wms_rol') || '';
    const esAdmin = ['Admin','Supervisor','SuperAdmin'].includes(rol);

    // ── Mis Conteos (filtrado por usuario actual, más reciente primero) ──
    try {
      const rMio  = await mApi('GET', '/inventario/cargue-inicial/pendientes?mio=1');
      const mios  = rMio.data?.lineas || [];
      const cnt   = document.getElementById('mci-mio-count');
      const list  = document.getElementById('mci-mio-list');
      if (cnt) cnt.textContent = mios.length;
      if (list) {
        if (!mios.length) {
          list.innerHTML = '<div style="padding:20px;text-align:center;color:#94a3b8;font-size:.8rem;"><i class="fa-solid fa-inbox fa-2x" style="display:block;margin-bottom:6px;opacity:.4;"></i>Aún no has registrado conteos</div>';
        } else {
          list.innerHTML = mios.map(l => {
            const sinId  = !l.ubicacion_id;
            const esVac  = parseFloat(l.und_total) <= 0;
            const cantTx = esVac
              ? '<span style="background:#fef2f2;color:#dc2626;border:1px solid #fecaca;border-radius:4px;padding:1px 6px;font-size:.7rem;font-weight:700;">VACIAR</span>'
              : `<b style="color:#0f766e;">${parseFloat(l.und_total).toFixed(2)} UND</b>`;
            return `<div style="padding:10px 12px;border-bottom:1px solid #ccfbf1;">
              <div style="display:flex;justify-content:space-between;align-items:flex-start;">
                <div style="flex:1;">
                  <div style="font-size:.83rem;font-weight:700;">${this.esc(l.producto||'')}</div>
                  <div style="font-size:.73rem;color:#64748b;margin-top:2px;">
                    <i class="fa-solid fa-location-dot" style="color:#0f766e;"></i>
                    ${this.esc(l.ubicacion_codigo||'—')}${sinId?' <span style="color:#b45309;">⚠️</span>':''}
                  </div>
                  <div style="font-size:.72rem;color:#6b7280;margin-top:2px;">
                    ${l.cantidad_cajas} caj · ${l.saldos} suel · ${cantTx}
                    ${l.lote ? ` · Lote: ${this.esc(l.lote)}` : ''}
                  </div>
                </div>
                <button style="background:#ef4444;color:#fff;border:none;border-radius:4px;padding:5px 9px;font-size:.72rem;cursor:pointer;margin-left:8px;" onclick="MWMS._mciEliminarPend(${l.id})">
                  <i class="fa-solid fa-trash"></i>
                </button>
              </div>
            </div>`;
          }).join('');
        }
      }
    } catch(e) { /* silencioso */ }

    // ── Pendientes de Aprobación (solo admin) ──
    if (!esAdmin) return;
    try {
      const r     = await mApi('GET', '/inventario/cargue-inicial/pendientes');
      const lineas= r.data?.lineas || [];
      const count = document.getElementById('mci-pend-count');
      const list  = document.getElementById('mci-pend-list');
      if (count) count.textContent = lineas.length;
      if (!list) return;
      if (!lineas.length) {
        list.innerHTML = '<div style="padding:20px;text-align:center;color:#94a3b8;font-size:.8rem;"><i class="fa-solid fa-inbox fa-2x" style="display:block;margin-bottom:6px;opacity:.4;"></i>Sin líneas pendientes</div>';
        return;
      }
      list.innerHTML = lineas.map(l => {
        const sinId = !l.ubicacion_id;
        const esVac = parseFloat(l.und_total) <= 0;
        const fv    = l.fecha_vencimiento ? this.formatDateShort(l.fecha_vencimiento) : '—';
        const cantTx = esVac
          ? '<span style="background:#fef2f2;color:#dc2626;border:1px solid #fecaca;border-radius:4px;padding:1px 5px;font-size:.7rem;">VACIAR</span>'
          : `${parseFloat(l.und_total).toFixed(2)} UND`;
        return `<div style="padding:10px 12px;border-bottom:1px solid #f0f0f0;">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;">
            <div style="flex:1;">
              <div style="font-size:.82rem;font-weight:600;">${this.esc(l.producto||'')}</div>
              <div style="font-size:.72rem;color:#64748b;">${this.esc(l.ubicacion_codigo||'')}${sinId?' ⚠️':''} · ${cantTx}</div>
              <div style="font-size:.7rem;color:#9ca3af;">Lote: ${l.lote||'—'} · Venc: ${fv}</div>
              <div style="font-size:.68rem;color:#94a3b8;"><i class="fa-solid fa-user"></i> ${this.esc(l.nombre_usuario||'')}</div>
            </div>
            <div style="display:flex;gap:4px;margin-left:8px;">
              ${!sinId ? `<button style="background:#16a34a;color:#fff;border:none;border-radius:4px;padding:4px 8px;font-size:.72rem;cursor:pointer;" onclick="MWMS._mciAprobarLinea(${l.id})" title="${esVac?'Aprobar vaciado':'Aprobar'}"><i class="fa-solid fa-check"></i></button>` : ''}
              <button style="background:#dc2626;color:#fff;border:none;border-radius:4px;padding:4px 8px;font-size:.72rem;cursor:pointer;" onclick="MWMS._mciEliminarPend(${l.id})"><i class="fa-solid fa-trash"></i></button>
            </div>
          </div>
        </div>`;
      }).join('');
    } catch(e) { /* silencioso */ }
  },

  async _mciVaciarUbicacion() {
    const codigo = document.getElementById('mci-vaciar-ubic')?.value?.trim().toUpperCase();
    if (!codigo) { this.toast('Ingrese el código de ubicación a vaciar', 'warning'); return; }
    if (!confirm(`¿Vaciar TODA la ubicación "${codigo}"?\n\nPondrá en CERO todo el inventario y registrará ajustes negativos en el kardex.`)) return;
    this.loading(true);
    try {
      const r = await mApi('POST', '/inventario/vaciar-ubicacion', { ubicacion_codigo: codigo });
      const ajust = r.data?.ajustados ?? 0;
      this.toast(
        ajust > 0 ? `Ubicación "${codigo}" vaciada — ${ajust} registro(s) ajustado(s)` : `La ubicación "${codigo}" ya estaba vacía`,
        ajust > 0 ? 'success' : 'info'
      );
      document.getElementById('mci-vaciar-ubic').value = '';
    } catch(e) { this.toast(e.message || 'Error vaciando ubicación', 'error'); }
    finally { this.loading(false); }
  },

  async _mciAprobarLinea(id) {
    this.loading(true);
    try {
      await mApi('POST', `/inventario/cargue-inicial/${id}/aprobar`, {});
      this.toast('Línea aprobada — inventario actualizado','success');
      await this._mciRefrescarPend();
    } catch(e) { this.toast(e.message||'Error aprobando','error'); }
    finally { this.loading(false); }
  },

  async _mciAprobarTodo() {
    const n = document.getElementById('mci-pend-count')?.textContent||'?';
    if (!confirm(`¿Aprobar las ${n} líneas pendientes?`)) return;
    this.loading(true);
    try {
      const r = await mApi('POST', '/inventario/cargue-inicial/aprobar-todo', {});
      const d = r.data||{};
      this.toast(`${d.aprobadas||0} línea(s) aprobadas`+(d.errores?.length?` · ${d.errores.length} error(es)`:''), d.errores?.length?'warning':'success');
      await this._mciRefrescarPend();
    } catch(e) { this.toast(e.message||'Error aprobando','error'); }
    finally { this.loading(false); }
  },

  async _mciEliminarPend(id) {
    if (!confirm('¿Eliminar esta línea pendiente?')) return;
    try {
      await mApi('DELETE', `/inventario/cargue-inicial/${id}`);
      this.toast('Línea eliminada','success');
      await this._mciRefrescarPend();
    } catch(e) { this.toast(e.message||'Error eliminando','error'); }
  },

  async startIv(id) {
    this.loading(true);
    try {
      const [r, asigR] = await Promise.all([
        mApi('GET', '/v2/inventario/sesiones/' + id),
        mApi('GET', '/v2/inventario/mis-asignaciones'),
      ]);
      const c       = r.data || r;
      const misAsigs = (asigR.data || []).filter(a => a.sesion_id == id);
      this._op = { ...c, l: [], misAsigs };
      this.renderIv();
    } catch(e) {
        this.toast(e.message, "error");
    } finally {
        this.loading(false);
    }
  },

  renderIv() {
    const d = this._op;
    // Si hay asignaciones de tipo Referencia asignadas a este usuario → flujo cíclico
    const refAsigs = (d.misAsigs || []).filter(a => a.tipo_instruccion === 'Referencia');
    if (refAsigs.length > 0) { this.renderIvReferencia(refAsigs); return; }
    // Si la sesión es Cíclica y mis asignaciones son todas finalizadas (no aparecen en mis-asignaciones)
    if (d.tipo === 'Ciclico') { this._ivRefDone(); return; }

    const tipoLabel = {Ciclico:'Cíclico', General:'General', CargueInicial:'Cargue Inicial'}[d.tipo] || (d.tipo||'');
    const tipoColor = {Ciclico:'#4f46e5', General:'#7c3aed', CargueInicial:'#d97706'}[d.tipo] || '#64748b';
    this._curLoc = null;
    document.getElementById('m-content').innerHTML = `
      <div class="op-view">

        <!-- Header sesión -->
        <div style="background:#1e293b;color:#fff;border-radius:12px;padding:12px 14px;margin-bottom:10px;">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
            <span style="font-size:.7rem;color:#94a3b8;">Sesión #${d.id} · Ronda ${d.ronda_actual||1}</span>
            <span style="font-size:.65rem;background:${tipoColor}30;color:${tipoColor};padding:2px 8px;border-radius:20px;font-weight:700;">${tipoLabel}</span>
          </div>
          <div style="font-weight:700;font-size:.9rem;line-height:1.3;">${this.esc(d.nombre||'Inventario')}</div>
        </div>

        <!-- Paso 1: Ubicación -->
        <div id="iv-step-card" style="background:#fff;border-radius:12px;border:2px solid #3b82f6;padding:12px;margin-bottom:8px;box-shadow:0 2px 8px rgba(59,130,246,.15);">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
            <span id="iv-step-badge" style="background:#3b82f6;color:#fff;font-size:.65rem;font-weight:800;padding:2px 8px;border-radius:20px;">PASO 1</span>
            <p id="m-iv-header" style="font-size:.78rem;font-weight:700;color:#1e293b;margin:0;">ESCANEE O BUSQUE LA UBICACIÓN</p>
          </div>
          <div style="display:flex;gap:8px;">
            <input type="text" id="m-iv-scan" class="m-input-full" placeholder="Código de ubicación..." autocomplete="off"
              oninput="MWMS.validateIvInput(this.value)" onkeydown="if(event.key==='Enter')MWMS.doIv()">
            <button class="m-btn-icon primary" onclick="MWMS.doIv()" style="flex-shrink:0;">
              <i class="fa-solid fa-check"></i>
            </button>
          </div>
          <div id="m-iv-suggestions" style="margin-top:6px;max-height:200px;overflow-y:auto;border:1px solid #e2e8f0;border-radius:8px;display:none;background:#fff;box-shadow:0 4px 12px rgba(0,0,0,.1);">
            <div id="m-iv-suggestions-list"></div>
          </div>
          <!-- Botón vaciar: aparece solo en PASO 2 (ubicación seleccionada) -->
          <div id="iv-vaciar-loc-btn" style="display:none;margin-top:8px;">
            <button onclick="MWMS._ivVaciarUbicacion()"
              style="width:100%;background:#fef2f2;border:1px solid #fecaca;color:#dc2626;border-radius:8px;padding:10px;font-size:.8rem;cursor:pointer;font-weight:700;text-align:left;">
              <i class="fa-solid fa-eraser"></i> Vaciar esta ubicación (dejar en cero y contar)
            </button>
          </div>
        </div>

        <!-- Mis conteos -->
        <div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;padding:10px;display:flex;align-items:center;gap:10px;margin-top:4px;">
          <div style="font-size:.68rem;font-weight:700;color:#166534;white-space:nowrap;">
            <i class="fa-solid fa-list-check"></i> MIS CONTEOS
          </div>
          <div id="iv-conteo-badge" style="font-size:1.3rem;font-weight:800;color:#15803d;flex:1;text-align:center;">0</div>
          <button onclick="MWMS._ivToggleConteos()"
            style="background:#16a34a;color:#fff;border:none;border-radius:6px;padding:7px 14px;font-size:.78rem;cursor:pointer;font-weight:700;white-space:nowrap;">
            <i class="fa-solid fa-eye"></i> Ver listado
          </button>
        </div>

        <!-- Líneas contadas (colapsable) -->
        <div id="m-lines-iv" style="margin-top:8px;display:none;"></div>

        <button onclick="MWMS.viewInventario()" style="width:100%;margin-top:12px;padding:12px;background:transparent;border:1px solid #e2e8f0;border-radius:10px;font-size:.82rem;color:#64748b;cursor:pointer;">
          <i class="fa-solid fa-arrow-left"></i> Volver a Mis Tareas
        </button>
      </div>`;
    const inp = document.getElementById('m-iv-scan');
    inp.focus();
    this.refreshIvLines();
  },

  async refreshIvLines() {
    const cont  = document.getElementById('m-lines-iv');
    const badge = document.getElementById('iv-conteo-badge');
    if (!this._op) return;
    try {
      const r     = await mApi('GET', `/v2/inventario/sesiones/${this._op.id}/mis-lineas`);
      const lines = Array.isArray(r.data) ? r.data : [];
      if (badge) badge.textContent = lines.length;
      if (!cont) return;
      if (!lines.length) {
        cont.innerHTML = `<div style="text-align:center;padding:20px 0;color:#94a3b8;font-size:.8rem;">
          <i class="fa-solid fa-box-open" style="font-size:1.5rem;margin-bottom:8px;display:block;"></i>
          Aún no has registrado productos en esta sesión.
        </div>`;
        return;
      }
      cont.innerHTML = `
        <div style="font-size:.72rem;font-weight:700;color:#166534;margin-bottom:6px;letter-spacing:.5px;display:flex;align-items:center;justify-content:space-between;">
          <span><i class="fa-solid fa-list-check"></i> CONTEOS REGISTRADOS (${lines.length})</span>
          <span onclick="MWMS._ivToggleConteos()" style="color:#64748b;cursor:pointer;font-size:.7rem;">
            <i class="fa-solid fa-xmark"></i> Cerrar
          </span>
        </div>
        ${lines.map(l => `
          <div style="background:#fff;border-radius:10px;border:1px solid #e2e8f0;padding:10px 12px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;">
            <div style="flex:1;min-width:0;">
              <div style="font-weight:700;font-size:.8rem;color:#1e293b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${this.esc(l.producto_nombre||l.producto_codigo||'-')}</div>
              <div style="font-size:.68rem;color:#64748b;margin-top:2px;">
                <i class="fa-solid fa-location-dot" style="color:#3b82f6;"></i> ${this.esc(l.ubicacion_codigo||'-')}
                ${l.lote && l.lote !== 'N/A' ? `&nbsp;·&nbsp;Lote: <b>${this.esc(l.lote)}</b>` : ''}
                ${l.fecha_vencimiento ? `&nbsp;·&nbsp;<i class="fa-solid fa-calendar-days" style="color:#dc2626;"></i> <b style="color:#dc2626;">${this.formatDate(l.fecha_vencimiento)}</b>` : ''}
              </div>
            </div>
            <div style="text-align:right;flex-shrink:0;margin-left:10px;">
              <div style="font-size:1.1rem;font-weight:800;color:#1e293b;">${l.cantidad}</div>
              <div style="font-size:.62rem;color:#94a3b8;">UND/TOTAL</div>
            </div>
          </div>
        `).join('')}`;
    } catch(e) {
      if (cont) cont.innerHTML = `<div style="text-align:center;padding:16px;color:#dc2626;font-size:.8rem;">
        <i class="fa-solid fa-triangle-exclamation"></i> ${e.message || 'Error cargando conteos'}
      </div>`;
    }
  },

  async _ivToggleConteos() {
    const cont = document.getElementById('m-lines-iv');
    if (!cont) return;
    const visible = cont.style.display !== 'none';
    if (visible) { cont.style.display = 'none'; return; }
    cont.style.display = 'block';
    await this.refreshIvLines();
    cont.scrollIntoView({ behavior: 'smooth', block: 'start' });
  },

  // ── INVENTARIO CÍCLICO POR REFERENCIA ──────────────────────────────────────

  _ivRefDone() {
    const d = this._op;
    document.getElementById('m-title').textContent = 'Inventario Cíclico';
    document.getElementById('m-content').innerHTML = `
      <div class="op-view">
        <div style="background:#1e293b;color:#fff;border-radius:12px;padding:12px 14px;margin-bottom:16px;">
          <div style="font-size:.7rem;color:#94a3b8;margin-bottom:2px;">Sesión #${d.id}</div>
          <div style="font-weight:700;font-size:.9rem;">${this.esc(d.nombre||'Inventario')}</div>
        </div>
        <div style="text-align:center;padding:30px 20px;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:12px;">
          <i class="fa-solid fa-circle-check" style="font-size:2.5rem;color:#16a34a;margin-bottom:12px;display:block;"></i>
          <div style="font-size:.95rem;font-weight:800;color:#15803d;margin-bottom:6px;">¡Conteo Completado!</div>
          <div style="font-size:.78rem;color:#166534;">Todas sus referencias han sido finalizadas.</div>
        </div>
        <button onclick="MWMS.viewInventario()"
          style="width:100%;margin-top:16px;padding:12px;background:transparent;border:1px solid #e2e8f0;border-radius:10px;font-size:.82rem;color:#64748b;cursor:pointer;">
          <i class="fa-solid fa-arrow-left"></i> Volver a Mis Tareas
        </button>
      </div>`;
  },

  renderIvReferencia(asigs) {
    const d = this._op;
    document.getElementById('m-title').textContent = 'Inventario Cíclico';
    document.getElementById('m-content').innerHTML = `
      <div class="op-view">
        <div style="background:#1e293b;color:#fff;border-radius:12px;padding:12px 14px;margin-bottom:10px;">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
            <span style="font-size:.7rem;color:#94a3b8;">Sesión #${d.id}</span>
            <span style="font-size:.65rem;background:#4f46e530;color:#a5b4fc;padding:2px 8px;border-radius:20px;font-weight:700;">Cíclico · Referencias</span>
          </div>
          <div style="font-weight:700;font-size:.9rem;line-height:1.3;">${this.esc(d.nombre||'Inventario')}</div>
        </div>

        <div style="font-size:.72rem;font-weight:700;color:#64748b;letter-spacing:.5px;margin-bottom:8px;padding:0 2px;">
          <i class="fa-solid fa-box-open"></i> REFERENCIAS ASIGNADAS
        </div>

        <div id="iv-ref-list">
          ${asigs.map(a => {
            const prod = a.producto || {};
            const done = a.estado === 'Finalizado';
            return `
            <div class="op-card" style="border-left:4px solid ${done?'#10b981':'#4f46e5'};opacity:${done?.75:1};">
              <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;">
                <div style="flex:1;min-width:0;">
                  <div style="font-weight:700;font-size:.85rem;color:#1e293b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${this.esc(prod.nombre||'—')}</div>
                  <div style="font-size:.68rem;color:#64748b;">Cód: ${this.esc(prod.codigo_interno||'—')}</div>
                </div>
                <span style="font-size:.6rem;font-weight:800;padding:2px 8px;border-radius:12px;white-space:nowrap;
                  background:${done?'#dcfce7':'#ede9fe'};color:${done?'#15803d':'#4f46e5'};">
                  ${done?'FINALIZADO':'EN CONTEO'}
                </span>
              </div>
              ${done ? '' : `
              <div style="display:flex;gap:8px;margin-top:8px;">
                <button onclick="MWMS.ivRefConteo(${a.id},${prod.id})"
                  style="flex:1;background:#4f46e5;color:#fff;border:none;border-radius:8px;padding:10px;font-size:.8rem;cursor:pointer;font-weight:700;">
                  <i class="fa-solid fa-plus"></i> Agregar Conteo
                </button>
                <button onclick="MWMS.ivRefFinalizar(${a.id})"
                  style="flex:1;background:#10b981;color:#fff;border:none;border-radius:8px;padding:10px;font-size:.8rem;cursor:pointer;font-weight:700;">
                  <i class="fa-solid fa-flag-checkered"></i> Finalizar
                </button>
              </div>`}
            </div>`;
          }).join('')}
        </div>

        <button onclick="MWMS.viewInventario()"
          style="width:100%;margin-top:12px;padding:12px;background:transparent;border:1px solid #e2e8f0;border-radius:10px;font-size:.82rem;color:#64748b;cursor:pointer;">
          <i class="fa-solid fa-arrow-left"></i> Volver a Mis Tareas
        </button>
      </div>`;
  },

  async ivRefConteo(asigId, prodId) {
    this.loading(true);
    let ubicaciones = [];
    try {
      const r = await mApi('GET', `/v2/inventario/productos/${prodId}/ubicaciones`);
      ubicaciones = r.data || [];
    } catch(_) {}
    this.loading(false);

    const d    = this._op;
    const asig = (d.misAsigs || []).find(a => a.id == asigId) || {};
    const prod = asig.producto || {};
    const fvObligatorio = d.fv_obligatorio !== false;

    this._ivRefAsigId    = asigId;
    this._ivRefProdCodigo = prod.codigo_interno || '';

    const html = `
      <div class="op-view">
        <div style="background:#4f46e5;color:#fff;border-radius:12px;padding:10px 14px;margin-bottom:10px;">
          <div style="font-size:.65rem;opacity:.75;margin-bottom:2px;">Registrar conteo · Asig. #${asigId}</div>
          <div style="font-weight:700;font-size:.88rem;">${this.esc(prod.nombre||'—')}</div>
          <div style="font-size:.68rem;opacity:.75;">Cód: ${this.esc(prod.codigo_interno||'—')}</div>
        </div>

        ${ubicaciones.length ? `
        <div class="op-card" id="iv-ref-ubic-chips-card" style="padding:10px 12px;background:#eff6ff;">
          <div style="font-size:.68rem;font-weight:700;color:#1d4ed8;margin-bottom:6px;">
            <i class="fa-solid fa-location-dot"></i> SELECCIONE UBICACIÓN CON STOCK
          </div>
          <div style="display:flex;flex-wrap:wrap;gap:6px;">
            ${ubicaciones.map(u => `
              <button type="button" class="iv-ubic-chip"
                onclick="MWMS._ivRefClickUbic(this,'${this.esc(u.codigo)}',${u.id||0},${prodId})"
                style="background:#dbeafe;border:1px solid #93c5fd;color:#1d4ed8;border-radius:8px;padding:6px 12px;font-size:.75rem;font-weight:700;cursor:pointer;transition:all .15s;">
                <i class="fa-solid fa-location-dot" style="font-size:.7rem;"></i>
                ${this.esc(u.codigo)} <span style="opacity:.65;font-weight:400;">${u.cantidad} uds</span>
              </button>`).join('')}
          </div>
        </div>` : `
        <div class="op-card" style="background:#fef3c7;padding:8px 12px;font-size:.75rem;color:#92400e;">
          <i class="fa-solid fa-triangle-exclamation"></i> Sin stock registrado en sistema para este producto.
        </div>`}

        <div class="op-card">
          <div class="m-label">Ubicación <span style="color:#dc2626;">*</span></div>
          <input id="iv-ref-ubic" class="m-input-full" placeholder="Código de ubicación..." autocomplete="off" style="text-transform:uppercase;">
        </div>

        <div id="iv-ref-fechas-panel"></div>

        <div class="op-card">
          <div class="m-label">Fecha Vencimiento ${fvObligatorio?'<span style="color:#dc2626;">*</span>':'<span style="font-size:.65rem;color:#94a3b8;">(opcional)</span>'}</div>
          <input type="date" id="iv-ref-fv" class="m-input-full" placeholder="O seleccione fecha arriba">
        </div>

        <input type="hidden" id="iv-ref-upc" value="${parseInt(prod.unidades_caja || 1)}">
        <div class="op-card">
          <div class="m-label" id="iv-ref-cant-label">${parseInt(prod.unidades_caja || 1) > 1 ? 'Cajas' : 'Cantidad (unidades)'} <span style="color:#dc2626;">*</span></div>
          <input type="number" id="iv-ref-cant" class="m-input-full" placeholder="0" min="0" step="0.001" oninput="MWMS._ivRefUpdPreview()">
          <div id="iv-ref-conv-preview" style="display:${parseInt(prod.unidades_caja || 1) > 1 ? 'block' : 'none'};margin-top:6px;padding:8px;background:#eff6ff;border-radius:6px;font-size:.78rem;color:#1e40af;font-weight:600;">
            <i class="fa-solid fa-calculator"></i> <span id="iv-ref-conv-text"></span>
          </div>
        </div>

        <div class="op-card" id="iv-ref-saldos-group" style="border-left:3px solid #d97706;display:${parseInt(prod.unidades_caja || 1) > 1 ? 'block' : 'none'};">
          <div class="m-label" style="color:#d97706;"><i class="fa-solid fa-cubes-stacked"></i> Saldos (Sueltos)</div>
          <input type="number" id="iv-ref-saldos" class="m-input-full" value="0" min="0" step="0.001" placeholder="0" oninput="MWMS._ivRefUpdPreview()">
        </div>

        <button id="iv-ref-submit-btn" onclick="MWMS.ivRefSubmitLine()"
          style="width:100%;background:#4f46e5;color:#fff;border:none;border-radius:10px;padding:14px;font-size:.9rem;font-weight:800;cursor:pointer;margin-top:4px;">
          <i class="fa-solid fa-save"></i> Guardar Conteo
        </button>

        <div id="iv-ref-lines-here" style="margin-top:12px;"></div>

        <button onclick="MWMS.renderIv()"
          style="width:100%;margin-top:8px;padding:11px;background:transparent;border:1px solid #e2e8f0;border-radius:10px;font-size:.82rem;color:#64748b;cursor:pointer;">
          <i class="fa-solid fa-arrow-left"></i> Volver a Referencias
        </button>
      </div>`;

    document.getElementById('m-title').textContent = 'Conteo de Referencia';
    document.getElementById('m-content').innerHTML = html;
    document.getElementById('iv-ref-ubic').focus();
    this._ivRefLoadLines(asigId);
  },

  async _ivRefLoadLines(asigId) {
    const cont = document.getElementById('iv-ref-lines-here');
    if (!cont) return;
    try {
      const qs = asigId ? `?asignacion_id=${asigId}` : '';
      const r = await mApi('GET', `/v2/inventario/sesiones/${this._op.id}/mis-lineas${qs}`);
      const lines = r.data || [];
      if (!lines.length) { cont.innerHTML = ''; return; }
      cont.innerHTML = `
        <div style="font-size:.7rem;font-weight:700;color:#4f46e5;margin-bottom:6px;letter-spacing:.5px;">
          <i class="fa-solid fa-list-check"></i> CONTEOS GUARDADOS (${lines.length})
        </div>
        ${lines.map(l => `
          <div style="background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:8px 10px;margin-bottom:5px;display:flex;justify-content:space-between;align-items:center;">
            <div>
              <div style="font-size:.72rem;font-weight:700;color:#1e293b;">${this.esc(l.ubicacion_codigo||'—')}</div>
              <div style="font-size:.65rem;color:#64748b;">
                ${l.fecha_vencimiento?'<i class="fa-solid fa-calendar" style="color:#dc2626;"></i> '+this.formatDate(l.fecha_vencimiento):'Sin FV'}
              </div>
            </div>
            <div style="font-size:1rem;font-weight:800;color:#1e293b;">${l.cantidad}</div>
          </div>`).join('')}`;
    } catch(_) { cont.innerHTML = ''; }
  },

  _ivRefUpdPreview() {
    const upc    = Math.max(1, parseInt(document.getElementById('iv-ref-upc')?.value || 1));
    const cant   = parseFloat(document.getElementById('iv-ref-cant')?.value   || 0) || 0;
    const saldos = parseFloat(document.getElementById('iv-ref-saldos')?.value || 0) || 0;
    const el = document.getElementById('iv-ref-conv-text');
    if (!el || upc <= 1) return;
    const total = Math.round((cant * upc + saldos) * 1000) / 1000;
    el.textContent = `${cant} cajas × ${upc} + ${saldos} sueltos = ${total} UND/TOTAL`;
  },

  async ivRefSubmitLine() {
    const ubic   = (document.getElementById('iv-ref-ubic')?.value || '').trim().toUpperCase();
    const fv     = document.getElementById('iv-ref-fv')?.value || '';
    const cant   = parseFloat(document.getElementById('iv-ref-cant')?.value   || 0) || 0;
    const saldos = parseFloat(document.getElementById('iv-ref-saldos')?.value || 0) || 0;
    const upc    = Math.max(1, parseInt(document.getElementById('iv-ref-upc')?.value || 1));
    const fvObligatorio = this._op.fv_obligatorio !== false;

    const totalUnidades = upc > 1 ? (cant * upc + saldos) : cant;

    if (totalUnidades < 0 || (cant <= 0 && saldos <= 0)) return this.toast('Ingrese una cantidad válida', 'warning');
    if (!ubic) return this.toast('Ingrese el código de ubicación', 'warning');
    if (fvObligatorio && !fv) return this.toast('La fecha de vencimiento es obligatoria', 'warning');

    const btn = document.getElementById('iv-ref-submit-btn');
    if (btn) { btn.disabled = true; btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Guardando...'; }

    try {
      await mApi('POST', `/v2/inventario/sesiones/${this._op.id}/conteo-manual`, {
        producto_codigo:   this._ivRefProdCodigo,
        ubicacion_codigo:  ubic,
        cantidad:          Math.round(totalUnidades * 1000) / 1000,
        cantidad_cajas:    upc > 1 ? cant : null,
        saldos:            upc > 1 ? saldos : null,
        fecha_vencimiento: fv || null,
        lote:              null,
        ronda:             this._op.ronda_actual || 1,
        asignacion_id:     this._ivRefAsigId,
      });
      this.toast('Conteo guardado', 'success');
      document.getElementById('iv-ref-ubic').value   = '';
      document.getElementById('iv-ref-fv').value     = '';
      document.getElementById('iv-ref-cant').value   = '';
      document.getElementById('iv-ref-saldos').value = '0';
      this._ivRefUpdPreview();
      document.getElementById('iv-ref-ubic').focus();
      this._ivRefLoadLines(this._ivRefAsigId);
    } catch(e) {
      this.toast(e.message || 'Error guardando conteo', 'error');
    } finally {
      if (btn) { btn.disabled = false; btn.innerHTML = '<i class="fa-solid fa-save"></i> Guardar Conteo'; }
    }
  },

  async ivRefFinalizar(asigId) {
    if (!confirm('¿Finalizar el conteo de esta referencia?\n\nYa no podrá agregar más líneas para esta asignación.')) return;
    this.loading(true);
    try {
      await mApi('POST', `/v2/inventario/asignaciones/${asigId}/finalizar`, {});
      this.toast('Conteo finalizado', 'success');
      // Recargar mis-asignaciones para reflejar el estado Finalizado
      const asigR = await mApi('GET', '/v2/inventario/mis-asignaciones');
      const misAsigs = (asigR.data || []).filter(a => a.sesion_id == this._op.id);
      this._op.misAsigs = misAsigs;
      this.renderIv();
    } catch(e) { this.toast(e.message || 'Error finalizando', 'error'); }
    finally { this.loading(false); }
  },

  // ── CÍCLICO MÓVIL: ubicación interactiva + fechas automáticas ──────────────
  _ivRefClickUbic(btn, codigo, ubicId, prodId) {
    // Resaltar chip seleccionado
    document.querySelectorAll('.iv-ubic-chip').forEach(b => {
      b.style.background = '#dbeafe';
      b.style.border = '1px solid #93c5fd';
      b.style.color = '#1d4ed8';
    });
    if (btn) {
      btn.style.background = '#1d4ed8';
      btn.style.border = '1px solid #1d4ed8';
      btn.style.color = '#fff';
    }
    // Rellenar campo de ubicación
    const inp = document.getElementById('iv-ref-ubic');
    if (inp) inp.value = codigo;

    // Cargar fechas disponibles para este producto en esta ubicación
    const panel = document.getElementById('iv-ref-fechas-panel');
    if (!panel) return;
    if (!ubicId || !prodId) return;

    panel.innerHTML = `
      <div style="padding:8px 14px;color:#64748b;font-size:.75rem;text-align:center;">
        <i class="fa-solid fa-spinner fa-spin"></i> Cargando fechas activas...
      </div>`;

    mApi('GET', `/v2/inventario/productos/${prodId}/fechas-vencimiento?ubicacion_id=${ubicId}`)
      .then(r => this._ivRefRenderFechas(r.data || []))
      .catch(() => { panel.innerHTML = ''; });
  },

  _ivRefRenderFechas(fechas) {
    const panel = document.getElementById('iv-ref-fechas-panel');
    if (!panel) return;
    if (!fechas.length) { panel.innerHTML = ''; return; }
    panel.innerHTML = `
      <div class="op-card" style="padding:10px 12px;background:#f0fdf4;border:1px solid #bbf7d0;">
        <div style="font-size:.68rem;font-weight:700;color:#166534;margin-bottom:8px;">
          <i class="fa-solid fa-calendar-days"></i> FECHAS ACTIVAS — Toque para seleccionar
        </div>
        <div style="display:flex;flex-wrap:wrap;gap:6px;">
          ${fechas.map(fv => `
            <button type="button" class="iv-fv-chip"
              onclick="MWMS._ivRefSelFecha(this,'${fv}')"
              style="background:#dcfce7;border:1px solid #86efac;color:#15803d;border-radius:8px;
                     padding:8px 14px;font-size:.78rem;font-weight:700;cursor:pointer;transition:all .15s;">
              <i class="fa-solid fa-calendar-check" style="font-size:.7rem;"></i> ${fv}
            </button>`).join('')}
        </div>
      </div>`;
  },

  _ivRefSelFecha(btn, fv) {
    // Resaltar fecha seleccionada
    document.querySelectorAll('.iv-fv-chip').forEach(b => {
      b.style.background = '#dcfce7';
      b.style.border = '1px solid #86efac';
      b.style.color = '#15803d';
    });
    if (btn) {
      btn.style.background = '#16a34a';
      btn.style.border = '1px solid #16a34a';
      btn.style.color = '#fff';
    }
    // Rellenar campo de fecha
    const inp = document.getElementById('iv-ref-fv');
    if (inp) inp.value = fv;
    // Scroll a cantidad
    const cantInp = document.getElementById('iv-ref-cant');
    if (cantInp) { cantInp.focus(); cantInp.scrollIntoView({ behavior: 'smooth', block: 'center' }); }
  },

  async _ivVaciarUbicacion() {
    const loc = this._curLoc;
    if (!loc?.codigo) { this.toast('Seleccione primero una ubicación', 'warning'); return; }
    const codigo = loc.codigo;
    if (!confirm(`¿Dejar en CERO la ubicación "${codigo}"?\n\nSe registrará como conteo en cero y se ajustará el inventario si había existencias.`)) return;
    this.loading(true);
    try {
      const r     = await mApi('POST', '/inventario/vaciar-ubicacion', { ubicacion_codigo: codigo });
      const ajust = r.data?.ajustados ?? 0;
      this.toast(
        ajust > 0 ? `"${codigo}" vaciada — ${ajust} ajuste(s) registrado(s)` : `"${codigo}" ya estaba vacía`,
        ajust > 0 ? 'success' : 'info'
      );
      await this.refreshIvLines();
      this._setIvStep1();
    } catch(e) { this.toast(e.message || 'Error vaciando ubicación', 'error'); }
    finally { this.loading(false); }
  },

  /* ─── Guardar conteo (producto ya seleccionado) ─── */
  async _submitIvConteo(prod) {
    const loc              = this._curLoc;
    const esCargueInicial  = this._op.tipo === 'CargueInicial';
    /* fv_obligatorio: CargueInicial siempre true, otros tipos según config de sesión */
    const fvObligatorio    = esCargueInicial || (this._op.fv_obligatorio !== false);
    /* Mostrar campo FV si: producto controla vencimiento, O sesión CargueInicial */
    const mostrarFv        = prod.controla_vencimiento || esCargueInicial;

    /* En modo "no obligatorio" y con producto que controla FV → precargar fechas históricas */
    let ultimasFv = [];
    if (mostrarFv && !fvObligatorio && loc?.id) {
      try {
        const r = await mApi('GET', `/v2/inventario/productos/${prod.id}/fechas-vencimiento?ubicacion_id=${loc.id}`);
        ultimasFv = Array.isArray(r.data) ? r.data : [];
      } catch(_) {}
    }

    this.openCapture(prod, async r => {
      this.loading(true);
      try {
        await mApi('POST', `/v2/inventario/sesiones/${this._op.id}/conteo-manual`, {
          producto_codigo:   prod.codigo_interno,
          ubicacion_codigo:  loc.codigo,
          cantidad:          r.q,
          cantidad_cajas:    r.cantidad_cajas ?? null,
          saldos:            r.saldos ?? null,
          lote:              null,
          fecha_vencimiento: r.fv || null,
          ronda:             this._op.ronda_actual || 1
        });
        this.toast(`✓ ${prod.nombre} × ${r.q}`, 'success');
        this._curLoc = null;
        this._setIvStep1();
        this.refreshIvLines();
      } catch(e) { this.toast(e.message, 'error'); }
      finally { this.loading(false); }
    });

    /* ── Personalización del modal para inventario ── */
    /* Saldos siempre visible; Lote oculto */
    const saldosGroup = document.getElementById('m-cap-saldos-group');
    const loteGroup   = document.getElementById('m-cap-lote-group');
    const loteInp     = document.getElementById('m-cap-lote');
    if (saldosGroup) saldosGroup.style.display = 'block';
    if (loteGroup)   loteGroup.style.display   = 'none';
    if (loteInp)     loteInp.value             = 'N/A';

    /* FV: mostrar/ocultar según lógica de sesión */
    const fvGroup    = document.getElementById('m-cap-fv-group');
    const fvLabel    = document.getElementById('m-cap-fv-label');
    const fv2Label   = document.getElementById('m-cap-fv2-label');
    const fvReqInput = document.getElementById('m-cap-fv-required');
    const chipsDiv   = document.getElementById('m-cap-fv-chips');

    if (fvGroup) {
      fvGroup.style.display = mostrarFv ? 'block' : 'none';
    }
    if (fvReqInput) {
      fvReqInput.value = (mostrarFv && fvObligatorio) ? '1' : '0';
    }
    if (fvLabel && mostrarFv) {
      fvLabel.innerHTML = fvObligatorio
        ? 'Fecha Vencimiento (FEFO) <span style="color:#ef4444;font-weight:900;">*</span>'
        : 'Fecha Vencimiento (FEFO) <span style="font-size:.65rem;color:#64748b;font-weight:400;">(opcional)</span>';
    }
    if (fv2Label && mostrarFv) {
      fv2Label.style.display = fvObligatorio ? '' : 'none';
      document.getElementById('m-cap-fv2').style.display = fvObligatorio ? '' : 'none';
    }

    /* Chips de selección rápida (solo en modo no-obligatorio) */
    if (chipsDiv) {
      if (mostrarFv && !fvObligatorio && ultimasFv.length) {
        chipsDiv.innerHTML = `
          <div style="font-size:.67rem;color:#64748b;font-weight:700;margin-bottom:4px;">ÚLTIMAS FECHAS MANEJADAS:</div>
          <div style="display:flex;flex-wrap:wrap;gap:6px;">
            ${ultimasFv.map(fv => `
              <button type="button" onclick="document.getElementById('m-cap-fv').value='${fv}';"
                style="background:#eff6ff;border:1px solid #93c5fd;color:#1d4ed8;border-radius:8px;
                       padding:5px 11px;font-size:.72rem;font-weight:700;cursor:pointer;">
                ${fv}
              </button>`).join('')}
          </div>`;
        chipsDiv.style.display = 'block';
      } else {
        chipsDiv.style.display = 'none';
      }
    }
  },

  /* ─── UI helpers paso 1 / paso 2 ─── */
  _setIvStep1() {
    const card  = document.getElementById('iv-step-card');
    const badge = document.getElementById('iv-step-badge');
    const hdr   = document.getElementById('m-iv-header');
    const inp   = document.getElementById('m-iv-scan');
    const sug   = document.getElementById('m-iv-suggestions');
    if (card)  { card.style.borderColor = '#3b82f6'; card.style.boxShadow = '0 2px 8px rgba(59,130,246,.15)'; }
    if (badge) { badge.style.background = '#3b82f6'; badge.textContent = 'PASO 1'; }
    if (hdr)   hdr.innerHTML = 'ESCANEE O BUSQUE LA UBICACIÓN';
    if (inp)   { inp.value = ''; inp.placeholder = 'Código de ubicación...'; inp.focus(); }
    if (sug)   sug.style.display = 'none';
    this._curLoc = null;
    const vacBtn = document.getElementById('iv-vaciar-loc-btn');
    if (vacBtn) vacBtn.style.display = 'none';
  },

  _setIvStep2(loc) {
    const card  = document.getElementById('iv-step-card');
    const badge = document.getElementById('iv-step-badge');
    const hdr   = document.getElementById('m-iv-header');
    const inp   = document.getElementById('m-iv-scan');
    const sug   = document.getElementById('m-iv-suggestions');
