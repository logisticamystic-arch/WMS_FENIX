          <div style="display:flex;justify-content:space-between;align-items:flex-start;">
            <div>
              <div style="font-size:.65rem;opacity:.7;text-transform:uppercase;">Cliente</div>
              <div style="font-weight:900;font-size:1rem;">${this.esc(sesion.sucursal_entrega)}</div>
              <div style="display:flex;gap:8px;margin-top:6px;flex-wrap:wrap;">
                <span style="font-size:.65rem;background:rgba(255,255,255,.12);border-radius:4px;padding:2px 6px;">${tipoLabel} actual: <strong>#${numActual}</strong></span>
                <span style="font-size:.65rem;background:rgba(255,255,255,.12);border-radius:4px;padding:2px 6px;">Pendiente: <strong>${pendientes.length} ref(s)</strong></span>
                ${canatasCerradas > 0 ? `<span style="font-size:.65rem;background:#059669;border-radius:4px;padding:2px 6px;cursor:pointer;" onclick="MWMS._packingVerCanastas(${sesionId})"><i class="fa-solid fa-boxes-stacked"></i> <strong>${canatasCerradas}</strong> ${tipoLabel}${canatasCerradas!==1?'s':''} cerrada${canatasCerradas!==1?'s':''}</span>` : ''}
              </div>
            </div>
            <button onclick="MWMS._packingSeleccionarImpresora(${sesionId})"
              title="${sesion.impresora_sticker_id ? 'Impresora configurada' : 'Sin impresora'}"
              style="background:${sesion.impresora_sticker_id ? '#059669' : '#6b7280'};color:#fff;border:none;border-radius:8px;padding:6px 10px;font-size:.7rem;cursor:pointer;white-space:nowrap;margin-top:2px;">
              <i class="fa-solid fa-print"></i> ${sesion.impresora_sticker_id ? 'Impresora ✓' : 'Sin impresora'}
            </button>
          </div>
        </div>

        ${pendientes.length && unidad_abierta ? (() => {
          // Agrupar por ambiente
          const ambGrupos = {};
          pendientes.forEach(p => {
            const ambName = p.ambiente_nombre || 'Sin ambiente';
            // Aplicar el filtro de ambiente si existe
            if (MWMS._activeAmbienteFilter && ambName.toLowerCase() !== MWMS._activeAmbienteFilter && MWMS._activeAmbienteFilter !== 'all') {
              return;
            }
            if (!ambGrupos[ambName]) ambGrupos[ambName] = { color: p.ambiente_color || '#64748b', items: [] };
            ambGrupos[ambName].items.push(p);
          });

          const searchBar = `
            <div style="position:relative;margin-bottom:10px;">
              <i class="fa-solid fa-search" style="position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#94a3b8;font-size:.75rem;pointer-events:none;"></i>
              <input id="pk-m-search" type="text" placeholder="Buscar referencia o código..."
                oninput="
                  const q=(this.value||'').toLowerCase().trim();
                  document.querySelectorAll('.pk-pend-card').forEach(el=>{
                    el.style.display=!q||(el.dataset.nombre||'').includes(q)||(el.dataset.codigo||'').includes(q)?'':'none';
                  });
                  document.querySelectorAll('.pk-m-amb-hdr').forEach(h=>{
                    let nx=h.nextElementSibling;let vis=false;
                    while(nx&&nx.classList.contains('pk-pend-card')){if(nx.style.display!=='none')vis=true;nx=nx.nextElementSibling;}
                    h.style.display=vis?'':'none';
                  });
                "
                style="width:100%;padding:8px 12px 8px 32px;border:1px solid #e2e8f0;border-radius:8px;font-size:.8rem;box-sizing:border-box;background:#f8fafc;">
            </div>`;

          const grupos = Object.entries(ambGrupos).map(([ambNombre, grupo]) => {
            const hdr = `<div class="pk-m-amb-hdr" style="display:flex;align-items:center;gap:7px;padding:5px 0;margin-bottom:4px;border-bottom:2px solid ${grupo.color}20;">
              <span style="width:9px;height:9px;border-radius:50%;background:${grupo.color};flex-shrink:0;display:inline-block;"></span>
              <span style="font-size:.6rem;font-weight:900;color:#475569;text-transform:uppercase;letter-spacing:.5px;">${ambNombre}</span>
              <span style="font-size:.58rem;color:#94a3b8;margin-left:auto;">${grupo.items.length} ref(s)</span>
            </div>`;
            const cards = grupo.items.map(p => {
              const upc = p.unidades_caja||1;
              const cj  = Math.floor(p.pendiente);
              const sl  = Math.round((p.pendiente - cj) * upc * 100) / 100;
              const cantHtml = upc > 1
                ? `<div style="font-size:.75rem;font-weight:900;color:#d97706;">${cj} cj${sl>0?' + '+sl+' suelt.':''}</div>
                   <div style="font-size:.6rem;color:#94a3b8;">${upc} uds/cj · ${p.pendiente} cj total</div>`
                : `<div style="font-size:.75rem;font-weight:900;color:#d97706;">${p.pendiente} uds</div>`;
              return `<div class="pk-pend-card op-card"
                data-nombre="${this.esc((p.nombre||'').toLowerCase())}"
                data-codigo="${this.esc((p.codigo||'').toLowerCase())}"
                onclick="MWMS._packingAgregarItem(${sesionId},${p.producto_id},${p.pendiente},'${this.esc(p.nombre)}',${upc})"
                style="cursor:pointer;border-left:4px solid ${grupo.color};margin-bottom:8px;padding:8px 12px;">
                <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;">
                  <div style="flex:1;min-width:0;">
                    <div style="font-size:.58rem;color:#64748b;">${this.esc(p.codigo||'-')}</div>
                    <div style="font-weight:800;font-size:.82rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${this.esc(p.nombre)}</div>
                  </div>
                  <div style="text-align:right;flex-shrink:0;">${cantHtml}</div>
                </div>
              </div>`;
            }).join('');
            return hdr + cards;
          }).join('');

          return `
            <div style="font-size:.63rem;font-weight:800;color:#0F4C81;text-transform:uppercase;margin:10px 0 6px;">
              PRODUCTOS PENDIENTES — ${tipoLabel} #${numActual} (${pendientes.length})
            </div>
            ${searchBar}
            ${grupos}`;
        })() : ''}

        ${!pendientes.length && !puedeFinalize ? `
        <div style="text-align:center;padding:30px 16px;color:#94a3b8;">
          <i class="fa-solid fa-check-circle" style="font-size:2rem;color:#10b981;display:block;margin-bottom:8px;"></i>
          <div style="font-size:.8rem;font-weight:700;color:#374151;">Todos los productos empacados</div>
          <div style="font-size:.7rem;margin-top:4px;">Finaliza la sesión para completar el packing</div>
        </div>` : ''}

      </div>

      <div style="position:sticky;bottom:0;background:#fff;border-top:2px solid #e2e8f0;padding:10px 12px;z-index:40;display:flex;gap:8px;box-shadow:0 -4px 14px rgba(0,0,0,.10);">
        <button class="m-btn secondary" onclick="MWMS.viewPacking()" style="flex-shrink:0;padding:0 10px;">
          <i class="fa-solid fa-arrow-left"></i>
        </button>
        ${canatasCerradas > 0 ? `
        <button onclick="MWMS._packingVerCanastas(${sesionId})"
          style="flex-shrink:0;padding:0 10px;background:#f1f5f9;color:#0F4C81;border:1.5px solid #cbd5e1;border-radius:8px;font-size:.72rem;font-weight:800;cursor:pointer;">
          <i class="fa-solid fa-boxes-stacked"></i> ${canatasCerradas}
        </button>` : ''}
        ${unidad_abierta ? `
        <button class="m-btn warning" onclick="MWMS._packingCerrarUnidad(${unidad_abierta},${sesionId})"
          style="flex:1;${openUnitItems > 0 ? '' : 'opacity:.5;cursor:not-allowed;'}"
          ${openUnitItems > 0 ? '' : 'disabled'}>
          <i class="fa-solid fa-box"></i> Cerrar ${tipoLabel}
        </button>` : ''}
        <button class="m-btn success" onclick="MWMS._packingFinalizar(${sesionId})"
          style="flex:1;${puedeFinalize ? '' : 'opacity:.4;cursor:not-allowed;'}"
          ${puedeFinalize ? '' : 'disabled'}>
          <i class="fa-solid fa-check-double"></i> Finalizar
        </button>
      </div>`;
    } catch(e) {
      this.toast(e.message || 'Error al cargar sesión', 'error');
    }
    this.loading(false);
  },

  async _packingVerCanastas(sesionId) {
    document.getElementById('m-title').textContent = 'Canastas';
    const cont = document.getElementById('m-content');
    cont.innerHTML = '<div class="pull-indicator"><i class="fa-solid fa-spinner fa-spin"></i> Cargando canastas...</div>';
    this.loading(true);
    try {
      const r = await mApi('GET', `/packing/sesion/${sesionId}`);
      const { sesion, unidades, productos, totales } = r.data || {};
      if (!sesion) { this.toast('Sesión no disponible', 'error'); return; }
      const tipoLabel  = { canasta:'Canasta', caja:'Caja', paquete:'Paquete' }[sesion.tipo_empaque] || sesion.tipo_empaque;
      const cerradas   = unidades.filter(u => u.estado === 'Cerrada').sort((a, b) => a.consecutivo - b.consecutivo);
      const abierta    = unidades.find(u => u.estado === 'Abierta');
      const pendientes = productos.filter(p => p.pendiente > 0.001);

      const fmtTs = dt => dt ? new Date(dt).toLocaleTimeString('es-CO', { hour:'2-digit', minute:'2-digit' }) : '—';
      const fmtDesglose = it => {
        const cj = it.cantidad_cajas || 0;
        const sl = it.saldo || 0;
        if (cj > 0 || sl > 0)
          return `${cj > 0 ? cj + ' cj' : ''}${cj > 0 && sl > 0 ? ' + ' : ''}${sl > 0 ? sl + ' suelt.' : ''}`;
        return it.cantidad + ' uds';
      };

      cont.innerHTML = `<div class="op-view" style="padding-bottom:80px;">

        <div style="background:#0f172a;color:#fff;margin:-10px -10px 14px;padding:12px 14px;">
          <div style="font-size:.48rem;font-weight:700;opacity:.5;text-transform:uppercase;letter-spacing:.5px;">PACKING · ${this.esc(sesion.sucursal_entrega)}</div>
          <div style="font-size:1rem;font-weight:900;">${cerradas.length} ${tipoLabel}${cerradas.length !== 1 ? 's' : ''} cerrada${cerradas.length !== 1 ? 's' : ''}</div>
          <div style="font-size:.65rem;opacity:.7;margin-top:2px;">${cerradas.length} total · ${totales.total_empacado} uds empacadas</div>
        </div>

        ${cerradas.length === 0 ? `
          <div style="text-align:center;padding:40px 16px;color:#94a3b8;">
            <i class="fa-solid fa-box-open" style="font-size:2.2rem;display:block;margin-bottom:10px;"></i>
            <div style="font-size:.82rem;font-weight:700;">Aún no hay canastas cerradas</div>
          </div>` :
          cerradas.map(u => {
            const itemsHtml = (u.items || []).map(it => `
              <div style="display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid #f1f5f9;">
                <span style="font-size:.72rem;color:#374151;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${this.esc(it.producto_nombre)}</span>
                <span style="font-size:.72rem;font-weight:800;color:#0F4C81;flex-shrink:0;margin-left:8px;">${fmtDesglose(it)}</span>
              </div>`).join('') || '<div style="font-size:.7rem;color:#94a3b8;padding:5px 0;">Sin ítems</div>';
            return `
            <div style="border:1px solid #e2e8f0;border-radius:10px;margin-bottom:10px;overflow:hidden;">
              <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:#f0fdf4;">
                <div>
                  <span style="font-size:.77rem;font-weight:900;color:#065f46;">${tipoLabel} #${u.consecutivo}</span>
                  <span style="font-size:.62rem;color:#6b7280;margin-left:6px;">${fmtTs(u.closed_at)}</span>
                </div>
                <span style="font-size:.72rem;font-weight:800;color:#059669;">${u.total_unidades ?? (u.items||[]).reduce((s, i) => s + (i.cantidad || 0), 0)} uds</span>
              </div>
              <div style="padding:6px 12px;">${itemsHtml}</div>
            </div>`;
          }).join('')
        }

        ${abierta ? `
        <div style="border:1.5px dashed #d97706;border-radius:10px;padding:10px 12px;margin-top:4px;">
          <div style="font-size:.65rem;font-weight:800;color:#d97706;margin-bottom:6px;text-transform:uppercase;">${tipoLabel} #${abierta.consecutivo} — abierta (${(abierta.items||[]).length} ítem(s))</div>
          ${pendientes.length ? `
          <div style="font-size:.65rem;color:#64748b;margin-bottom:8px;">${pendientes.length} referencia(s) pendiente(s) de empacar</div>
          ${pendientes.slice(0,5).map(p => `
            <div onclick="MWMS._packingRenderSesion(${sesionId})" style="cursor:pointer;display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #fef3c7;">
              <span style="font-size:.7rem;color:#374151;">${this.esc(p.nombre)}</span>
              <span style="font-size:.7rem;font-weight:800;color:#d97706;">${p.pendiente} cj pend.</span>
            </div>`).join('')}
          ${pendientes.length > 5 ? `<div style="font-size:.62rem;color:#94a3b8;text-align:center;margin-top:4px;">+${pendientes.length - 5} más — toca para ver todas</div>` : ''}
          ` : '<div style="font-size:.7rem;color:#059669;font-weight:700;"><i class="fa-solid fa-check"></i> Todos los productos empacados</div>'}
        </div>` : ''}

      </div>

      <div style="position:sticky;bottom:0;background:#fff;border-top:2px solid #e2e8f0;padding:10px 12px;z-index:40;display:flex;gap:8px;box-shadow:0 -4px 14px rgba(0,0,0,.10);">
        <button class="m-btn secondary" onclick="MWMS._packingRenderSesion(${sesionId})" style="flex:1;">
          <i class="fa-solid fa-arrow-left"></i> Volver al packing
        </button>
      </div>`;
    } catch(e) {
      this.toast(e.message || 'Error al cargar canastas', 'error');
    }
    this.loading(false);
  },

  async _packingAgregarItem(sesionId, productoId, maxPend, nombre, upc) {
    // maxPend llega en CAJAS (igual que cantidad_pickeada)
    // cajaDef = cajas enteras; saldoDef = fracción de caja expresada en unidades sueltas
    const upcVal   = parseInt(upc) || 1;
    const cajaDef  = Math.floor(maxPend);
    const saldoDef = Math.round((maxPend - cajaDef) * upcVal * 100) / 100;

    const { value, isConfirmed } = await Swal.fire({
      title: 'Agregar a canasta',
      html: `
        <div style="font-weight:800;font-size:.9rem;margin-bottom:8px;color:#1e3a5f;">${nombre}</div>

        <!-- Resumen pendiente discriminado -->
        <div style="background:#fef3c7;border:1px solid #fcd34d;border-radius:8px;padding:8px 10px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;">
          <div style="text-align:center;flex:1;">
            <div style="font-size:.65rem;color:#92400e;font-weight:700;text-transform:uppercase;">Cajas pend.</div>
            <div style="font-size:1.4rem;font-weight:900;color:#b45309;line-height:1.1;">${cajaDef}</div>
            <div style="font-size:.6rem;color:#92400e;">${upcVal} uds/cj</div>
          </div>
          ${upcVal > 1 && saldoDef > 0 ? `
          <div style="font-size:1.2rem;color:#d97706;font-weight:300;">+</div>
          <div style="text-align:center;flex:1;">
            <div style="font-size:.65rem;color:#92400e;font-weight:700;text-transform:uppercase;">Sueltas pend.</div>
            <div style="font-size:1.4rem;font-weight:900;color:#b45309;line-height:1.1;">${saldoDef}</div>
            <div style="font-size:.6rem;color:#92400e;">uds sueltas</div>
          </div>` : ''}
          <div style="font-size:1.2rem;color:#d97706;font-weight:300;">=</div>
          <div style="text-align:center;flex:1;">
            <div style="font-size:.65rem;color:#92400e;font-weight:700;text-transform:uppercase;">Total</div>
            <div style="font-size:1.4rem;font-weight:900;color:#b45309;line-height:1.1;">${maxPend}</div>
            <div style="font-size:.6rem;color:#92400e;">${upcVal > 1 ? 'cajas' : 'unidades'}</div>
          </div>
        </div>

        <!-- Campos editables (pre-llenados con los valores pendientes) -->
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:8px;">
          <div>
            <label style="display:block;font-size:.72rem;font-weight:800;color:#374151;margin-bottom:3px;">
              Cajas a certificar
            </label>
            <input id="pk-cajas" type="number" min="0" max="${cajaDef}" value="${cajaDef}"
              class="swal2-input" style="margin:0;font-size:1.1rem;font-weight:700;text-align:center;"
              oninput="const c=parseInt(this.value)||0,s=parseFloat(document.getElementById('pk-saldo').value)||0;
                       const tot=Math.round((c+s/${upcVal})*1000)/1000;
                       document.getElementById('pk-total').textContent=tot+' cj';
                       document.getElementById('pk-total-badge').style.background=tot>${maxPend}+0.001?'#dc2626':'#059669';">
          </div>
          <div>
            <label style="display:block;font-size:.72rem;font-weight:800;color:#374151;margin-bottom:3px;">
              Uds sueltas
            </label>
            <input id="pk-saldo" type="number" min="0" max="${Math.round((upcVal-0.001)*100)/100}" step="0.01" value="${saldoDef}"
              class="swal2-input" style="margin:0;font-size:1.1rem;font-weight:700;text-align:center;"
              oninput="const c=parseInt(document.getElementById('pk-cajas').value)||0,s=parseFloat(this.value)||0;
                       const tot=Math.round((c+s/${upcVal})*1000)/1000;
                       document.getElementById('pk-total').textContent=tot+' cj';
                       document.getElementById('pk-total-badge').style.background=tot>${maxPend}+0.001?'#dc2626':'#059669';">
          </div>
        </div>
        <div id="pk-total-badge" style="background:#059669;border-radius:8px;padding:8px;text-align:center;font-weight:900;font-size:1.1rem;color:#fff;transition:background .2s;">
          Total: <span id="pk-total">${maxPend} cj</span>
        </div>`,
      showCancelButton: true,
      confirmButtonText: 'Agregar a canasta',
      cancelButtonText: 'Cancelar',
      confirmButtonColor: '#0F4C81',
      didOpen: () => {
        const c = parseInt(document.getElementById('pk-cajas').value) || 0;
        const s = parseFloat(document.getElementById('pk-saldo').value) || 0;
        const tot = Math.round((c + s / upcVal) * 1000) / 1000;
        document.getElementById('pk-total').textContent = tot + ' cj';
      },
      preConfirm: () => {
        const c = parseInt(document.getElementById('pk-cajas').value) || 0;
        const s = parseFloat(document.getElementById('pk-saldo').value) || 0;
        // cantidad en CAJAS (igual que cantidad_pickeada): c cajas enteras + s/upc fracción
        const cantidad = Math.round((c + s / upcVal) * 1000) / 1000;
        if (cantidad <= 0) return Swal.showValidationMessage('La cantidad debe ser mayor a 0');
        if (cantidad > maxPend + 0.001) return Swal.showValidationMessage(`Máximo ${maxPend} cj (${cajaDef} cj + ${saldoDef} suelt.)`);
        return { cantidad, cajas: c, saldo: s };
      },
    });
    if (!isConfirmed || !value) return;
    this.loading(true);
    try {
      await mApi('POST', `/packing/sesion/${sesionId}/item`, {
        producto_id:    productoId,
        cantidad:       value.cantidad,   // en cajas
        cantidad_cajas: value.cajas,
        saldo:          value.saldo,
      });
      const cjTxt = value.cajas > 0 ? `${value.cajas} cj` : '';
      const slTxt = value.saldo > 0 ? `${value.saldo} suelt.` : '';
      const desc  = [cjTxt, slTxt].filter(Boolean).join(' + ') || `${value.cantidad} cj`;
      this.toast(`${desc} agregados a la canasta`, 'success');
      if (this._postPackRefresh) {
        const fn = this._postPackRefresh;
        this._postPackRefresh = null;
        await fn();
      } else {
        await this._packingRenderSesion(sesionId);
      }
    } catch(e) {
      this.toast(e.message || 'Error al agregar', 'error');
    }
    this.loading(false);
  },

  async _packingCerrarUnidad(unidadId, sesionId) {
    const ok = await Swal.fire({
      title: '¿Cerrar esta canasta?',
      text: 'Se generará la siguiente en consecutivo.',
      icon: 'question',
      showCancelButton: true,
      confirmButtonText: 'Sí, cerrar',
      cancelButtonText: 'Cancelar',
      confirmButtonColor: '#d97706',
    });
    if (!ok.isConfirmed) return;
    this.loading(true);
    try {
      const r = await mApi('POST', `/packing/unidad/${unidadId}/cerrar`);
      this.toast(`Canasta #${r.data.unidad_cerrada.consecutivo} cerrada. Nueva #${r.data.nueva_unidad.consecutivo}`, 'success');
      await this._packingRenderSesion(sesionId);
    } catch(e) {
      this.toast(e.message || 'Error al cerrar canasta', 'error');
    }
    this.loading(false);
  },

  async _packingFinalizar(sesionId) {
    const ok = await Swal.fire({
      title: '¿Finalizar certificación?',
      text: 'Se cierran todas las canastas y se marca la certificación como completada.',
      icon: 'question',
      showCancelButton: true,
      confirmButtonText: 'Sí, finalizar',
      cancelButtonText: 'Cancelar',
      confirmButtonColor: '#059669',
    });
    if (!ok.isConfirmed) return;
    this.loading(true);
    try {
      const r = await mApi('POST', `/packing/sesion/${sesionId}/finalizar`);
      await Swal.fire({
        title: '¡Certificación completa!',
        html: `<div style="font-size:.9rem;">
          <div>${r.data.sucursal_entrega}</div>
          <div style="font-weight:800;font-size:1.2rem;color:#059669;margin:8px 0;">${r.data.total_unidades} canasta(s)</div>
          <div style="font-size:.78rem;color:#64748b;">La remisión está lista para imprimir</div>
        </div>`,
        icon: 'success',
        confirmButtonText: 'Ver remisión',
        showCancelButton: true,
        cancelButtonText: 'Volver',
        confirmButtonColor: '#059669',
      }).then(res => {
        if (res.isConfirmed) this._packingRemision(sesionId);
        else this.viewPacking();
      });
    } catch(e) {
      this.toast(e.message || 'Error al finalizar', 'error');
    }
    this.loading(false);
  },

  _packingRemision(sesionId) {
    this._packingOpenPrint(`/packing/sesion/${sesionId}/remision`, 'Remisión');
  },

  _packingImprimirTodas(sesionId) {
    this._packingOpenPrint(`/packing/sesion/${sesionId}/etiquetas`, 'Etiquetas');
  },

  _packingEtiqueta(unidadId) {
    this._packingOpenPrint(`/packing/unidad/${unidadId}/etiqueta`, 'Etiqueta');
  },

  async _packingImprimirRed(unidadId, sesionId) {
    this.loading(true);
    try {
      const r = await mApi('POST', `/packing/unidad/${unidadId}/imprimir`);
      if (r.data?.browser) {
        this._packingOpenPrint(`/packing/unidad/${unidadId}/etiqueta`, 'Etiqueta');
        this.toast(r.message || 'Abriendo para imprimir...', 'success');
      } else {
        this.toast(r.message || 'Enviado a impresora', 'success');
      }
    } catch(e) {
      if (e.message?.includes('No hay impresora')) {
        this.toast('Sin impresora configurada. Configúrala primero.', 'warning');
        await this._packingSeleccionarImpresora(sesionId);
      } else {
        this.toast(e.message || 'Error al imprimir', 'error');
      }
    }
    this.loading(false);
  },

  async _packingSeleccionarImpresora(sesionId) {
    this.loading(true);
    let impresoras = [];
    try {
      const r = await mApi('GET', '/impresoras');
      impresoras = r.data || [];
    } catch(_) {}
    this.loading(false);

    if (!impresoras.length) {
      return this.toast('No hay impresoras configuradas en el sistema', 'warning');
    }

    const opciones = {};
    opciones[''] = '— Sin impresora —';
    impresoras.forEach(i => { opciones[i.id] = `${i.nombre} (${i.ip}:${i.puerto})`; });

    const { value, isConfirmed } = await Swal.fire({
      title: 'Seleccionar impresora de rótulos',
      input: 'select',
      inputOptions: opciones,
      inputPlaceholder: 'Seleccionar...',
      showCancelButton: true,
      confirmButtonText: 'Guardar',
      cancelButtonText: 'Cancelar',
      confirmButtonColor: '#059669',
    });
    if (!isConfirmed) return;

    this.loading(true);
    try {
      await mApi('PUT', `/packing/sesion/${sesionId}/impresoras`, {
        impresora_sticker_id: value || null,
      });
      this.toast(value ? 'Impresora configurada' : 'Impresora removida', 'success');
      await this._packingRenderSesion(sesionId);
    } catch(e) {
      this.toast(e.message || 'Error al guardar', 'error');
    }
    this.loading(false);
  },

  // apiPath: ruta relativa al API (igual que mApi), ej: '/packing/unidad/5/etiqueta'
  _packingOpenPrint(apiPath, titulo) {
    const win = window.open('', '_blank');
    if (!win) { this.toast('Permite ventanas emergentes para imprimir', 'warning'); return; }
    win.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${titulo}...</title></head>
      <body style="font-family:sans-serif;padding:20px;color:#555;">
        <p>&#9203; Cargando ${titulo}...</p>
      </body></html>`);
    win.document.close();
    const url = window.location.origin + M_API + apiPath;
    fetch(url, { headers: { 'Authorization': 'Bearer ' + (_mToken || '') } })
      .then(r => {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.text();
      })
      .then(html => {
        if (win.closed) return;
        win.document.open();
        win.document.write(html);
        win.document.close();
      })
      .catch(e => {
        if (!win.closed) {
          win.document.open();
          win.document.write(`<!DOCTYPE html><html><body style="font-family:sans-serif;padding:20px;">
            <h3 style="color:#dc2626;">Error al cargar ${titulo}</h3><p>${e.message}</p>
            <p style="font-size:.8rem;color:#64748b;">${url}</p>
          </body></html>`);
          win.document.close();
        }
        this.toast('Error: ' + e.message, 'error');
      });
  },

  // ── Certificación por ambiente (orden_pickings directo) ─────────────────────

  async startCertOrden(sucursal) {
    this.loading(true);
    this._certOrden = { sucursal, items: [] };
    this._certCurrentAmbiente = null;
    try {
      const r = await mApi('GET', `/picking/certificacion/detalle/${encodeURIComponent(sucursal)}`);
      this._certOrden.items = r.data || [];
    } catch(e) {
      this.toast(e.message || 'Error al cargar', 'error');
    } finally {
      this.loading(false);
    }
    this._certRenderAmbientes();
  },

  _certRenderAmbientes() {
    const { sucursal, items } = this._certOrden;

    const ambMap = {};
    items.forEach(it => {
      const pick = it.cantidad_pickeada || 0;
      if (pick <= 0) return;
      const amb   = it.ambiente_nombre || 'Sin ambiente';
      const color = it.ambiente_color  || '#64748b';
      if (!ambMap[amb]) ambMap[amb] = { color, total: 0, certified: 0 };
      ambMap[amb].total++;
      if ((it.cantidad_certificada || 0) >= pick) ambMap[amb].certified++;
    });

    const ambientes = Object.entries(ambMap);
    const totalRefs = ambientes.reduce((s, [, g]) => s + g.total,     0);
    const certRefs  = ambientes.reduce((s, [, g]) => s + g.certified, 0);
    const todosDone = totalRefs > 0 && certRefs >= totalRefs;
    const pct       = totalRefs > 0 ? Math.round(certRefs / totalRefs * 100) : 0;

    document.getElementById('m-title').textContent = 'Certificar';
    document.getElementById('m-content').innerHTML = `
      <div class="op-view" style="padding-bottom:80px;">

        <div style="background:#0f172a;color:#fff;margin:-10px -10px 14px;padding:12px 14px;">
          <div style="font-size:.46rem;font-weight:700;opacity:.5;text-transform:uppercase;letter-spacing:.5px;">SUCURSAL</div>
          <div style="font-size:.95rem;font-weight:900;margin-bottom:8px;">${this.esc(sucursal)}</div>
          <div style="background:rgba(255,255,255,.18);border-radius:20px;height:6px;margin-bottom:5px;">
            <div style="background:${pct===100?'#10b981':'#60a5fa'};height:6px;border-radius:20px;width:${pct}%;transition:width .4s;"></div>
          </div>
          <div style="display:flex;justify-content:space-between;font-size:.58rem;opacity:.8;">
            <span>${certRefs} / ${totalRefs} referencias certificadas</span>
            <span style="font-weight:900;">${pct}%</span>
          </div>
        </div>

        <div style="font-size:.54rem;font-weight:800;color:#64748b;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;">
          ${todosDone ? '✓ TODOS LOS AMBIENTES VERIFICADOS' : 'SELECCIONA UN AMBIENTE PARA VERIFICAR'}
        </div>

        ${ambientes.map(([ambNombre, g]) => {
          const done   = g.certified >= g.total;
          const ambPct = Math.round(g.certified / g.total * 100);
          return `
          <div class="op-card" onclick="MWMS._certVerificarAmbiente('${this.esc(ambNombre)}')"
            style="border-left:4px solid ${done ? '#10b981' : g.color};margin-bottom:10px;padding:12px 14px;cursor:pointer;">
            <div style="display:flex;align-items:center;gap:10px;">
              <div style="width:38px;height:38px;border-radius:50%;background:${done ? '#d1fae5' : g.color + '1a'};display:flex;align-items:center;justify-content:center;flex-shrink:0;">
                <i class="fa-solid ${done ? 'fa-circle-check' : 'fa-clipboard-list'}" style="font-size:.95rem;color:${done ? '#059669' : g.color};"></i>
              </div>
              <div style="flex:1;min-width:0;">
                <div style="font-weight:900;font-size:.88rem;color:${done ? '#065f46' : '#1e293b'};">${this.esc(ambNombre)}</div>
                <div style="font-size:.65rem;margin-top:3px;color:${done ? '#059669' : '#64748b'};">
                  ${done ? `✓ Completado · ${g.total} ref(s)` : `${g.certified} / ${g.total} referencias verificadas`}
                </div>
                ${!done ? `
                <div style="background:#e2e8f0;border-radius:10px;height:3px;margin-top:5px;">
                  <div style="background:${g.color};height:3px;border-radius:10px;width:${ambPct}%;"></div>
                </div>` : ''}
              </div>
              <i class="fa-solid fa-chevron-right" style="color:#94a3b8;font-size:.75rem;flex-shrink:0;"></i>
            </div>

          <div style="font-size:.7rem;color:#64748b;margin-top:4px;">Cierra la certificación para registrarla</div>
        </div>` : ''}

        <div style="position:sticky;bottom:0;background:#fff;border-top:1px solid #e2e8f0;padding:10px;
          display:grid;grid-template-columns:${todosDone ? '1fr 2fr' : '1fr'};gap:8px;margin-top:12px;">

            <i class="fa-solid fa-arrow-left"></i> Volver

                  <div style="font-size:.42rem;font-weight:700;color:#94a3b8;text-transform:uppercase;margin-bottom:1px;">Pick / Cert</div>
                  <div style="font-size:.88rem;font-weight:900;">
                    <span style="color:#0F4C81;">${pick}</span>
                    <span style="color:#cbd5e1;font-size:.6rem;"> / </span>
                    <span style="color:${done?'#059669':cert>0?'#d97706':'#94a3b8'};">${cert||'—'}</span>
                  </div>
                  ${diff>0&&cert>0 ? `<div style="font-size:.48rem;color:#d97706;font-weight:700;">Falta: ${diff}</div>` : ''}
                </div>
                <div style="width:20px;text-align:center;flex-shrink:0;">
                  ${done
                    ? '<i class="fa-solid fa-check-circle" style="color:#10b981;font-size:.9rem;"></i>'
                    : `<i class="fa-solid fa-pen-to-square" style="color:${ambColor};opacity:.55;font-size:.78rem;"></i>`}
                </div>
              </div>
            </div>`;
          }).join('')}
        </div>
        <div id="cert-search-empty" style="display:none;text-align:center;padding:28px 16px;color:#94a3b8;">
          <i class="fa-solid fa-magnifying-glass" style="font-size:1.6rem;display:block;margin-bottom:8px;opacity:.35;"></i>
          <div style="font-size:.78rem;font-weight:700;">Sin resultados</div>
          <div style="font-size:.65rem;margin-top:3px;">Intenta con otro código o nombre</div>
        </div>

        <!-- Barra inferior de navegación -->
        <div style="position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:2px solid #e2e8f0;
          padding:8px 10px;z-index:100;box-shadow:0 -4px 14px rgba(0,0,0,.10);">
          <div style="display:grid;grid-template-columns:42px 1fr${todosOk&&(nextAmb||!nextAmb)?' 42px':''};gap:6px;align-items:stretch;">
            <button onclick="MWMS._certRenderAmbientes()"
              style="width:42px;min-height:46px;background:#f1f5f9;border:1.5px solid #cbd5e1;
                     color:#475569;border-radius:8px;cursor:pointer;font-size:.9rem;">
              <i class="fa-solid fa-arrow-left"></i>
            </button>
            <div style="display:flex;flex-direction:column;justify-content:center;
              background:${todosOk?'#f0fdf4':'#f8fafc'};border-radius:8px;padding:4px 10px;
              border:1px solid ${todosOk?'#bbf7d0':'#e2e8f0'};">
              <div style="font-size:.5rem;font-weight:700;color:#64748b;text-transform:uppercase;">${this.esc(ambiente)}</div>
              <div style="font-size:.7rem;font-weight:900;color:${todosOk?'#059669':ambColor};">
                ${todosOk ? '✓ Completado' : `${total - certCount} referencia(s) pendiente(s)`}
              </div>
            </div>
            ${todosOk && nextAmb ? `
            <button onclick="MWMS._certVerificarAmbiente('${this.esc(nextAmb)}')"
              style="width:42px;min-height:46px;background:#0F4C81;color:#fff;border:none;
                     border-radius:8px;cursor:pointer;font-size:.9rem;" title="${this.esc(nextAmb)}">
              <i class="fa-solid fa-arrow-right"></i>
            </button>` : ''}
            ${todosOk && !nextAmb && todosAmbsDone ? `
            <button onclick="MWMS._certFinalizar('${this.esc(sucursal)}')"
              style="width:42px;min-height:46px;background:#059669;color:#fff;border:none;
                     border-radius:8px;cursor:pointer;font-size:.85rem;" title="Cerrar certificación">
              <i class="fa-solid fa-check-double"></i>
            </button>` : (todosOk && !nextAmb && !todosAmbsDone ? `
            <button disabled title="Faltan ambientes por certificar"
              style="width:42px;min-height:46px;background:#f1f5f9;border:1.5px solid #e2e8f0;
                     color:#94a3b8;border-radius:8px;cursor:not-allowed;font-size:.85rem;">
              <i class="fa-solid fa-lock"></i>
            </button>` : '')}
          </div>
        </div>
      </div>`;

    this._certFiltrarItems = (q) => {
      const term  = (q || '').toLowerCase().trim();
      const cards = document.querySelectorAll('.cert-item-ref');
      let visible = 0;
      cards.forEach(el => {
        const match = !term || (el.dataset.nombre||'').includes(term) || (el.dataset.codigo||'').includes(term);
        el.style.display = match ? '' : 'none';
        if (match) visible++;
      });
      const cnt = document.getElementById('cert-search-count');
      if (cnt) cnt.textContent = term ? `${visible}/${cards.length}` : '';
      const empty = document.getElementById('cert-search-empty');
      if (empty) empty.style.display = visible === 0 && term ? '' : 'none';
    };
  },

  async _certCertificarTodoAmb(ambiente) {
    const { sucursal, items } = this._certOrden;
    const pending = items
      .map((it, idx) => ({ ...it, _idx: idx }))
      .filter(it =>
        (it.ambiente_nombre || 'Sin ambiente') === ambiente &&
        (it.cantidad_pickeada || 0) > 0 &&
        (it.cantidad_certificada || 0) < (it.cantidad_pickeada || 0)
      );
    if (!pending.length) return;

    const { isConfirmed } = await Swal.fire({
      title: '¿Verificar todo?',
      text: `${pending.length} referencia(s) se certificarán con la cantidad pickeada exacta.`,
      icon: 'question', showCancelButton: true,
      confirmButtonText: 'Sí, verificar', cancelButtonText: 'Cancelar',
      confirmButtonColor: '#7c3aed',
    });
    if (!isConfirmed) return;

    this.loading(true);
    let errores = 0;
    for (const it of pending) {
      try {
        await mApi('POST', '/picking/certificacion/confirmar', {
          producto_id:      it.producto_id,
          sucursal_entrega: sucursal,
          cantidad:         it.cantidad_pickeada,
        });
        this._certOrden.items[it._idx].cantidad_certificada = it.cantidad_pickeada;
      } catch(e) { errores++; }
    }
    this.loading(false);

    if (errores > 0) this.toast(`${errores} error(es) al certificar`, 'warning');
    else this.toast(`${pending.length} referencia(s) verificadas`, 'success');
    this._certVerificarAmbiente(ambiente);
  },

  async _certPackingAmbiente(sucursal, ambiente) {
    this._certCurrentAmbiente = ambiente;
    this.loading(true);
    try {
      if (!this._certSesion) {
        const activaR = await mApi('GET', `/packing/sesion/activa/${encodeURIComponent(sucursal)}`).catch(() => null);
        const sesId = activaR?.data?.sesion_id;
        if (!sesId) {
          this.loading(false);
          const { value: tipoEmp, isConfirmed } = await Swal.fire({
            title: 'Tipo de empaque',
            html: `<div style="font-size:.85rem;color:#64748b;margin-bottom:6px;">Ambiente: <strong>${this.esc(ambiente)}</strong></div>
                   <div style="font-size:.78rem;color:#94a3b8;">Se aplicará a todos los ambientes de esta entrega</div>`,
            input: 'select',
            inputOptions: { canasta: 'Canasta', caja: 'Caja', paquete: 'Paquete' },
            inputPlaceholder: '— seleccionar —',
            showCancelButton: true,
            confirmButtonText: 'Iniciar Packing',
            cancelButtonText: 'Cancelar',
            confirmButtonColor: '#0F4C81',
          });
          if (!isConfirmed || !tipoEmp) return;
          this.loading(true);
          const cR = await mApi('POST', '/packing/sesion', { sucursal_entrega: sucursal, tipo_empaque: tipoEmp });
          const sesR = await mApi('GET', `/packing/sesion/${cR.data.sesion_id}`);
          this._certSesion = sesR.data;
        } else {
          const sesR = await mApi('GET', `/packing/sesion/${sesId}`);
          this._certSesion = sesR.data;
        }
      } else {
        const sesR = await mApi('GET', `/packing/sesion/${this._certSesion.sesion.id}`);
        this._certSesion = sesR.data;
      }
      this._certRenderPackingAmbiente();
    } catch(e) {
      this.toast(e.message || 'Error al iniciar packing', 'error');
    } finally {
      this.loading(false);
    }
  },

  _certRenderPackingAmbiente() {
    const { sucursal } = this._certOrden;
    const ambiente = this._certCurrentAmbiente;
    const { sesion, unidad_abierta, unidades, productos } = this._certSesion || {};
    if (!sesion) { this.toast('Sesión de packing no disponible', 'error'); this._certRenderAmbientes(); return; }

    const sesionId       = sesion.id;
    const tipoLabel      = { canasta:'Canasta', caja:'Caja', paquete:'Paquete' }[sesion.tipo_empaque] || sesion.tipo_empaque;
    const openUnit       = (unidades || []).find(u => Number(u.id) === Number(unidad_abierta));
    const openUnitItems  = openUnit?.items?.length || 0;
    const canatasCerradas= (unidades || []).filter(u => u.estado === 'Cerrada').length;
    const prodsAmb       = (productos || []).filter(p => (p.ambiente_nombre || 'Sin ambiente') === ambiente);
    const pendAmb        = prodsAmb.filter(p => (p.pendiente || 0) > 0.001);
    const ambColor       = prodsAmb[0]?.ambiente_color || '#0F4C81';
    const todosPacked    = pendAmb.length === 0 && prodsAmb.length > 0;
    const canCerrar      = todosPacked && openUnitItems === 0;

    document.getElementById('m-title').textContent = `Packing · ${ambiente}`;
    document.getElementById('m-content').innerHTML = `
      <div class="op-view" style="padding-bottom:116px;">

        <div style="background:#1e3a5f;color:#fff;border-radius:10px;padding:10px 14px;margin-bottom:12px;">
          <div style="display:flex;justify-content:space-between;align-items:center;">
            <div>
              <div style="font-size:.44rem;opacity:.65;text-transform:uppercase;letter-spacing:.5px;">AMBIENTE</div>
              <div style="font-weight:900;font-size:.9rem;display:flex;align-items:center;gap:6px;">
                <span style="width:8px;height:8px;border-radius:50%;background:${ambColor};flex-shrink:0;"></span>
                ${this.esc(ambiente)}
              </div>
              <div style="font-size:.6rem;opacity:.75;margin-top:2px;">${this.esc(sucursal)}</div>
            </div>
            <div style="text-align:right;">
              <div style="font-size:.44rem;opacity:.65;text-transform:uppercase;">${tipoLabel} #${openUnit?.consecutivo || '—'}</div>
              <div style="font-size:.7rem;background:rgba(255,255,255,.12);border-radius:6px;padding:3px 8px;margin-top:4px;">${pendAmb.length} pendiente(s)</div>
              ${canatasCerradas > 0 ? `<div style="font-size:.6rem;background:rgba(16,185,129,.25);border-radius:4px;padding:2px 6px;margin-top:4px;cursor:pointer;" onclick="MWMS._packingVerCanastas(${sesionId})"><i class="fa-solid fa-boxes-stacked"></i> ${canatasCerradas} cerrada(s)</div>` : ''}
            </div>
          </div>
        </div>

        ${prodsAmb.length === 0 ? `
          <div style="text-align:center;padding:40px 16px;color:#94a3b8;">
            <i class="fa-solid fa-inbox" style="font-size:2rem;display:block;margin-bottom:10px;"></i>
            <div style="font-size:.82rem;font-weight:700;">Sin referencias en este ambiente</div>
          </div>`
        : todosPacked ? `
          <div style="text-align:center;padding:24px 16px;">
            <i class="fa-solid fa-circle-check" style="font-size:2.2rem;color:#10b981;display:block;margin-bottom:10px;"></i>
            <div style="font-size:.92rem;font-weight:900;color:#065f46;">¡Ambiente completamente empacado!</div>
            <div style="font-size:.7rem;color:#64748b;margin-top:6px;">${prodsAmb.length} ref(s) en canastas</div>
            ${openUnitItems > 0 ? `<div style="font-size:.7rem;color:#d97706;margin-top:8px;font-weight:700;"><i class="fa-solid fa-triangle-exclamation"></i> Cierra la canasta actual primero</div>` : ''}
          </div>
          ${prodsAmb.map(p => `
          <div style="border-left:4px solid #10b981;background:#f0fdf4;border-radius:8px;padding:8px 12px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;">
            <div>
              <div style="font-size:.55rem;color:#94a3b8;font-family:monospace;">${this.esc(p.codigo || '')}</div>
              <div style="font-weight:800;font-size:.8rem;color:#065f46;">${this.esc(p.nombre)}</div>
            </div>
            <i class="fa-solid fa-check-circle" style="color:#10b981;font-size:1.1rem;"></i>
          </div>`).join('')}`
        : `
          <div style="font-size:.55rem;font-weight:800;color:#64748b;text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px;">
            ${pendAmb.length} REF(S) PENDIENTE(S) — TOQUE PARA AGREGAR A LA ${tipoLabel.toUpperCase()}
          </div>
          ${prodsAmb.map(p => {
            const pend = p.pendiente || 0;
            const done = pend <= 0.001;
            const upc  = p.unidades_caja || 1;
            const cj   = Math.floor(pend);
            const sl   = Math.round((pend - cj) * upc * 100) / 100;
            return `
            <div class="op-card"
              ${!done ? `onclick="MWMS._certPackItem(${sesionId},${p.producto_id},${pend},'${this.esc(p.nombre)}',${upc})"` : ''}
              style="border-left:4px solid ${done ? '#10b981' : ambColor};margin-bottom:8px;padding:10px 12px;cursor:${done ? 'default' : 'pointer'};opacity:${done ? .75 : 1};">
              <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;">
                <div style="flex:1;min-width:0;">
                  <div style="font-size:.55rem;color:#94a3b8;font-family:monospace;">${this.esc(p.codigo || '')}</div>
                  <div style="font-weight:800;font-size:.82rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${this.esc(p.nombre)}</div>
                </div>
                <div style="text-align:right;flex-shrink:0;">
                  ${done
                    ? `<span style="color:#10b981;font-size:.78rem;font-weight:900;"><i class="fa-solid fa-check"></i> OK</span>`
                    : upc > 1
                      ? `<div style="font-size:.78rem;font-weight:900;color:#d97706;">${cj} cj${sl > 0 ? ' + ' + sl + ' sl.' : ''}</div>`
                      : `<div style="font-size:.78rem;font-weight:900;color:#d97706;">${pend} uds</div>`}
                </div>
                ${!done ? `<i class="fa-solid fa-hand-pointer" style="color:${ambColor};opacity:.5;font-size:.78rem;"></i>` : ''}
              </div>
            </div>`;
          }).join('')}`}

        <!-- ── Barra flotante ── -->
        <div style="position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:2px solid #e2e8f0;padding:8px 10px;z-index:100;box-shadow:0 -4px 14px rgba(0,0,0,.10);">
          <div style="display:flex;gap:6px;align-items:stretch;">

            <button onclick="MWMS._certRefreshAndRenderAmbientes()"
              style="flex-shrink:0;width:40px;min-height:48px;background:#f1f5f9;border:1.5px solid #cbd5e1;color:#475569;border-radius:8px;cursor:pointer;font-size:.9rem;">
              <i class="fa-solid fa-arrow-left"></i>
            </button>

            <button onclick="MWMS._certAgregarCanasta(${unidad_abierta || 0},${sesionId})"
              style="flex:1;min-height:48px;background:${unidad_abierta && openUnitItems > 0 ? '#0F4C81' : '#e2e8f0'};color:${unidad_abierta && openUnitItems > 0 ? '#fff' : '#94a3b8'};border:none;border-radius:8px;font-size:.62rem;font-weight:800;cursor:${unidad_abierta && openUnitItems > 0 ? 'pointer' : 'not-allowed'};line-height:1.3;"
              ${unidad_abierta && openUnitItems > 0 ? '' : 'disabled'}>
              <i class="fa-solid fa-plus"></i><br>Agregar<br>${tipoLabel}
            </button>

            <button onclick="MWMS._certCerrarCanasta(${unidad_abierta || 0},${sesionId})"
              style="flex:1;min-height:48px;background:${unidad_abierta && openUnitItems > 0 ? '#d97706' : '#e2e8f0'};color:${unidad_abierta && openUnitItems > 0 ? '#fff' : '#94a3b8'};border:none;border-radius:8px;font-size:.62rem;font-weight:800;cursor:${unidad_abierta && openUnitItems > 0 ? 'pointer' : 'not-allowed'};line-height:1.3;"
              ${unidad_abierta && openUnitItems > 0 ? '' : 'disabled'}>
              <i class="fa-solid fa-box"></i><br>Cerrar<br>${tipoLabel}
            </button>

            <button onclick="MWMS._certCerrarPacking('${this.esc(sucursal)}',${sesionId})"
              style="flex:1;min-height:48px;background:${canCerrar ? '#059669' : '#e2e8f0'};color:${canCerrar ? '#fff' : '#94a3b8'};border:none;border-radius:8px;font-size:.6rem;font-weight:800;cursor:${canCerrar ? 'pointer' : 'not-allowed'};line-height:1.3;"
              ${canCerrar ? '' : 'disabled'}>
              <i class="fa-solid fa-check-circle"></i><br>Cerrar<br>Packing
            </button>
          </div>
        </div>
      </div>`;
  },

  async _certPackItem(sesionId, productoId, maxPend, nombre, upc) {
    this._postPackRefresh = async () => {
      try {
        const sesR = await mApi('GET', `/packing/sesion/${sesionId}`);
        this._certSesion = sesR.data;
      } catch(e) {}
      this._certRenderPackingAmbiente();
    };
    await this._packingAgregarItem(sesionId, productoId, maxPend, nombre, upc);
  },

  async _certAgregarCanasta(unidadId, sesionId) {
    if (!unidadId) return;
    const ok = await Swal.fire({
      title: '¿Agregar nueva canasta?',
      text: 'Se sellará la actual y se abrirá una nueva para continuar empacando.',
      icon: 'question', showCancelButton: true,
      confirmButtonText: 'Sí, agregar', cancelButtonText: 'Cancelar', confirmButtonColor: '#0F4C81',
    });
    if (!ok.isConfirmed) return;
    this.loading(true);
    try {
      const r = await mApi('POST', `/packing/unidad/${unidadId}/cerrar`);
      this.toast(`Canasta #${r.data.unidad_cerrada.consecutivo} sellada — #${r.data.nueva_unidad.consecutivo} abierta`, 'success');
      const sesR = await mApi('GET', `/packing/sesion/${sesionId}`);
      this._certSesion = sesR.data;
      this._certRenderPackingAmbiente();
    } catch(e) { this.toast(e.message || 'Error', 'error'); }
    finally { this.loading(false); }
  },

  async _certCerrarCanasta(unidadId, sesionId) {
    if (!unidadId) return;
    const ok = await Swal.fire({
      title: '¿Cerrar esta canasta?',
      text: 'La canasta quedará sellada. Usa "Agregar" si necesitas otra.',
      icon: 'question', showCancelButton: true,
      confirmButtonText: 'Sí, cerrar', cancelButtonText: 'Cancelar', confirmButtonColor: '#d97706',
    });
    if (!ok.isConfirmed) return;
    this.loading(true);
    try {
      const r = await mApi('POST', `/packing/unidad/${unidadId}/cerrar`);
      this.toast(`Canasta #${r.data.unidad_cerrada.consecutivo} cerrada`, 'success');
      const sesR = await mApi('GET', `/packing/sesion/${sesionId}`);
      this._certSesion = sesR.data;
      this._certRenderPackingAmbiente();
    } catch(e) { this.toast(e.message || 'Error', 'error'); }
    finally { this.loading(false); }
  },

  async _certCerrarPacking(sucursal, sesionId) {
    const ok = await Swal.fire({
      title: `¿Listo con "${this._certCurrentAmbiente}"?`,
      text: 'El ambiente queda empacado. Continúa con los demás o finaliza la certificación.',
      icon: 'success', showCancelButton: true,
      confirmButtonText: 'Continuar', cancelButtonText: 'Cancelar', confirmButtonColor: '#059669',
    });
    if (!ok.isConfirmed) return;
    this.loading(true);
    try {
      const [certR, sesR] = await Promise.allSettled([
        mApi('GET', `/picking/certificacion/detalle/${encodeURIComponent(sucursal)}`),
        mApi('GET', `/packing/sesion/${sesionId}`),
      ]);
      if (certR.status === 'fulfilled') this._certOrden.items = certR.value?.data || [];
      if (sesR.status === 'fulfilled') this._certSesion = sesR.value?.data;
    } catch(e) {}
    this.loading(false);
    this._certRenderAmbientes();
  },

  async _certFinalizar(sucursal) {
    const sesionId = this._certSesion?.sesion?.id;
    const ok = await Swal.fire({
      title: '¿Finalizar certificación?',
      text: sesionId
        ? 'Se completará el packing y se cerrará la certificación de todos los pedidos.'
        : 'Se cerrará la certificación de todos los pedidos de esta entrega.',
      icon: 'question', showCancelButton: true,
      confirmButtonText: 'Sí, finalizar', cancelButtonText: 'Cancelar', confirmButtonColor: '#059669',
    });
    if (!ok.isConfirmed) return;
    this.loading(true);
    try {
      if (sesionId) {
        await mApi('POST', `/packing/sesion/${sesionId}/finalizar`);
      } else {
        await mApi('POST', '/picking/certificacion/finalizar', { sucursal_entrega: sucursal });
      }
      await Swal.fire({
        title: '¡Certificación completada!',
        text: `La entrega "${sucursal}" ha sido certificada correctamente.`,
        icon: 'success', confirmButtonText: 'OK', confirmButtonColor: '#059669',
      });
      this.viewCert();
    } catch(e) {
      this.toast(e.message || 'Error al finalizar', 'error');
    } finally {
      this.loading(false);
    }
  },

  async certifiCarLineaOrden(idx, sucursal) {
    const it   = this._certOrden.items[idx];
    const pick = it.cantidad_pickeada || 0;
    const { value, isConfirmed } = await Swal.fire({
      title: 'Certificar producto',
      html: `
        <div style="text-align:left;font-size:.85rem;margin-bottom:10px;">
          <b>${this.esc(it.nombre)}</b>
          <div style="color:#64748b;font-size:.75rem;">${it.codigo}</div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;">
          <div style="background:#eff6ff;padding:8px;border-radius:8px;text-align:center;">
            <div style="font-size:.6rem;font-weight:700;color:#64748b;">PICKEADO</div>
            <div style="font-size:1.5rem;font-weight:900;color:#0F4C81;">${pick}</div>
          </div>
          <div style="background:#f0fdf4;padding:8px;border-radius:8px;text-align:center;">
            <div style="font-size:.6rem;font-weight:700;color:#64748b;">VERIFICADO</div>
            <input type="number" id="swal-cert-qty" value="${it.cantidad_certificada || pick}"
              min="0" style="width:100%;border:2px solid #10b981;border-radius:6px;padding:4px;font-size:1.3rem;font-weight:900;text-align:center;">
          </div>
        </div>`,
      showCancelButton: true,
      confirmButtonText: 'Confirmar',
      cancelButtonText: 'Cancelar',
      confirmButtonColor: '#059669',
      preConfirm: () => {
        const v = parseFloat(document.getElementById('swal-cert-qty').value);
        if (isNaN(v) || v < 0) { Swal.showValidationMessage('Cantidad inválida'); return false; }
        return v;
      },
    });
    if (!isConfirmed) return;
    this.loading(true);
    try {
      await mApi('POST', '/picking/certificacion/confirmar', {

    try {

      this.toast(r.mensaje, r.es_completo ? 'success' : 'info');
      
      const detIdx = this._op.cert.detalles.findIndex(d => d.id === r.det_id);
      if (detIdx !== -1) {
        this._op.cert.detalles[detIdx].cantidad_certificada = r.cantidad_nueva;
        this._op.cert.detalles[detIdx].es_correcto = r.es_completo;
        this.renderCert();

      this.toast(e.message, 'error');
      this.pA();

  _loadTm: null,
  loading(s){ 
      let l=document.getElementById('m-loading'); 
      if(s){
          if(!l) {
              document.body.insertAdjacentHTML('beforeend',`
                <div id="m-loading" style="position:fixed;inset:0;background:rgba(255,255,255,.7);z-index:90000;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:2rem;color:#0F4C81;">
                  <i class="fa-solid fa-spinner fa-spin"></i>
                  <p style="font-size:.8rem;color:#64748b;margin-top:10px;font-weight:700;">PROCESANDO...</p>
                  <button id="m-loading-close" onclick="MWMS.loading(false)" 
                    style="display:none;margin-top:20px;background:#f1f5f9;border:1px solid #cbd5e1;padding:8px 16px;border-radius:8px;font-size:.7rem;color:#475569;font-weight:700;cursor:pointer;">
                    FORZAR CIERRE (ESC)
                  </button>
                </div>`);
          }
          // Temporizador de seguridad: si tarda > 5s, mostrar botón de cierre
          clearTimeout(this._loadTm);
          this._loadTm = setTimeout(() => {
              const btn = document.getElementById('m-loading-close');
              if (btn) btn.style.display = 'block';
          }, 5000);
          // Si tarda > 30s, cerrar solo
          setTimeout(() => { if (document.getElementById('m-loading')) this.loading(false); }, 30000);
      } else {
          if(l) l.remove();
          clearTimeout(this._loadTm);
      }
  },
  toast(m,t='info'){ const c=document.getElementById('m-toast'), e=document.createElement('div'); e.className='m-toast-item '+t; e.innerHTML=m; c.appendChild(e); setTimeout(()=>{e.style.opacity='0';setTimeout(()=>e.remove(),500);},3000); },
  esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); },
  showNotif() { this.viewNotifications(); },

    _showExpiryModal(aprobacionId, message, onApproved) {
      this._expiryAprobacionId = aprobacionId;
      this._expiryOnApproved   = onApproved;
      document.getElementById('m-expiry-msg').textContent = message;
      const modal = document.getElementById('m-expiry-modal');
      modal.style.display = 'flex';
      this._expiryPollTimer = setInterval(() => this._pollExpiry(), 10000);
    },

    async _pollExpiry() {
      if (!this._expiryAprobacionId) return;
      const idSnapshot = this._expiryAprobacionId;
      try {
        const r = await mApi('GET', '/aprobaciones/' + idSnapshot + '/estado');
        if (this._expiryAprobacionId !== idSnapshot) return; // cancelled mid-flight
        if (r.data?.estado === 'aprobada') {
          const cb = this._expiryOnApproved;
          this._closeExpiryModal();
          this.toast('Solicitud aprobada. Continuando...', 'success');
          if (cb) await cb();
        } else if (r.data?.estado === 'rechazada') {
          this._closeExpiryModal();
          this.toast('Solicitud rechazada por el supervisor.', 'error');
        }
      } catch(_) {}
    },

    _closeExpiryModal() {
      clearInterval(this._expiryPollTimer);
      this._expiryPollTimer    = null;
      this._expiryAprobacionId = null;
      this._expiryOnApproved   = null;
      const modal = document.getElementById('m-expiry-modal');
      if (modal) modal.style.display = 'none';
    },

    async _cancelarExpiry() {
      if (!this._expiryAprobacionId) return;
      try {
        await mApi('DELETE', '/aprobaciones/' + this._expiryAprobacionId);
      } catch(_) {}
      this._closeExpiryModal();
      this.toast('Solicitud cancelada', 'info');
    },

    try {
      const r = await mApi('POST', '/miscelaneos', {

        unidad_medida: document.getElementById('mm-um')?.value || 'UN',
        observaciones: document.getElementById('mm-obs')?.value.trim() || null,

  async _auBuscarUbi() {
    const cod = (document.getElementById('au-ubi-cod')?.value || '').trim();
    if (!cod) return this.toast('Ingrese el código de la ubicación', 'error');
    const el = document.getElementById('au-ubi-result');

    try {
      const r = await mApi('GET', `/param/ubicaciones?codigo=${encodeURIComponent(cod)}&limit=5`);
      const list = (r.data || r || []);
      const exact = list.find(u => u.codigo?.toLowerCase() === cod.toLowerCase()) || list[0];
      if (!exact) { el.innerHTML = '<span style="color:#dc2626;">Ubicación no encontrada</span>'; return; }
      this._auUbicacion = exact;
      el.innerHTML = `<div style="background:#d1fae5;border:1px solid #6ee7b7;border-radius:6px;padding:8px 12px;font-size:.82rem;">

          <i class="fa-solid fa-arrow-right"></i> Continuar con esta ubicación

  async _auSeleccionarModo(tipo) {
    this._auTipo = tipo;
    await this._auVerInventarioActual();
  },

  async _auVerInventarioActual() {
    if (!this._auUbicacion) return;
    this.loading(true);
    let invActual = [];
    try {
      const r = await mApi('GET', `/inventario/stock?ubicacion_id=${this._auUbicacion.id}&limit=50`);
      invActual = (r.data || r || []);
    } catch(e) {}
    this.loading(false);
    this._renderAuStep2(invActual);
  },

           <i class="fa-solid fa-plus"></i> AGREGAR INVENTARIO

         </span>`;

          return `<div style="padding:6px 0;border-bottom:1px solid #f1f5f9;font-size:.75rem;">
            <b>${this.esc(i.producto_nombre)}</b> <span style="color:#64748b;">Lote: ${i.lote || 'N/A'}</span><br>${det}</div>`;
        }).join('')

    const lineasHtml = this._auRenderLineas();

    document.getElementById('m-content').innerHTML = `
      <div class="op-view">
        <!-- Ubicación seleccionada + modo -->
        <div class="op-card" style="border-left:4px solid ${esAgregar ? '#10b981' : '#f59e0b'};background:${esAgregar ? '#f0fdf4' : '#fff7ed'};margin-bottom:10px;">
          <div style="font-size:.7rem;color:${esAgregar ? '#0369a1' : '#92400e'};font-weight:700;">UBICACIÓN SELECCIONADA</div>
          <div style="font-weight:700;">${ubiTxt}</div>
          ${modoBadge}
          <div style="display:flex;gap:6px;margin-top:8px;">

              <i class="fa-solid fa-pencil"></i> Cambiar ubi.

            <button class="m-btn secondary sm" onclick="MWMS._renderAuStepModo()">

          ${invHtml}

        <!-- Formulario agregar producto -->
        <div class="op-card" style="border-left:4px solid #059669;">
          <div style="font-size:.7rem;color:${esAgregar ? '#059669' : '#d97706'};font-weight:700;margin-bottom:10px;">

  async _auBuscarProd() {
    const q = (document.getElementById('au-prod-busq')?.value || '').trim();
    const listEl = document.getElementById('au-prod-list');
    if (!listEl) return;
    if (!q || q.length < 1) { listEl.style.display = 'none'; return; }
    try {
      const r = await mApi('GET', `/param/productos/buscar?q=${encodeURIComponent(q)}&limit=100&activo=true`);
      const prods = r.data || r || [];
      if (!prods.length) { listEl.style.display = 'none'; return; }
      listEl.style.display = 'block';
      listEl.innerHTML = prods.map(p =>
        `<div style="padding:8px 10px;cursor:pointer;border-bottom:1px solid #f1f5f9;font-size:.78rem;"
              onclick="MWMS._auSelProd(${JSON.stringify(p).replace(/"/g,'&quot;')})">
          <b>${this.esc(p.nombre)}</b><br>
          <span style="color:#64748b;">${this.esc(p.codigo_interno || '')}${(p.ean||p.codigo_ean) ? ' · EAN: ' + this.esc(p.ean||p.codigo_ean) : ''}</span>
        </div>`
      ).join('');
    } catch(e) { listEl.style.display = 'none'; }
  },

  _auSelProd(p) {
    this._auProdActual = p;
    const upc = Math.max(1, parseInt(p.unidades_caja || 1));
    document.getElementById('au-prod-list').style.display = 'none';
    document.getElementById('au-prod-busq').value = p.nombre;
    document.getElementById('au-prod-sel').style.display = 'block';
    document.getElementById('au-prod-info').innerHTML =
      `<b>${this.esc(p.nombre)}</b> — Código: ${this.esc(p.codigo_interno || '-')}` +
      (upc > 1 ? ` · ${upc} und/caja` : '');
    document.getElementById('au-cajas-wrap').style.display = upc > 1 ? '' : 'none';
    document.getElementById('au-saldos-label').textContent = upc > 1 ? 'Sueltos' : 'Cantidad';
    document.getElementById('au-lote-wrap').style.display  = (p.requiere_lote||p.controla_lote) ? '' : 'none';
    document.getElementById('au-fv-wrap').style.display    = (p.requiere_fecha_vencimiento||p.controla_vencimiento) ? '' : 'none';
    document.getElementById('au-cajas').value  = '';
    document.getElementById('au-saldos').value = '';
    document.getElementById('au-lote').value   = '';
    document.getElementById('au-fv').value     = '';
    this._auUpdTotal();
    setTimeout(() => (upc > 1 ? document.getElementById('au-cajas') : document.getElementById('au-saldos'))?.focus(), 80);
  },

  _auUpdTotal() {
    const p   = this._auProdActual;
    const upc = p ? Math.max(1, parseInt(p.unidades_caja || 1)) : 1;
    const cajas  = parseFloat(document.getElementById('au-cajas')?.value  || 0) || 0;
    const saldos = parseFloat(document.getElementById('au-saldos')?.value || 0) || 0;
    const total  = upc > 1 ? cajas * upc + saldos : saldos;
    const el = document.getElementById('au-total-preview');
    if (el) el.textContent = `UND/TOTAL: ${total}`;
  },

  _auAgregarLinea() {
    const p = this._auProdActual;
    if (!p) return this.toast('Seleccione un producto primero', 'error');
    const upc    = Math.max(1, parseInt(p.unidades_caja || 1));
    const cajas  = parseFloat(document.getElementById('au-cajas')?.value  || 0) || 0;
    const saldos = parseFloat(document.getElementById('au-saldos')?.value || 0) || 0;
    const total  = upc > 1 ? cajas * upc + saldos : saldos;
    if (total <= 0) return this.toast('La cantidad debe ser mayor a cero', 'error');
    const lote = (document.getElementById('au-lote')?.value || '').trim();
    const fv   = (document.getElementById('au-fv')?.value || '').trim();
    if ((p.requiere_lote||p.controla_lote) && !lote)             return this.toast('Este producto requiere lote', 'error');
    if ((p.requiere_fecha_vencimiento||p.controla_vencimiento) && !fv) return this.toast('Este producto requiere fecha de vencimiento', 'error');
    this._auLineas.push({ producto: p, cantidad_cajas: cajas, saldos, cantidad: total, lote: lote || null, fecha_vencimiento: fv || null });
    // Reset form
    document.getElementById('au-prod-busq').value = '';
    document.getElementById('au-prod-sel').style.display = 'none';
    this._auProdActual = null;
    this._auRefreshLineasUI();
    this.toast('Referencia agregada al conteo', 'success');
  },

  _auRenderLineas() {
    if (!this._auLineas.length) return '';
    return this._auLineas.map((l, idx) => {
      const upc = Math.max(1, parseInt(l.producto.unidades_caja || 1));
      const det = upc > 1 ? `${l.cantidad_cajas} caj × ${upc} + ${l.saldos} suel = ${l.cantidad} UND/T` : `${l.cantidad} UND/T`;
      return `<div style="padding:8px 0;border-bottom:1px solid #f1f5f9;display:flex;justify-content:space-between;align-items:flex-start;gap:8px;">
        <div style="flex:1;font-size:.78rem;">
          <b>${this.esc(l.producto.nombre)}</b><br>
          <span style="color:#475569;">${det}${l.lote ? ' · Lote: ' + this.esc(l.lote) : ''}${l.fecha_vencimiento ? ' · Venc: ' + this.formatDateShort(l.fecha_vencimiento) : ''}</span>
        </div>
        <button onclick="MWMS._auEliminarLinea(${idx})" style="background:#fee2e2;border:none;border-radius:6px;padding:4px 8px;cursor:pointer;color:#dc2626;font-size:.8rem;">
          <i class="fa-solid fa-trash"></i>
        </button>
      </div>`;
    }).join('');
  },

  _auRefreshLineasUI() {
    const countEl   = document.getElementById('au-lineas-count');
    const listEl    = document.getElementById('au-lineas-list');
    const btnConf   = document.getElementById('au-btn-confirmar');
    if (countEl) countEl.textContent = this._auLineas.length;
    if (listEl)  listEl.innerHTML    = this._auRenderLineas() || '<p style="color:#94a3b8;font-size:.8rem;font-style:italic;">Aún no ha agregado referencias.</p>';
    if (btnConf) {
      btnConf.disabled = this._auLineas.length === 0;
      btnConf.style.opacity = this._auLineas.length > 0 ? '1' : '0.5';
    }
  },

  _auEliminarLinea(idx) {
    if (!confirm('¿Eliminar esta referencia del conteo?')) return;
    this._auLineas.splice(idx, 1);
    this._auRefreshLineasUI();
  },

  async _auConfirmar() {
    if (!this._auLineas.length)  return this.toast('Agregue al menos una referencia', 'error');
    if (!this._auUbicacion)      return this.toast('No hay ubicación seleccionada', 'error');
    const esAgregar = this._auTipo === 'AgregarInventario';
    const msgConfirm = esAgregar
      ? `¿Enviar solicitud para AGREGAR ${this._auLineas.length} referencia(s) a la ubicación "${this._auUbicacion.codigo}"?\n\nEl stock existente NO será modificado. Solo se sumará lo nuevo al aprobarse.`
      : `¿Enviar AJUSTE COMPLETO para "${this._auUbicacion.codigo}" con ${this._auLineas.length} referencia(s)?\n\n⚠ Al aprobarse, TODO el inventario actual de la ubicación será eliminado y reemplazado por este conteo.`;
    if (!confirm(msgConfirm)) return;
    this.loading(true);
    try {
      const detalles = this._auLineas.map(l => ({
        producto_id:       l.producto.id,
        cantidad_cajas:    l.cantidad_cajas,
        saldos:            l.saldos,
        cantidad:          l.cantidad,
        lote:              l.lote || null,
        fecha_vencimiento: l.fecha_vencimiento || null,
      }));
      const r = await mApi('POST', '/inventario/ajuste-ubicacion', {
        ubicacion_id: this._auUbicacion.id,
        tipo:         this._auTipo,
        detalles,
      });
      if (r.error) throw new Error(r.message);
      const label = esAgregar ? 'Adición enviada' : 'Ajuste enviado';
      this.toast(`✔ ${label} (#${r.data?.id || r.id}). Espere la aprobación del administrador.`, 'success');
      this._auLineas    = [];
      this._auUbicacion = null;
      this._auTipo      = 'AjusteCompleto';
      setTimeout(() => this.viewHome(), 2500);
    } catch(e) { this.toast(e.message || 'Error al enviar', 'error'); }
    this.loading(false);
  },
