          <div style="padding:10px 14px;background:#f0fdf4;border-bottom:1px solid #dcfce7;display:flex;justify-content:space-between;align-items:center;">
            <span style="font-size:.7rem;font-weight:700;color:#15803d;text-transform:uppercase;"><i class="fa-solid fa-circle-check"></i> Referencia seleccionada</span>
            <button onclick="MWMS._trpVolverRefs()" style="background:none;border:none;color:#94a3b8;cursor:pointer;font-size:.75rem;">
              <i class="fa-solid fa-rotate-left"></i> Cambiar
            </button>
          </div>
          <div id="trp-sel-info" style="padding:12px 14px;font-size:.82rem;"></div>
        </div>

        <!-- PASO 3: Cantidad + Cliente -->
        <div id="trp-form-card" style="display:none;margin:0 12px 12px;background:#fff;border-radius:12px;border:1px solid #e2e8f0;overflow:hidden;">
          <div style="padding:12px 16px;border-bottom:1px solid #f1f5f9;background:#fafafa;display:flex;align-items:center;gap:8px;">
            <span style="background:#ef4444;color:#fff;border-radius:50%;width:20px;height:20px;display:inline-flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:900;">3</span>
            <span style="font-size:.75rem;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.5px;">
              <i class="fa-solid fa-clipboard-list" style="color:#ef4444;"></i> Cantidad y destinatario
            </span>
          </div>
          <div style="padding:14px 16px;display:flex;flex-direction:column;gap:12px;">

            <div>
              <label style="font-size:.75rem;font-weight:700;color:#374151;display:block;margin-bottom:6px;">
                Cantidad * <span id="trp-upc-hint" style="font-weight:400;color:#6b7280;font-size:.72rem;"></span>
              </label>
              <input id="trp-cant" type="number" min="0.01" step="0.01"
                     style="width:100%;box-sizing:border-box;padding:12px;border:1px solid #e2e8f0;border-radius:8px;font-size:1.1rem;font-weight:700;"
                     placeholder="0" oninput="MWMS._trpUpdCantPreview()">
              <div id="trp-cant-preview" style="font-size:.72rem;color:#6b7280;margin-top:4px;"></div>
            </div>

            <div>
              <label style="font-size:.75rem;font-weight:700;color:#374151;display:block;margin-bottom:6px;">Cliente</label>
              <div style="position:relative;">
                <i class="fa-solid fa-user" style="position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#94a3b8;font-size:.8rem;"></i>
                <input id="trp-cliente-buscar"
                       style="width:100%;box-sizing:border-box;padding:10px 12px 10px 30px;border:1px solid #e2e8f0;border-radius:8px;font-size:.85rem;"
                       placeholder="Buscar cliente por nombre..."
                       oninput="clearTimeout(MWMS._trpCliTimer);MWMS._trpCliTimer=setTimeout(()=>MWMS._trpBuscarCliente(),350)">
              </div>
              <div id="trp-cliente-res" style="max-height:130px;overflow-y:auto;border:1px solid #e2e8f0;border-radius:6px;margin-top:4px;display:none;"></div>
              <input type="hidden" id="trp-cliente-id">
              <input type="hidden" id="trp-cliente-nom">
            </div>

            <div>
              <label style="font-size:.75rem;font-weight:700;color:#374151;display:block;margin-bottom:6px;">Motivo</label>
              <select id="trp-motivo" style="width:100%;box-sizing:border-box;padding:10px 12px;border:1px solid #e2e8f0;border-radius:8px;font-size:.85rem;background:#fff;">
                ${(this._trpMotivos || ['Traspaso a cliente','Muestra comercial','Otro']).map(m => `<option value="${this.esc(m)}">${this.esc(m)}</option>`).join('')}
              </select>
            </div>

          </div>
        </div>

        <!-- Botón confirmar -->
        <div id="trp-btn-wrap" style="display:none;padding:0 12px;">
          <button onclick="MWMS._trpConfirmar()"
                  style="width:100%;padding:15px;background:#ef4444;color:#fff;border:none;border-radius:12px;font-size:.95rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;">
            <i class="fa-solid fa-check-circle"></i> Confirmar Traspaso
          </button>
        </div>

      </div>`;

    const inp = document.getElementById('trp-ubi-input');
    if (inp) { inp.focus(); inp.onkeydown = e => { if (e.key === 'Enter') MWMS._trpBuscarUbicacion(); }; }
  },

  _trpUbicOrigen: null,
  _trpSelected: null,
  _trpStock: [],

  _trpLimpiar() {
    this._trpSelected = null;
    this._trpUbicOrigen = null;
    this._trpStock = [];
    const inp = document.getElementById('trp-ubi-input');
    if (inp) { inp.value = ''; inp.focus(); }
    ['trp-ubi-res','trp-refs-list'].forEach(id => { const el = document.getElementById(id); if (el) el.innerHTML = ''; });
    ['trp-card-refs','trp-seleccion','trp-form-card','trp-btn-wrap'].forEach(id => {
      const el = document.getElementById(id); if (el) el.style.display = 'none';
    });
  },

  _trpVolverRefs() {
    this._trpSelected = null;
    document.getElementById('trp-seleccion').style.display = 'none';
    document.getElementById('trp-form-card').style.display = 'none';
    document.getElementById('trp-btn-wrap').style.display = 'none';
    document.getElementById('trp-card-refs').style.display = 'block';
  },

  async _trpBuscarUbicacion() {
    const q = document.getElementById('trp-ubi-input')?.value.trim();
    if (!q) { this.toast('Ingresa el código de ubicación', 'warning'); return; }
    this.loading(true);
    try {
      const rl = await mApi('GET', '/param/ubicaciones?codigo=' + encodeURIComponent(q));
      const locs = Array.isArray(rl.data) ? rl.data : [];
      if (!locs.length) { this.toast('Ubicación no encontrada: ' + q, 'error'); return; }
      // Si hay más de una coincidencia, mostrar lista rápida
      if (locs.length > 1) {
        this._trpUbiCandidatos = locs;
        document.getElementById('trp-ubi-res').innerHTML = locs.slice(0,5).map((l, i) => `
          <div onclick="MWMS._trpCargarStockUbic(MWMS._trpUbiCandidatos[${i}])"
               style="padding:8px 10px;border-bottom:1px solid #f1f5f9;cursor:pointer;font-size:.82rem;font-weight:700;color:#dc2626;">
            <i class="fa-solid fa-location-dot"></i> ${this.esc(l.codigo)}
            <span style="color:#64748b;font-weight:400;"> — ${this.esc(l.descripcion||l.zona||'')}</span>
          </div>`).join('');
        return;
      }
      await this._trpCargarStockUbic(locs[0]);
    } catch(e) { this.toast(e.message || 'Error buscando ubicación', 'error'); }
    finally { this.loading(false); }
  },

  async _trpCargarStockUbic(loc) {
    this.loading(true);
    try {
      document.getElementById('trp-ubi-res').innerHTML = '';
      const rs = await mApi('GET', '/inventario/stock?ubicacion_id=' + loc.id + '&estado=Disponible');
      const stock = (rs.data || []).filter(x => parseFloat(x.cantidad) > 0 && parseFloat(x.cantidad - (x.cantidad_reservada||0)) > 0);
      if (!stock.length) {
        this.toast('Sin stock disponible en ' + loc.codigo, 'warning');
        return;
      }
      this._trpUbicOrigen = loc;
      // Mapear al formato esperado por _trpSeleccionar
      this._trpStock = stock.map(s => ({
        inventario_id:    s.id,
        producto_id:      s.producto_id,
        nombre:           s.producto_nombre || s.nombre || '',
        codigo_interno:   s.codigo_interno  || '',
        ubicacion_id:     loc.id,
        ubicacion_codigo: loc.codigo,
        ubicacion_zona:   loc.zona || '',
        lote:             s.lote,
        fecha_vencimiento:s.fecha_vencimiento,
        cantidad_disponible: parseFloat(s.cantidad) - parseFloat(s.cantidad_reservada||0),
        unidades_caja:    s.unidades_caja || 1,
        bloqueado:        s.bloqueado || false,
      }));
      // Mostrar paso 2
      const label = document.getElementById('trp-ubi-label');
      if (label) label.innerHTML = `<i class="fa-solid fa-location-dot"></i> ${this.esc(loc.codigo)} — selecciona referencia`;
      const list = document.getElementById('trp-refs-list');
      list.innerHTML = this._trpStock.map((s, idx) => {
        const fv = s.fecha_vencimiento
          ? `<span style="background:#fef2f2;border:1px solid #fca5a5;border-radius:4px;padding:1px 6px;color:#dc2626;font-size:.68rem;font-weight:700;">Vence: ${this.formatDateShort(s.fecha_vencimiento)}</span>`
          : '';
        return `
          <div onclick="MWMS._trpSeleccionar(${idx})"
               style="display:flex;justify-content:space-between;align-items:center;padding:11px 10px;
                      margin-bottom:6px;border-radius:8px;border:1px solid #e2e8f0;background:#fff;cursor:pointer;">
            <div style="flex:1;min-width:0;">
              <div style="font-weight:700;font-size:.83rem;color:#1e293b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">
                ${this.esc(s.nombre)}
              </div>
              <div style="display:flex;flex-wrap:wrap;gap:3px;margin-top:3px;">
                <span style="font-size:.68rem;color:#64748b;">Lote: ${this.esc(s.lote||'S/L')}</span>
                ${fv}
              </div>
            </div>
            <div style="text-align:right;flex-shrink:0;margin-left:10px;">
              <div style="font-weight:900;color:#10b981;font-size:1rem;">${s.cantidad_disponible}</div>
              <div style="font-size:.65rem;color:#94a3b8;">und</div>
            </div>
          </div>`;
      }).join('');
      document.getElementById('trp-card-refs').style.display = 'block';
    } catch(e) { this.toast(e.message || 'Error cargando stock', 'error'); }
    finally { this.loading(false); }
  },

  _trpUpdCantPreview() {
    const p = this._trpSelected;
    if (!p) return;
    const upc = Math.max(1, parseInt(p.unidades_caja || 1));
    const cant = parseFloat(document.getElementById('trp-cant')?.value || 0) || 0;
    const el = document.getElementById('trp-cant-preview');
    if (el) el.textContent = upc > 1 ? `= ${cant * upc} unidades totales` : '';
  },

  _trpCliTimer: null,
  async _trpBuscarCliente() {
    const q = document.getElementById('trp-cliente-buscar')?.value.trim();
    const div = document.getElementById('trp-cliente-res');
    if (!div) return;
    if (!q || q.length < 2) { div.style.display = 'none'; div.innerHTML = ''; return; }
    try {
      const r = await mApi('GET', '/param/clientes?q=' + encodeURIComponent(q));
      const cls = r.data || r || [];
      if (!cls.length) { div.style.display = 'none'; return; }
      div.style.display = 'block';
      div.innerHTML = cls.slice(0, 8).map(c => `
        <div style="padding:9px 12px;border-bottom:1px solid #f1f5f9;cursor:pointer;font-size:.82rem;"
             onclick="MWMS._trpSelCliente(${c.id},'${this.esc(c.razon_social||c.nombre||'')}')">
          <i class="fa-solid fa-user" style="color:#94a3b8;font-size:.75rem;"></i> ${this.esc(c.razon_social||c.nombre||'')}
        </div>`).join('');
    } catch(e) { div.style.display = 'none'; }
  },

  _trpSelCliente(id, nombre) {
    document.getElementById('trp-cliente-id').value = id;
    document.getElementById('trp-cliente-nom').value = nombre;
    document.getElementById('trp-cliente-buscar').value = nombre;
    const div = document.getElementById('trp-cliente-res');
    if (div) { div.innerHTML = ''; div.style.display = 'none'; }
  },

  _trpSeleccionar(idx) {
    const s = this._trpStock?.[idx];
    if (!s) return;
    this._trpSelected = s;
    const upc = Math.max(1, parseInt(s.unidades_caja || 1));
    document.getElementById('trp-card-refs').style.display = 'none';
    const fv = s.fecha_vencimiento
      ? `<span style="background:#fef2f2;border:1px solid #fca5a5;border-radius:4px;padding:1px 6px;color:#dc2626;font-size:.7rem;font-weight:700;">Vence: ${this.formatDateShort(s.fecha_vencimiento)}</span>`
      : '';
    document.getElementById('trp-sel-info').innerHTML = `
      <div style="font-weight:700;font-size:.86rem;margin-bottom:6px;">${this.esc(s.nombre)}</div>
      <div style="display:flex;flex-wrap:wrap;gap:4px;">
        <span style="background:#fef2f2;border:1px solid #fca5a5;border-radius:4px;padding:2px 8px;color:#dc2626;font-size:.75rem;font-weight:700;">
          <i class="fa-solid fa-location-dot"></i> ${this.esc(s.ubicacion_codigo)}
        </span>
        <span style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:4px;padding:2px 8px;color:#475569;font-size:.72rem;">
          Lote: ${this.esc(s.lote||'Sin lote')}
        </span>
        ${fv}
        <span style="background:#f0fdf4;border:1px solid #86efac;border-radius:4px;padding:2px 8px;color:#15803d;font-size:.72rem;font-weight:700;">
          Disp: ${s.cantidad_disponible} und
        </span>
      </div>`;
    document.getElementById('trp-seleccion').style.display = 'block';
    document.getElementById('trp-form-card').style.display = 'block';
    document.getElementById('trp-btn-wrap').style.display = 'block';
    const hint = document.getElementById('trp-upc-hint');
    if (hint) hint.textContent = upc > 1 ? ` (${upc} und/caja)` : '';
    const cantEl = document.getElementById('trp-cant');
    if (cantEl) { cantEl.value = ''; cantEl.max = s.cantidad_disponible; cantEl.focus(); }
    document.getElementById('trp-cant-preview').textContent = '';
  },

  async _trpConfirmar() {
    if (!this._trpSelected) { this.toast('Seleccione un producto', 'warning'); return; }
    const cant = parseFloat(document.getElementById('trp-cant')?.value) || 0;
    if (cant <= 0) { this.toast('Ingrese una cantidad válida', 'warning'); return; }
    if (cant > this._trpSelected.cantidad_disponible) { this.toast('Cantidad excede el disponible', 'error'); return; }
    const motivo = document.getElementById('trp-motivo')?.value;
    if (!motivo) { this.toast('Seleccione un motivo', 'warning'); return; }

    if (!confirm(`¿Confirmar traspaso de ${cant} unidades de ${this._trpSelected.nombre}?`)) return;

    this.loading(true);
    try {
      const r = await mApi('POST', '/traspasos', {
        producto_id:      this._trpSelected.producto_id,
        ubicacion_id:     this._trpSelected.ubicacion_id,
        lote:             this._trpSelected.lote || null,
        fecha_vencimiento: this._trpSelected.fecha_vencimiento || null,
        cantidad:         cant,
        cliente_id:       document.getElementById('trp-cliente-id')?.value || null,
        cliente_nombre:   document.getElementById('trp-cliente-nom')?.value || null,
        motivo:           motivo,
        observaciones:    document.getElementById('trp-obs')?.value.trim() || null,
      });
      if (r.error) this.toast(r.message, 'error');
      else {
        this.toast(r.message || 'Traspaso realizado', 'success');
        this._trpSelected = null;
        this.viewTraspaso();
      }
    } catch(e) { this.toast('Error al realizar traspaso', 'error'); }
    finally { this.loading(false); }
  },
};

document.addEventListener('DOMContentLoaded',()=>{
  MWMS.init();
  const locCodInput = document.getElementById('m-loc-codigo');
  if (locCodInput) {
    let timeout;
    locCodInput.addEventListener('input', function() {
      this.value = this.value.toUpperCase().replace(/[^A-Z0-9\/\-]/g, '');
      clearTimeout(timeout);
      timeout = setTimeout(() => MWMS.validateLocationCode(this.value), 600);
    });
    locCodInput.addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        clearTimeout(timeout);
        MWMS.validateLocationCode(this.value);
      }
    });
  }
});
</script>

<!-- Expiry waiting modal -->
<div id="m-expiry-modal" style="display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.6);
  align-items:center;justify-content:center;">
  <div style="background:#fff;border-radius:12px;padding:24px;max-width:320px;width:90%;text-align:center;">
    <div style="font-size:2rem;margin-bottom:12px;">⏳</div>
    <div style="font-weight:700;font-size:1rem;margin-bottom:6px;">Esperando aprobación del supervisor</div>
    <div id="m-expiry-msg" style="font-size:.85rem;color:#64748b;margin-bottom:16px;"></div>
    <button onclick="MWMS._cancelarExpiry()" style="background:#ef4444;color:#fff;border:none;
      border-radius:6px;padding:8px 16px;cursor:pointer;font-size:.85rem;">
      Cancelar solicitud
    </button>
  </div>
</div>
</body>
</html>
