<script>
const M_API = '/WMS_FENIX/public/api';
let _mToken    = localStorage.getItem('wms_token') || '';
let _mUser     = JSON.parse(localStorage.getItem('wms_user') || 'null');

// Retry queue para operaciones offline
const _offlineQueue = {
  queue: JSON.parse(localStorage.getItem('_api_queue') || '[]'),
  add(op) { this.queue.push({...op, timestamp: Date.now()}); this.save(); },
  remove(idx) { this.queue.splice(idx, 1); this.save(); },
  save() { localStorage.setItem('_api_queue', JSON.stringify(this.queue)); },
  flush() { return this.queue.length > 0 ? this.queue : null; },
};

async function mApi(method, path, data=null, _retries=0) {
  const url = M_API + path;
  const headers = { 'Content-Type': 'application/json' };
  if (_mToken) headers['Authorization'] = 'Bearer ' + _mToken;
  const cfg = { method, headers, signal: AbortSignal.timeout(20000) }; // Aumentado a 20s para estabilidad móvil
  if (data) cfg.body = JSON.stringify(data);
  
  try {
    const res = await fetch(url, cfg);
    if (res.status === 401 && !path.includes('/auth/login')) { 
      MWMS.logout(); 
      throw new Error('Sesión expirada'); 
    }
    const json = await res.json();
    
    // Si obtuvo respuesta exitosa, vaciar offline queue si existe
    if (json.data || json.success) {
      if (_offlineQueue.queue.length > 0) {
        console.log('✓ Conexión restaurada, procesando ' + _offlineQueue.queue.length + ' operaciones en cola');
      }
      _offlineQueue.queue = [];
      _offlineQueue.save();
    }
    
    if (json.error) {
      const err = new Error(json.message || 'Error desconocido');
      err.isValidationError = true;
      err.data = json.data ?? null;
      throw err;
    }
    return json;
  } catch(e) {
    // Timeout o error de red
    if (e.name === 'AbortError' || !navigator.onLine) {
      // Solo guardar en queue si es POST/PUT (operaciones, no lecturas)
      if (method !== 'GET') {
        _offlineQueue.add({method, path, data});
        throw new Error('📡 Operación guardada localmente. Se enviará cuando haya conexión.');
      }
      throw new Error('Sin conexión a internet');
    }
    
    // NO reintentar si es error de validación (excedentes, stock, etc) o errores 4xx
    if (e.isValidationError || (e.status && e.status < 500)) {
      throw e;
    }

    // Reintentos solo para errores críticos/transitorios del servidor (500+) o fallas de red no capturadas
    if (_retries < 3) {
      const delay = Math.pow(2, _retries) * 1000;
      console.warn(`Reintentando en ${delay}ms... (intento ${_retries + 1}/3)`);
      await new Promise(r => setTimeout(r, delay));
      return mApi(method, path, data, _retries + 1);
    }
    
    throw e;
  }
}

const MWMS = {
  _pin: '', _timer: null, _lastCnt: 0, _sCb: null, _dCb: null, _op: null,
    _expiryPollTimer: null,
    _expiryAprobacionId: null,
    _expiryOnApproved: null,
    _devItems: [],
    _devQrProd: null,
    _causalesNovedad: [],

  init() {
    // Listeners para cambios de conexión
    window.addEventListener('online', () => this._processOfflineQueue());
    window.addEventListener('offline', () => this.toast('📡 Sin conexión', 'warning'));

    if (_mToken && _mUser) this.showApp(); else this.showLogin();
  },

  async _loadCausalesNovedad() {
    try {
      const r = await mApi('GET', '/causales-novedad');
      this._causalesNovedad = r.data || r || [];
    } catch(e) {
      this._causalesNovedad = [];
    }
  },
  
  async _processOfflineQueue() {
    if (_offlineQueue.queue.length === 0) return;
    this.toast(`Procesando ${_offlineQueue.queue.length} operación(es)...`);
    let success = 0, failed = 0;
    for (let i = _offlineQueue.queue.length - 1; i >= 0; i--) {
      try {
        const op = _offlineQueue.queue[i];
        await mApi(op.method, op.path, op.data);
        _offlineQueue.remove(i);
        success++;
      } catch(e) {
        failed++;
        console.error('Fallo al procesar cola:', e.message);
      }
    }
    this.toast(`✓ ${success} enviadas, ${failed} pendientes`, success > 0 ? 'success' : 'error');
  },
  showLogin() { document.getElementById('login-screen').style.display='flex'; document.getElementById('main-screen').style.display='none'; this._pin=''; this.updPin(); this.loadLoginEmpresas(); },
  showApp() {
    document.getElementById('login-screen').style.display='none'; document.getElementById('main-screen').style.display='flex';
    document.getElementById('m-subtitle').textContent = _mUser.rol + ' · ' + (_mUser.empresa_nombre || 'Global') + ' / ' + (_mUser.sucursal_nombre || 'Todas');
    this.showHome(); this.startNotif(); this._loadCausalesNovedad();
  },
  updPin() { for(let i=0;i<4;i++){ const d=document.getElementById('mpd'+i); d.style.background=i<this._pin.length?'#0F4C81':'#fff'; d.style.borderColor=i<this._pin.length?'#0F4C81':'#cbd5e1';} },
  pinPress(v) { if(v==='del') this._pin=this._pin.slice(0,-1); else if(this._pin.length<4) this._pin+=v; this.updPin(); if(this._pin.length===4) setTimeout(()=>this.doLogin(),200); },
  async loadLoginEmpresas() {
    const empresaSel = document.getElementById('m-empresa');
    if (!empresaSel) return;
    empresaSel.innerHTML = '<option value="">Cargando empresas...</option>';
    try {
      const r = await mApi('GET', '/auth/empresas');
      const empresas = r.data || [];
      empresaSel.innerHTML = '<option value="">— Seleccione una empresa —</option>' + empresas.map(e =>
        `<option value="${e.id}">${e.razon_social} ${e.nit ? '(' + e.nit + ')' : ''}</option>`
      ).join('');
    } catch (error) {
      empresaSel.innerHTML = '<option value="">Error cargando empresas</option>';
    }
  },

  async doLogin() {
    const doc = document.getElementById('m-doc').value.trim();
    const empresaId = document.getElementById('m-empresa').value;
    if (!doc || !empresaId || !this._pin) {
      if (!empresaId) {
        document.getElementById('m-login-err').textContent='Seleccione la empresa antes de ingresar.';
        document.getElementById('m-login-err').style.display='block';
      }
      return;
    }
    this.loading(true);

    }
  },

  _actualizarPreviewRs() {
    const cajas      = parseFloat(document.getElementById('rs-cant')?.value       || '0') || 0;
    const saldos     = parseFloat(document.getElementById('rs-saldos')?.value     || '0') || 0;
    const upc        = parseInt(document.getElementById('rs-upc')?.value           || '1') || 1;
    const factorUdm  = parseFloat(document.getElementById('rs-factor-udm')?.value || '0') || 0;
    const unidCont   = document.getElementById('rs-unidad-contenido')?.value       || 'U/E';
    const cantUe     = parseFloat(document.getElementById('rs-cant-ue')?.value     || '0') || 0;
    const preview    = document.getElementById('rs-conv-preview');
    const span       = document.getElementById('rs-conv-text');
    const label      = document.getElementById('rs-cant-label');
    const uePreview  = document.getElementById('rs-ue-preview');
    const ueConvText = document.getElementById('rs-ue-conv-text');

    if (label) label.textContent = upc > 1 ? 'Cajas *' : 'Cantidad (unidades) *';

    // Mostrar/ocultar campo saldos según UPC
    const saldosGroup = document.getElementById('rs-saldos-group');
    if (saldosGroup) saldosGroup.style.display = upc > 1 ? '' : 'none';

    // Preview cajas + saldos → unidades
    if (preview) preview.style.display = upc > 1 ? 'block' : 'none';
    if (span && upc > 1) {
      const total = cajas * upc + saldos;
      const saldosTxt = saldos > 0 ? ` + ${saldos} sueltos` : '';
      const plural = cajas === 1 ? 'caja' : 'cajas';
      span.textContent = `${cajas} ${plural} × ${upc}${saldosTxt} = ${total} UND/TOTAL`;
    }

    // Preview U/E → unidades
    if (factorUdm > 0 && uePreview && ueConvText) {
      if (cantUe > 0) {
        const unidades = cantUe / factorUdm;
        ueConvText.textContent = `${cantUe} ${unidCont} ÷ ${factorUdm} = ${unidades.toFixed(4).replace(/\.?0+$/, '')} unidades`;
        uePreview.style.display = 'block';
        // Auto-actualizar campo de unidades
        const cantInput = document.getElementById('rs-cant');
        if (cantInput) cantInput.value = unidades.toFixed(4).replace(/\.?0+$/, '');
      } else {
        uePreview.style.display = 'none';
      }
    }
  },

  _autoQrScanTimer: null,
  _autoQrSinOdc(val) {
    clearTimeout(this._autoQrScanTimer);
    if (!val || val.length < 4) return;
    /* Escáneres envían el código completo en <100 ms y luego Enter.
       120 ms sin Enter = aún escribiendo manualmente → no disparar todavía. */
    this._autoQrScanTimer = setTimeout(() => MWMS._doSinOdcQr(), 120);
  },

  async _doSinOdcQr() {
    clearTimeout(this._autoQrScanTimer);
    const input = document.getElementById('rs-qr-input');
    const qr = (input?.value || '').trim();
    if (!qr) return;
    input.style.borderColor = '#d1d5db';
    input.style.background  = '#f9fafb';
    try {
      const r = await mApi('GET', '/recepciones/buscar-qr?q=' + encodeURIComponent(qr));
      const p = r.data.producto || r.data.produto;
      if (!p) throw new Error('Producto no encontrado');
      this._sinOdc.prodSel      = p;
      this._sinOdc.fechaAuto    = r.data.fecha_vencimiento || '';
      this._sinOdc.fechaAutoRaw = r.data.fecha_raw || '';
      input.value = '';
      input.style.borderColor = '#10b981';
      input.style.background  = '#f0fdf4';
      setTimeout(() => { if (input) { input.style.borderColor = ''; input.style.background = ''; } }, 1500);
      /* Actualizar producto inline — sin re-render completo */
      const info = document.getElementById('rs-prod-info');
      if (info) { info.style.display = 'block'; info.innerHTML = `<i class="fa-solid fa-check-circle" style="color:#059669;"></i> ${this.esc(p.nombre)}`; }
      const el = (id, v) => { const e = document.getElementById(id); if (e) e.value = v; };
      el('rs-prod-id', p.id || '');
      el('rs-upc', p.unidades_caja || 1);
      el('rs-factor-udm', p.factor_udm || '');
      el('rs-unidad-contenido', p.unidad_contenido || '');
      if (this._sinOdc.fechaAuto) el('rs-fecha-venc', this._sinOdc.fechaAuto);
      const lbl = document.getElementById('rs-cant-label');
      if (lbl) lbl.textContent = parseInt(p.unidades_caja || 1) > 1 ? 'Cajas *' : 'Cantidad (unidades) *';
      this._actualizarPreviewRs();
      this.toast('✓ ' + p.nombre, 'success');
      input.focus();
    } catch(e) {
      input.style.borderColor = '#ef4444';
      input.style.background  = '#fef2f2';
      setTimeout(() => { if (input) { input.style.borderColor = ''; input.style.background = ''; } }, 1800);
      this.toast(e.message || 'Producto no encontrado', 'error');
      input.select();
    }
  },

  _sinOdcSearchTimer: null,
  async _buscarProdSinOdcLive(q) {
    clearTimeout(this._sinOdcSearchTimer);
    const dd = document.getElementById('rs-prod-dd');
    if (!dd) return;
    if (!q || q.length < 1) { dd.style.display = 'none'; return; }
    this._sinOdcSearchTimer = setTimeout(async () => {
      try {
        const r = await mApi('GET', '/param/productos/buscar?q=' + encodeURIComponent(q) + '&limit=500');
        const prods = Array.isArray(r.data) ? r.data : [];
        if (!prods.length) {
          dd.innerHTML = '<div style="padding:12px;font-size:.78rem;color:#94a3b8;text-align:center;">Sin resultados para "' + this.esc(q) + '"</div>';
          dd.style.display = 'block';
          return;
        }
        dd.innerHTML =
          `<div style="padding:5px 10px;font-size:.68rem;font-weight:700;color:#0F4C81;background:#eff6ff;border-bottom:1px solid #bfdbfe;position:sticky;top:0;">
            ${prods.length} resultado${prods.length !== 1 ? 's' : ''} encontrado${prods.length !== 1 ? 's' : ''}
          </div>` +
          prods.map(p => `
          <div onclick="MWMS._selProdSinOdc(${JSON.stringify({id:p.id,nombre:p.nombre,codigo_interno:p.codigo_interno,codigo_ean:p.codigo_ean,unidades_caja:p.unidades_caja,factor_udm:p.factor_udm,unidad_contenido:p.unidad_contenido,controla_vencimiento:p.controla_vencimiento}).replace(/"/g,'&quot;')})"
               style="padding:10px 12px;border-bottom:1px solid #f1f5f9;cursor:pointer;active:background:#f0f9ff;">
            <div style="font-weight:700;color:#1e293b;font-size:.82rem;">${this.esc(p.nombre)}</div>
            <div style="font-size:.65rem;color:#64748b;margin-top:1px;">
              ${this.esc(p.codigo_interno||'-')}${p.codigo_ean?' · EAN: '+this.esc(p.codigo_ean):''}
              · UxC: ${p.unidades_caja||1}
            </div>
          </div>`).join('');
        dd.style.display = 'block';
      } catch(e) { dd.style.display = 'none'; }
    }, 280);
  },

  _selProdSinOdc(p) {
    const dd = document.getElementById('rs-prod-dd');
    if (dd) dd.style.display = 'none';
    const si = document.getElementById('rs-prod-search');
    if (si) si.value = '';
    this._sinOdc.prodSel = p;
    this._sinOdc.fechaAuto = '';
    this._sinOdc.fechaAutoRaw = '';
    const info = document.getElementById('rs-prod-info');
    if (info) { info.style.display = 'block'; info.innerHTML = `<i class="fa-solid fa-check-circle" style="color:#059669;"></i> ${this.esc(p.nombre)}`; }
    const el = (id, v) => { const e = document.getElementById(id); if (e) e.value = v; };
    el('rs-prod-id', p.id || '');
    el('rs-upc', p.unidades_caja || 1);
    el('rs-factor-udm', p.factor_udm || '');
    el('rs-unidad-contenido', p.unidad_contenido || '');
    const lbl = document.getElementById('rs-cant-label');
    if (lbl) lbl.textContent = parseInt(p.unidades_caja || 1) > 1 ? 'Cajas *' : 'Cantidad (unidades) *';
    const prev = document.getElementById('rs-conv-preview');
    if (prev) prev.style.display = parseInt(p.unidades_caja || 1) > 1 ? 'block' : 'none';
    this._actualizarPreviewRs();
    this.toast('✓ ' + p.nombre, 'success');
  },

  _buscarProdSinOdc() {
    this.openSearch(p => {
      this._sinOdc.prodSel = p;
      this._sinOdc.fechaAuto    = '';
      this._sinOdc.fechaAutoRaw = '';
      this._renderRecSinOdc();
    }, 'Buscar Producto', 'prod');
  },

  async _guardarSinOdc() {
    const s         = this._sinOdc;
    const prodId    = document.getElementById('rs-prod-id')?.value;
    const cantInput = parseFloat(document.getElementById('rs-cant')?.value    || '0');
    const saldos    = parseFloat(document.getElementById('rs-saldos')?.value  || '0') || 0;
    const upc       = parseInt(document.getElementById('rs-upc')?.value       || '1') || 1;
    const factorUdm = parseFloat(document.getElementById('rs-factor-udm')?.value || '0') || 0;
    const cantUe    = parseFloat(document.getElementById('rs-cant-ue')?.value || '0') || 0;
    const lote      = document.getElementById('rs-lote')?.value || '';
    const fv        = document.getElementById('rs-fecha-venc')?.value || '';
    const estado    = document.getElementById('rs-estado')?.value || 'BuenEstado';
    const palletNum = parseInt(document.getElementById('rs-pallet-num')?.value) || null;

    if (!prodId) return this.toast('Seleccione un producto', 'error');

    const hayUe = factorUdm > 0 && cantUe > 0;
    const cantCajas = hayUe ? Math.ceil(cantUe / factorUdm) : cantInput;
    if (!hayUe && cantInput <= 0 && saldos <= 0) return this.toast('Cantidad debe ser mayor a cero', 'error');
    if (hayUe  && cantUe   <= 0) return this.toast('Ingrese la cantidad en U/E', 'error');

    const totalUnidades = hayUe
      ? cantUe / factorUdm
      : (upc > 1 ? cantInput * upc + saldos : cantInput);
    this.loading(true);
    try {
      const payload = {
        producto_id:      prodId,
        cantidad_cajas:   cantCajas,
        saldos:           saldos,
        cantidad:         totalUnidades,
        lote:             lote || undefined,
        fecha_vencimiento:fv   || undefined,
        estado_mercancia: estado,
        numero_pallet:    palletNum || undefined,
      };
      if (hayUe) payload.cantidad_ue = cantUe;
      const r = await mApi('POST', '/recepciones/sin-odc', payload);

      s.recepcionId = r.data?.recepcion?.id || s.recepcionId;
      s.lineas.push({
        detalleId:    r.data?.detalle?.id || null,
        nombre:       s.prodSel?.nombre || 'Producto',
        cant:         totalUnidades,
        cantUe:       hayUe ? cantUe : null,
        unidCont:     hayUe ? (s.prodSel?.unidad_contenido || 'U/E') : null,
        cajas:        cantCajas,
        upc,
        lote,
        fv:           fv ? fv.split('-').reverse().join('/') : '',
        numero_pallet: palletNum,
      });

      // Reset para siguiente captura (mantener producto y pallet)
      s.fechaAuto    = '';
      s.fechaAutoRaw = '';
      this.toast('Captura registrada ✓', 'success');
      this._renderRecSinOdc();
    } catch (e) {
      this.toast(e.message, 'error');
    } finally {
      this.loading(false);
    }
  },
  async _rsNuevoPallet() {
    this.loading(true);
    try {
      const r = await mApi('GET', '/recepciones/proximo-pallet');
      this._sinOdc.palletNum = r.proximo || 1;
    } catch(e) {
      this._sinOdc.palletNum = (this._sinOdc.palletNum || 0) + 1;
    } finally {
      this.loading(false);
    }
    const inp = document.getElementById('rs-pallet-num');
    if (inp) inp.value = this._sinOdc.palletNum;
  },

  async _cerrarRecepcionSinOdc() {
    const id = this._sinOdc?.recepcionId;
    if (!id) return this.toast('No hay recepción activa', 'error');
    if (!confirm('¿Cerrar recepción? No podrá agregar más líneas.')) return;
    this.loading(true);
    try {
      const r = await mApi('POST', '/recepciones/' + id + '/cerrar', {});
      if (r.error) throw new Error(r.message);
      this.toast('Recepción cerrada ✓', 'success');
      this._sinOdc.recepcionId = null;
      this._sinOdc.lineas = [];
      this._sinOdc.prodSel = null;
      if (confirm('¿Desea ir ahora a dar ubicación a los productos en el almacén?')) {
        this.viewUbicar();
      } else {
        this._renderRecSinOdc();
      }
    } catch (e) {
      this.toast(e.message || 'Error al cerrar', 'error');
    } finally {
      this.loading(false);
    }
  },

  async _editarLineaSinOdc(lineaIndex) {
    const s     = this._sinOdc;
    const linea = s.lineas[lineaIndex];
    if (!linea || !linea.detalleId) return this.toast('Línea no editable', 'error');

    const upc        = linea.upc || 1;
    const usaCajas   = upc > 1;
    const cajasAct   = linea.cajas ?? (usaCajas ? Math.round(linea.cant / upc) : linea.cant);
    const saldosAct  = linea.saldos ?? 0;

    const { value: vals, isConfirmed } = await Swal.fire({
      title: '<i class="fa-solid fa-pencil" style="color:#0F4C81;"></i> Editar Cantidad',
      html: `
        <div style="font-size:.8rem;font-weight:700;color:#1e293b;margin-bottom:10px;text-align:left;">${this.esc(linea.nombre)}</div>
        <div style="display:grid;grid-template-columns:${usaCajas ? '1fr 1fr' : '1fr'};gap:10px;text-align:left;">
          <div>
            <label style="font-size:.7rem;font-weight:700;color:#0F4C81;display:block;margin-bottom:4px;">
              <i class="fa-solid fa-box-archive"></i> ${usaCajas ? `Cajas (UxC: ${upc})` : 'Cantidad (und)'}
            </label>
            <input type="number" id="edit-sinOdc-cajas" value="${cajasAct}" min="0" inputmode="numeric"
              style="width:100%;border:2px solid #0F4C81;border-radius:8px;padding:10px;font-size:1.6rem;font-weight:900;text-align:center;box-sizing:border-box;">
          </div>
          ${usaCajas ? `
          <div>
            <label style="font-size:.7rem;font-weight:700;color:#d97706;display:block;margin-bottom:4px;">
              <i class="fa-solid fa-layer-group"></i> Saldos (sueltos)
            </label>
            <input type="number" id="edit-sinOdc-saldos" value="${saldosAct}" min="0" inputmode="numeric"
              style="width:100%;border:2px solid #d97706;border-radius:8px;padding:10px;font-size:1.6rem;font-weight:900;text-align:center;box-sizing:border-box;">
          </div>` : ''}
        </div>
        ${usaCajas ? `
        <div style="margin-top:10px;background:#f0fdf4;border-radius:8px;padding:8px;text-align:center;" id="edit-sinOdc-preview">
          <div style="font-size:.58rem;font-weight:700;color:#166534;">UND / TOTAL</div>
          <div id="edit-sinOdc-total" style="font-size:1.4rem;font-weight:900;color:#15803d;">${cajasAct * upc + saldosAct}</div>
        </div>` : ''}`,
      didOpen: () => {
        if (usaCajas) {
          const upd = () => {
            const c = parseInt(document.getElementById('edit-sinOdc-cajas')?.value || 0) || 0;
            const sl = parseInt(document.getElementById('edit-sinOdc-saldos')?.value || 0) || 0;
            const tot = document.getElementById('edit-sinOdc-total');
            if (tot) tot.textContent = c * upc + sl;
          };
          document.getElementById('edit-sinOdc-cajas')?.addEventListener('input', upd);
          document.getElementById('edit-sinOdc-saldos')?.addEventListener('input', upd);
        }
      },
      showCancelButton: true,
      confirmButtonText: '<i class="fa-solid fa-check"></i> Guardar',
      cancelButtonText: 'Cancelar',
      confirmButtonColor: '#0F4C81',
      preConfirm: () => {
        const c  = parseInt(document.getElementById('edit-sinOdc-cajas')?.value  || 0);
        const sl = usaCajas ? (parseInt(document.getElementById('edit-sinOdc-saldos')?.value || 0) || 0) : 0;
        if (isNaN(c) || c < 0) { Swal.showValidationMessage('Cajas inválidas'); return false; }
        if (c === 0 && sl === 0) { Swal.showValidationMessage('Ingrese al menos 1 caja o saldo'); return false; }
        return { cajas: c, saldos: sl };
      }
    });

    if (!isConfirmed || !vals) return;

    const cantidad = usaCajas ? vals.cajas * upc + vals.saldos : vals.cajas;
    this.loading(true);
    try {
      const r = await mApi('PATCH', `/recepciones/${s.recepcionId}/detalle/${linea.detalleId}`,
        { cantidad, cantidad_cajas: vals.cajas, saldos: vals.saldos });
      if (r.error) throw new Error(r.message);
      s.lineas[lineaIndex].cant   = cantidad;
      s.lineas[lineaIndex].cajas  = vals.cajas;
      s.lineas[lineaIndex].saldos = vals.saldos;
      this.toast('Cantidad actualizada ✓', 'success');
      this._renderRecSinOdc();
    } catch (e) {
      this.toast(e.message || 'Error al actualizar', 'error');
    } finally {
      this.loading(false);
    }
  },

  async _eliminarLineaSinOdc(lineaIndex) {
    const s = this._sinOdc;
    const linea = s.lineas[lineaIndex];
    if (!linea || !linea.detalleId) return this.toast('Línea no eliminable', 'error');
    if (!confirm(`¿Eliminar "${linea.nombre}"? El inventario será revertido.`)) return;

    this.loading(true);
    try {
      const r = await mApi('DELETE', `/recepciones/${s.recepcionId}/detalle/${linea.detalleId}`);
      if (r.error) throw new Error(r.message);
      s.lineas.splice(lineaIndex, 1);
      this.toast('Línea eliminada ✓', 'success');
      if (r.data?.recepcion_eliminada) {
        s.recepcionId = null;
        s.lineas = [];
        s.prodSel = null;
      }
      this._renderRecSinOdc();
    } catch (e) {
      this.toast(e.message || 'Error al eliminar', 'error');
    } finally {
      this.loading(false);
    }
  },

  openSearch(cb, t, mode='prod') {
    this._sCb = cb; this._sMode = mode;
    document.getElementById('m-modal-search-title').textContent = t;
    document.getElementById('m-modal-search').style.display = 'flex';
    const inp = document.getElementById('m-search-input');
    const res = document.getElementById('m-search-results');
    inp.value = ''; res.innerHTML = ''; inp.focus();
    // Re-bind fresh handler each open (avoids stale closures from previous call)
    inp.oninput = null;
    let _tm;
    inp.oninput = async e => {
      clearTimeout(_tm);
      const q = e.target.value.trim();
      if (!q) { res.innerHTML = ''; return; }
      res.innerHTML = '<div style="text-align:center;padding:12px;"><i class="fa-solid fa-circle-notch fa-spin" style="color:#0ea5e9;"></i></div>';
      _tm = setTimeout(async () => {
        try {
          const curMode = this._sMode;
          if (curMode === 'prov') {
            const r = await mApi('GET', '/param/proveedores');
            const ql = q.toLowerCase();
            const list = (r.data || []).filter(p =>
              (p.razon_social || '').toLowerCase().includes(ql) || (p.nit || '').includes(q)
            );
            res.innerHTML = list.length === 0
              ? '<div style="padding:12px;color:#94a3b8;text-align:center;font-size:.82rem;"><i class="fa-solid fa-circle-exclamation"></i> Sin resultados</div>'
              : '<div style="font-size:.65rem;font-weight:700;color:#64748b;padding:6px 12px;background:#f8fafc;border-bottom:1px solid #e2e8f0;">' + list.length + ' RESULTADO' + (list.length !== 1 ? 'S' : '') + '</div>' +
                list.map(p => `<div class="search-result-item" onclick="MWMS.selP(${JSON.stringify(p).replace(/"/g,'&quot;')})">
                  <b style="font-size:.88rem;">${this.esc(p.razon_social)}</b>
                  <br><small style="color:#64748b;">NIT: ${p.nit || 'N/A'}</small>
                </div>`).join('');
          } else {
            const r = await mApi('GET', '/odc/buscar-producto?q=' + encodeURIComponent(q) + '&limit=200');
            const items = r.data || [];
            res.innerHTML = items.length === 0
              ? '<div style="padding:12px;color:#94a3b8;text-align:center;font-size:.82rem;"><i class="fa-solid fa-circle-exclamation"></i> Sin resultados para "' + this.esc(q) + '"</div>'
              : '<div style="font-size:.65rem;font-weight:700;color:#64748b;padding:6px 12px;background:#f8fafc;border-bottom:1px solid #e2e8f0;position:sticky;top:0;">' + items.length + ' RESULTADO' + (items.length !== 1 ? 'S' : '') + '</div>' +
                items.map(p => `<div class="search-result-item" onclick="MWMS.selP(${JSON.stringify(p).replace(/"/g,'&quot;')})">
                  <div style="font-weight:700;font-size:.88rem;color:#0f172a;">${this.esc(p.nombre)}</div>
                  <div style="font-size:.72rem;color:#64748b;margin-top:2px;">
                    ${this.esc(p.codigo_interno || '')}${p.codigo_ean && p.codigo_ean !== p.codigo_interno ? ' · EAN: ' + this.esc(p.codigo_ean) : ''}
                    · UxC: ${p.unidades_caja || 1}
                  </div>
                </div>`).join('');
          }
        } catch(e) {
          res.innerHTML = '<div style="padding:12px;color:#dc2626;text-align:center;font-size:.82rem;">Error en búsqueda</div>';
        }
      }, 300);
    };
  },
  selP(p){ this.closeSearch(); this._sCb(p); },
  closeSearch(){ document.getElementById('m-modal-search').style.display='none'; },

  openCapture(p, cb, pending = null) {
    this._cCB = cb;
    this._currentCapProd = p;
    this._currentCapPending = pending;
    document.getElementById('m-capture-prod-name').textContent = p.nombre || p.descripcion;
    
    const factor = parseInt(p.unidades_caja || 0);
    document.getElementById('m-cap-factor').value = factor > 0 ? factor : "N/D";
    document.getElementById('m-cap-uxc-alert').style.display = (factor > 0 ? 'none' : 'block');

    // Campo U/E: mostrar si el producto tiene factor_udm
    const factorUdm    = parseFloat(p.factor_udm || 0);
    const unidContenido = p.unidad_contenido || 'U/E';
    const ueGroup      = document.getElementById('m-cap-ue-group');
    const ueUnitLabel  = document.getElementById('m-cap-ue-unit');
    const ueInput      = document.getElementById('m-cap-qty-ue');
    if (ueGroup)     ueGroup.style.display     = factorUdm > 0 ? 'block' : 'none';
    if (ueUnitLabel) ueUnitLabel.textContent   = unidContenido;
    if (ueInput)     ueInput.value             = '';

    // Mostrar badge de pendiente si aplica
    const pBadge = document.getElementById('m-cap-pending-badge');
    if (pending !== null) {
        pBadge.textContent = "PTE: " + pending + " UND";
        pBadge.style.display = 'block';
    } else {
        pBadge.style.display = 'none';
    }

    // Default mode: box if factor exists, else unit
    document.getElementById('m-cap-mode').value = (factor > 0 ? 'box' : 'unit');

    document.getElementById('m-cap-qty').value    = factorUdm > 0 ? "0" : "1";
    document.getElementById('m-cap-saldos').value = "0";

    // Ocultar campo saldos si no tiene unidad de empaque
    const currentFactor = parseInt(p.unidades_caja || 1);
    if (currentFactor <= 1) {
        document.getElementById('m-cap-saldos-group').style.display = 'none';
        document.getElementById('m-cap-saldos').value = "0";
    } else {
        document.getElementById('m-cap-saldos-group').style.display = 'block';
    }

    document.getElementById('m-cap-lote').value = "";
    document.getElementById('m-cap-fv').value = "";
    document.getElementById('m-cap-fv2').value = "";
    document.getElementById('m-cap-fv-group').style.display = (p.controla_vencimiento ? 'block' : 'none');
    /* Resetear estado de requerido y chips (el caller puede sobreescribir si es inventario) */
    const fvReqEl = document.getElementById('m-cap-fv-required');
    if (fvReqEl) fvReqEl.value = p.controla_vencimiento ? '1' : '0';
    const chipsEl = document.getElementById('m-cap-fv-chips');
    if (chipsEl) chipsEl.style.display = 'none';
    const fv2lbl = document.getElementById('m-cap-fv2-label');
    if (fv2lbl) fv2lbl.style.display = '';
    const fv2inp = document.getElementById('m-cap-fv2');
    if (fv2inp) fv2inp.style.display = '';
    const fvlbl = document.getElementById('m-cap-fv-label');
    if (fvlbl) fvlbl.innerHTML = 'Fecha Vencimiento (FEFO) <span style="color:#ef4444;font-weight:900;">*</span>';
    document.getElementById('m-modal-capture').style.display = 'flex';
    
    this.updCapTotal();
    setTimeout(() => document.getElementById('m-cap-qty').focus(), 300);
  },
  updCapTotal() {
    const p = this._currentCapProd;
    if (!p) return;
    const factorUdm  = parseFloat(p.factor_udm || 0);
    const unidCont   = p.unidad_contenido || 'U/E';
    const qty        = parseFloat(document.getElementById('m-cap-qty')?.value    || 0) || 0;
    const saldos     = parseFloat(document.getElementById('m-cap-saldos')?.value || 0) || 0;
    const cantUe     = parseFloat(document.getElementById('m-cap-qty-ue')?.value || 0) || 0;
    const factor     = parseInt(p.unidades_caja || 1) || 1;
    const formula    = document.getElementById('m-cap-formula-preview');

    let total = qty;

    if (factorUdm > 0 && cantUe > 0) {
      /* Modo U/E prioritario */
      total = cantUe / factorUdm;
      const uePreview = document.getElementById('m-cap-ue-preview');
      if (uePreview) uePreview.textContent = `${cantUe} ${unidCont} ÷ ${factorUdm} = ${total.toFixed(4).replace(/\.?0+$/, '')} unidades`;
      const qtyInp = document.getElementById('m-cap-qty');
      if (qtyInp) qtyInp.value = total.toFixed(4).replace(/\.?0+$/, '');
      if (formula) formula.style.display = 'none';
    } else {
      /* Modo cajas/unidades + saldos — SIEMPRE suma saldos */
      total = qty * factor + saldos;
      if (formula) {
        if (factor > 1) {
          const saldosTxt = saldos > 0 ? ` + ${saldos} sueltos` : '';
          formula.textContent = `${qty} ${qty === 1 ? 'caja' : 'cajas'} × ${factor}${saldosTxt} = ${total} UND/TOTAL`;
          formula.style.display = 'block';
        } else if (saldos > 0) {
          formula.textContent = `${qty} und + ${saldos} sueltos = ${total} UND/TOTAL`;
          formula.style.display = 'block';
        } else {
          formula.style.display = 'none';
        }
      }
    }

    const totalEl = document.getElementById('m-cap-total');
    if (totalEl) {
      totalEl.value = total > 0 ? (Number.isInteger(total) ? String(total) : total.toFixed(3).replace(/\.?0+$/, '')) : '0';
      const over = this._currentCapPending !== null && total > this._currentCapPending;
      totalEl.style.background = over ? '#fee2e2' : '#e0f2fe';
      totalEl.style.color      = over ? '#991b1b' : '#0369a1';
    }
  },
  confirmCapture() {
    const p         = this._currentCapProd;
    const factorUdm = parseFloat(p.factor_udm || 0);
    const unidCont  = p.unidad_contenido || 'U/E';
    const q         = parseFloat(document.getElementById('m-cap-qty').value    || 0);
    const saldos    = parseFloat(document.getElementById('m-cap-saldos').value || 0);
    const cantUe    = parseFloat(document.getElementById('m-cap-qty-ue')?.value || 0);
    const l   = document.getElementById('m-cap-lote').value.trim() || 'N/A';
    const fv  = document.getElementById('m-cap-fv').value;
    const fv2 = document.getElementById('m-cap-fv2').value;
    const fvGroup = document.getElementById('m-cap-fv-group').style.display;
    const factor  = parseInt(p.unidades_caja || 1);

    const hayUe = factorUdm > 0 && cantUe > 0;
    if (!hayUe && q <= 0 && saldos <= 0) return this.toast("Cantidad inválida", "error");

    let totalUnits;
    if (hayUe) {
      totalUnits = cantUe / factorUdm;
    } else {
      totalUnits = q * factor + saldos;
    }

    totalUnits = parseFloat(totalUnits.toFixed(3));

    if (this._currentCapPending !== null && totalUnits > this._currentCapPending) {
        this.pA();
        return this.toast(`EXCEDIDO: Máximo permitido ${this._currentCapPending} unidades.`, "error");
    }

    if (fvGroup === 'block') {
      const fvRequired = document.getElementById('m-cap-fv-required')?.value === '1';
      if (fvRequired && !fv) return this.toast("Fecha de vencimiento requerida", "error");
      if (fv && fv !== fv2) return this.toast("Las fechas de vencimiento NO coinciden", "error");
    }

    this.closeCapture();
    
    // Mensaje de confirmacion final requerido por el usuario
    Swal.fire({
      title: 'Confirmación de Captura',
      html: `
        <div style="font-size: 1.1rem; text-align: left;">
          <p><strong>Referencia:</strong> ${this.esc(p.nombre)}</p>
          <p><strong>Código:</strong> ${this.esc(p.codigo_interno || p.ean || '-')}</p>
          ${fv ? `<p><strong>Vencimiento:</strong> ${fv}</p>` : ''}
          <div style="background: #e0f2fe; padding: 10px; border-radius: 8px; margin-top: 15px; text-align: center;">
            <p style="margin: 0; font-size: 0.9rem; color: #0369a1;">UND/TOTAL</p>
            <h2 style="margin: 0; color: #0369a1; font-weight: 900;">${totalUnits}</h2>
            ${hayUe ? `<p style="margin:4px 0 0;font-size:.8rem;color:#6d28d9;">${cantUe} ${unidCont} ÷ ${factorUdm}</p>` : (factor > 1 ? `<p style="margin:4px 0 0;font-size:.78rem;color:#64748b;">${q} cajas × ${factor} u/e + ${saldos} sueltos</p>` : '')}
          </div>
        </div>
      `,
      icon: 'info',
      showCancelButton: true,
      confirmButtonText: 'Aceptar',
      cancelButtonText: 'Cancelar',
      confirmButtonColor: '#059669',
      allowOutsideClick: false
    }).then((result) => {
      if (result.isConfirmed) {
        const cbPayload = { q: totalUnits, l, fv, cantidad_cajas: q, saldos: saldos };
        if (hayUe) { cbPayload.cantidad_ue = cantUe; cbPayload.en_udm = true; }
        if (this._cCB) this._cCB(cbPayload);
      } else {
        // Re-abrir captura si cancela
        this.openCapture(p, this._cCB, this._currentCapPending);
      }
    });
  },
  closeCapture() { document.getElementById('m-modal-capture').style.display = 'none'; },

  // ── FUNCIONES MODAL UBICACIÓN ──
  _locationData: null,

  closeLocationModal() {

  scanLocationBarcode() {
    if (this._locationCameraActive) {
      this.stopLocationCamera();
      return;
    }
    const preview = document.getElementById('m-loc-camera-preview');
    preview.style.display = 'block';
    const video = document.getElementById('m-loc-video');
    this._locationCameraActive = true;
    navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
      .then(stream => {
        this._locationCamera = stream;
        video.srcObject = stream;
        video.onloadedmetadata = () => video.play();
      })
      .catch(err => {
        this.toast('No se pudo acceder a la cámara: ' + err.message, 'error');
        preview.style.display = 'none';
        this._locationCameraActive = false;
      });
  },

  stopLocationCamera() {
    if (this._locationCamera) {
      this._locationCamera.getTracks().forEach(t => t.stop());
      this._locationCamera = null;
    }
    this._locationCameraActive = false;
    document.getElementById('m-loc-camera-preview').style.display = 'none';
  },

  async validateLocationCode(codigo) {
    if (!codigo || codigo.trim().length === 0) {
      document.getElementById('m-loc-validation').style.display = 'none';
      document.getElementById('m-loc-suggestions').style.display = 'none';
      return;
    }
    const codNorm = (codigo || '').replace(/[^A-Za-z0-9]/g, '');
    try {
      const r = await mApi('GET', '/param/ubicaciones?codigo=' + encodeURIComponent(codNorm));
      const locations = Array.isArray(r.data) ? r.data : [];
      const exactMatch = locations.find(x => (x.codigo || '').replace(/[^A-Za-z0-9]/g, '') === codNorm);
      const val = document.getElementById('m-loc-validation');
      if (exactMatch) {
        val.style.background = '#dcfce7';
        val.style.color = '#166534';
        val.innerHTML = `<i class="fa-solid fa-check-circle"></i> Ubicación encontrada: <b>${exactMatch.codigo}</b>`;
        val.style.display = 'block';
        this._selectedLocation = exactMatch;
        document.getElementById('m-loc-confirm-btn').disabled = false;
        document.getElementById('m-loc-confirm-btn').style.opacity = '1';
        document.getElementById('m-loc-suggestions').style.display = 'none';
      } else if (locations.length > 0) {
        val.style.background = '#fef3c7';
        val.style.color = '#92400e';
        val.innerHTML = `<i class="fa-solid fa-exclamation-triangle"></i> Ubicación no encontrada. Seleccione una de las sugerencias:`;
        val.style.display = 'block';
        const sugList = document.getElementById('m-loc-suggestions-list');
        sugList.innerHTML = locations.map(loc => `<div style="padding:8px;border-bottom:1px solid #e2e8f0;cursor:pointer;" onclick="MWMS.selectLocationFromList(${JSON.stringify(loc).replace(/"/g,'&quot;')})">${this.esc(loc.codigo)} (${loc.tipo_ubicacion})</div>`).join('');
        document.getElementById('m-loc-suggestions').style.display = 'block';
        this._selectedLocation = null;
        document.getElementById('m-loc-confirm-btn').disabled = true;
        document.getElementById('m-loc-confirm-btn').style.opacity = '0.5';
      } else {
        val.style.background = '#fee2e2';
        val.style.color = '#991b1b';
        val.innerHTML = `<i class="fa-solid fa-times-circle"></i> Ubicación "${codigo}" no existe`;
        val.style.display = 'block';
        document.getElementById('m-loc-suggestions').style.display = 'none';
        this._selectedLocation = null;
        document.getElementById('m-loc-confirm-btn').disabled = true;
        document.getElementById('m-loc-confirm-btn').style.opacity = '0.5';
      }
    } catch (e) {
      const val = document.getElementById('m-loc-validation');
      val.style.background = '#fee2e2';
      val.style.color = '#991b1b';
      val.innerHTML = `<i class="fa-solid fa-exclamation-circle"></i> Error: ${e.message}`;
      val.style.display = 'block';
    }
  },

  selectLocationFromList(location) {
    this._selectedLocation = location;
    document.getElementById('m-loc-codigo').value = location.codigo;
    document.getElementById('m-loc-validation').style.background = '#dcfce7';
    document.getElementById('m-loc-validation').style.color = '#166534';
    document.getElementById('m-loc-validation').innerHTML = `<i class="fa-solid fa-check-circle"></i> Ubicación seleccionada: <b>${location.codigo}</b>`;
    document.getElementById('m-loc-suggestions').style.display = 'none';
    document.getElementById('m-loc-confirm-btn').disabled = false;
    document.getElementById('m-loc-confirm-btn').style.opacity = '1';
  },

  async confirmLocationSelection() {
    if (!this._selectedLocation || !this._locationData) {
      this.toast('Seleccione una ubicación válida', 'error');
      return;
    }
    this.loading(true);
    try {
      if (this._palletMove) {
        // Mover todos los items del pallet
        for (const i of this._palletMove) {
           await mApi('POST', '/inventario/traslado', {
              producto_id:          i.producto_id,
              ubicacion_origen_id:  i.ubicacion_id,
              ubicacion_destino_id: this._selectedLocation.id,
              cantidad:             i.cantidad,
              cantidad_cajas:       i.cantidad_cajas,
              saldos:               i.saldos,
              lote:                 i.lote,
              fecha_vencimiento:    i.fecha_vencimiento,
              numero_pallet:        i.numero_pallet
           });
        }
        const movedLabel = (this._palletMove[0].numero_pallet != null && this._palletMove[0].numero_pallet !== '')
          ? `Pallet #${this._palletMove[0].numero_pallet}` : 'Artículos sin pallet';
        this.toast(`${movedLabel} ubicado completo.`, "success");
        this._palletMove = null;
      } else {
        // Mover item individual/parcial
        await mApi('POST', '/inventario/traslado', {
          producto_id:          this._locationData.item.producto_id,
          ubicacion_origen_id:  this._locationData.item.ubicacion_id,
          ubicacion_destino_id: this._selectedLocation.id,
          cantidad:             this._locationData.cantidad,
          cantidad_cajas:       this._locCajas,
          saldos:               this._locSaldos,
          lote:                 this._locationData.item.lote,
          fecha_vencimiento:    this._locationData.item.fecha_vencimiento,
          numero_pallet:        this._locationData.item.numero_pallet
        });
        const _movido   = parseFloat(this._locationData.cantidad);
        const _total    = parseFloat(this._locationData.item.cantidad);
        const _pendiente = Math.round((_total - _movido) * 1000) / 1000;
        if (_pendiente > 0) {
          this.toast(`✔ Ubicado: ${_movido} UND/T → ${this._selectedLocation.codigo}<br><b>Pendiente: ${_pendiente} UND/T</b>`, "success");
        } else {
          this.toast(`✔ Todo ubicado: ${_movido} UND/T → ${this._selectedLocation.codigo}`, "success");
        }
      }
      this.closeLocationModal();
      this.viewUbicar();
    } catch(e) {
      this.toast(e.message, "error");
    }
    this.loading(false);
  },

  loading(s){ let l=document.getElementById('m-loading'); if(s&&!l)document.body.insertAdjacentHTML('beforeend','<div id="m-loading" style="position:fixed;inset:0;background:rgba(255,255,255,.7);z-index:90000;display:flex;align-items:center;justify-content:center;font-size:2rem;color:#0F4C81;"><i class="fa-solid fa-spinner fa-spin"></i></div>'); else if(!s&&l)l.remove(); },
  toast(m,t='info'){ const c=document.getElementById('m-toast'), e=document.createElement('div'); e.className='m-toast-item '+t; e.innerHTML=m; c.appendChild(e); setTimeout(()=>{e.style.opacity='0';setTimeout(()=>e.remove(),500);},3000); },
  esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); },
  formatDate(d){
    if(!d)return'-';
    const m = String(d).match(/^(\d{4})-(\d{2})-(\d{2})/);
    const date = m ? new Date(+m[1], +m[2]-1, +m[3]) : new Date(d);
    if(isNaN(date.getTime()))return d;
    const day=String(date.getDate()).padStart(2,'0'); const month=String(date.getMonth()+1).padStart(2,'0');
    return `${day}/${month}/${date.getFullYear()}`;
  },
  formatDateShort(d){
    if(!d)return'N/A';
    // Si viene como "YYYY-MM-DD..." se arma en hora LOCAL para no perder un día
    // (new Date("YYYY-MM-DD") se interpreta como medianoche UTC, que en Bogotá
    // cae en el día anterior, ej. fechas de vencimiento mostradas un día antes).
    const m = String(d).match(/^(\d{4})-(\d{2})-(\d{2})/);
    const date = m ? new Date(+m[1], +m[2]-1, +m[3]) : new Date(d);
    if(isNaN(date.getTime()))return d;
    const day=String(date.getDate()).padStart(2,'0'); const month=String(date.getMonth()+1).padStart(2,'0'); const year=date.getFullYear();
    return `${day}/${month}/${year}`;
  },
  getDaysToExpiry(fechaVenc){ if(!fechaVenc)return null; const hoy=new Date(); hoy.setHours(0,0,0,0); const fv=new Date(fechaVenc); fv.setHours(0,0,0,0); const diff=fv-hoy; const dias=Math.ceil(diff/(1000*60*60*24)); return dias; },

  async viewUbicar() {
    document.getElementById('m-title').textContent = 'Ubicar — Patio';
    document.getElementById('nav-home').classList.remove('active');
    this.loading(true);
    try {
      const r = await mApi('GET', '/inventario/stock?estado=Disponible&tipo_ubicacion=Patio');
      const allItems = (r.data || r || []).filter(x => parseFloat(x.cantidad) > 0);
      this._ubicarItems = allItems;

      // Agrupar por pallet
      const groups = {};
      allItems.forEach((item, idx) => {
        const pk = (item.numero_pallet != null && item.numero_pallet !== '')
          ? String(item.numero_pallet) : '__sin_pallet__';
        if (!groups[pk]) groups[pk] = { id: pk, idxs: [] };
        groups[pk].idxs.push(idx);
      });
      const pallets = Object.values(groups);

      if (pallets.length === 0) {
        document.getElementById('m-content').innerHTML = `
          <div class="op-view">
            <div class="m-empty"><i class="fa-solid fa-truck-ramp-box"></i><p>Sin artículos en patio para ubicar</p></div>
          </div>`;
        this.loading(false); return;
      }

      // Construir HTML de pallets
      const palletsHtml = pallets.map(p => {
        const esSinPallet = p.id === '__sin_pallet__';
        const label       = esSinPallet ? 'Sin Pallet' : `Pallet #${p.id}`;
        const icon        = esSinPallet ? 'fa-boxes-stacked' : 'fa-pallet';
        const totalUnd    = p.idxs.reduce((s, i) => s + parseFloat(allItems[i].cantidad || 0), 0);
        const nRefs       = p.idxs.length;

        const itemsHtml = p.idxs.map(idx => {
          const it  = allItems[idx];
          const upc = Math.max(1, parseInt(it.unidades_caja || 1));
          // Línea de cantidad
          let cantLine;
          if (upc > 1) {
            const cajas  = parseInt(it.cantidad_cajas || 0);
            const suel   = parseFloat(it.saldos || 0);
            cantLine = `${cajas} caj × ${upc} + ${suel} suel`;
          } else {
            cantLine = `${parseFloat(it.cantidad)} und`;
          }
          const total   = parseFloat(it.cantidad);
          const lote    = it.lote && it.lote !== 'N/A' ? it.lote : null;
          const vence   = it.fecha_vencimiento ? this.formatDateShort(it.fecha_vencimiento) : null;
          const dias    = vence ? this.getDaysToExpiry(it.fecha_vencimiento) : null;
          const vColor  = dias !== null ? (dias <= 30 ? '#dc2626' : dias <= 90 ? '#d97706' : '#16a34a') : '#64748b';

          return `
          <div style="display:flex;align-items:stretch;gap:0;border-bottom:1px solid #f1f5f9;background:#fff;">
            <!-- Franja lateral de color por urgencia -->
            <div style="width:4px;background:${vence ? vColor : '#e2e8f0'};flex-shrink:0;border-radius:0;"></div>
            <!-- Contenido -->
            <div style="flex:1;padding:10px 10px 10px 12px;min-width:0;">
              <div style="font-size:.8rem;font-weight:700;color:#1e293b;line-height:1.35;margin-bottom:4px;">
                ${this.esc(it.producto_nombre)}
              </div>
              <div style="display:flex;flex-wrap:wrap;gap:4px 10px;align-items:center;">
                <span style="font-size:.72rem;color:#0891b2;font-weight:600;">
                  <i class="fa-solid fa-cubes" style="font-size:.65rem;"></i> ${cantLine} = <b>${total} UND/T</b>
                </span>
                ${lote ? `<span style="font-size:.68rem;color:#64748b;background:#f1f5f9;padding:1px 5px;border-radius:4px;">Lote: ${this.esc(lote)}</span>` : ''}
                ${vence ? `<span style="font-size:.68rem;color:${vColor};font-weight:600;"><i class="fa-regular fa-calendar-xmark" style="font-size:.63rem;"></i> ${vence}</span>` : ''}
                ${it.producto_codigo ? `<span style="font-size:.65rem;color:#94a3b8;">${this.esc(it.producto_codigo)}</span>` : ''}
              </div>
            </div>
            <!-- Botón ubicar -->
            <div style="display:flex;align-items:center;padding:8px 10px;flex-shrink:0;">
              <button onclick="MWMS.stUb(${idx})"
                      style="background:#059669;color:#fff;border:none;border-radius:8px;padding:8px 10px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:.62rem;font-weight:700;line-height:1.2;">
                <i class="fa-solid fa-location-dot" style="font-size:1rem;"></i>
                Ubicar
              </button>
            </div>
          </div>`;
        }).join('');

        return `
        <div style="border-radius:10px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.08);margin-bottom:12px;">
          <!-- Cabecera del pallet (acordeón) -->
          <div onclick="MWMS.togglePallet('pal-${p.id}')"
               style="display:flex;align-items:center;gap:10px;padding:11px 14px;background:linear-gradient(135deg,#1e293b,#334155);cursor:pointer;user-select:none;">
            <div style="width:36px;height:36px;border-radius:8px;background:rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
              <i class="fa-solid ${icon}" style="color:#e2e8f0;font-size:.9rem;"></i>
            </div>
            <div style="flex:1;min-width:0;">
              <div style="color:#fff;font-weight:700;font-size:.88rem;">${label}</div>
              <div style="color:#94a3b8;font-size:.66rem;margin-top:1px;">
                ${nRefs} referencia${nRefs !== 1 ? 's' : ''} · ${totalUnd} UND/T
              </div>
            </div>
            <div style="display:flex;align-items:center;gap:8px;flex-shrink:0;">
              <button onclick="event.stopPropagation();MWMS.ubicarPalletTodo('${p.id}')"
                      style="background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.25);border-radius:6px;padding:5px 10px;font-size:.65rem;font-weight:700;cursor:pointer;white-space:nowrap;">
                <i class="fa-solid fa-truck-fast"></i> Todo

            </div>
          </div>
          <!-- Cuerpo expandible -->
          <div id="pal-${p.id}" style="display:block;">
            ${itemsHtml}
          </div>
        </div>`;
      }).join('');

      document.getElementById('m-content').innerHTML = `
        <div class="op-view">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
            <span style="font-size:.68rem;color:#64748b;font-weight:700;letter-spacing:.05em;">
              PATIO — ${allItems.length} artículo${allItems.length !== 1 ? 's' : ''} en ${pallets.length} pallet${pallets.length !== 1 ? 's' : ''}
            </span>
            <button onclick="MWMS.viewUbicar()" style="background:none;border:none;color:#0891b2;font-size:.72rem;cursor:pointer;">
              <i class="fa-solid fa-arrows-rotate"></i> Actualizar
            </button>
          </div>
          ${palletsHtml}

    } catch(e) { this.toast(e.message || 'Error al cargar', 'error'); }
    this.loading(false);
  },

  togglePallet(elId) {
    const body = document.getElementById(elId);
    const icon = document.getElementById('ico-' + elId);
    if (!body) return;
    const abierto = body.style.display !== 'none';
    body.style.display = abierto ? 'none' : 'block';
    if (icon) icon.style.transform = abierto ? 'rotate(-90deg)' : 'rotate(0deg)';
  },

  async ubicarPalletTodo(palletId) {
    // Ubicar pallet completo: el auxiliar elige destino y se mueven TODAS las referencias con su cantidad total
    const src = this._ubicarItems || [];
    const pItems = src.filter(x => {
      if (palletId === '__sin_pallet__') return x.numero_pallet == null || x.numero_pallet === '';
      return String(x.numero_pallet) === String(palletId);
    });
    if (!pItems.length) return this.toast("Artículos no encontrados", "error");
    const label = palletId === '__sin_pallet__' ? 'artículos sin pallet' : `Pallet #${palletId}`;
    // Mostrar resumen del pallet y pedir confirmación antes de proceder
    const resumen = pItems.map(x => {
      const upc = Math.max(1, parseInt(x.unidades_caja || 1));
      return upc > 1
        ? `• ${this.esc(x.producto_nombre)}: ${parseInt(x.cantidad_cajas||0)} caj + ${parseFloat(x.saldos||0)} suel = ${x.cantidad} UND/T`
        : `• ${this.esc(x.producto_nombre)}: ${x.cantidad} UND/T`;
    }).join('<br>');
    // Confirmar con el auxiliar antes de proceder
    document.getElementById('m-qty-product-info').innerHTML =
      `<b>${label} — Ubicar Completo</b><br>` +
      `<span style="color:#64748b;font-size:.72rem;">Se moverán TODAS las referencias a una sola ubicación destino:</span><br><br>` +
      `<span style="font-size:.72rem;line-height:1.6;">${resumen}</span>`;
    document.getElementById('m-qty-cajas').closest('div').style.display  = 'none';
    document.getElementById('m-qty-saldos').closest('div').style.display = 'none';
    const el = document.getElementById('m-qty-total');
    el.style.cssText = 'background:#fef3c7;border:1px solid #fcd34d;border-radius:6px;padding:8px;font-size:.8rem;font-weight:700;color:#92400e;margin-bottom:12px;';
    el.textContent = 'Confirme y seleccione la ubicación destino';
    // Reemplazar botón de confirmar temporalmente
    const btn = document.getElementById('m-qty-confirm-btn');
    btn.textContent = '📦 Confirmar y Seleccionar Destino';
    btn.onclick = () => {
      btn.textContent = ''; btn.innerHTML = '<i class="fa-solid fa-location-dot"></i> Seleccionar Destino';
      btn.onclick = () => MWMS._confirmQty();
      // Restaurar grid de inputs
      document.getElementById('m-qty-cajas').closest('div').style.display  = '';
      document.getElementById('m-qty-saldos').closest('div').style.display = '';
      this._palletMove = pItems;
      document.getElementById('m-modal-qty').style.display = 'none';
      this.openLocationModal(pItems[0], pItems[0].cantidad);
    };
    document.getElementById('m-modal-qty').style.display = 'flex';
  },

  _qtyItem: null, _qtyUpc: 1, _locCajas: 0, _locSaldos: 0,

  stUb(idx) {
    const i = (this._ubicarItems || [])[idx];
    if (!i) return this.toast("Artículo no encontrado", "error");
    this._qtyItem = i;
    const upc     = Math.max(1, parseInt(i.unidades_caja || 1));
    this._qtyUpc  = upc;
    const maxCajas  = parseInt(i.cantidad_cajas || 0);
    const maxSaldos = parseFloat(i.saldos || 0);
    const maxTotal  = parseFloat(i.cantidad || 0);
    const palletTxt = i.numero_pallet ? ` · Pallet #${i.numero_pallet}` : '';
    const dispTxt   = upc > 1
      ? `${maxCajas} caj × ${upc} + ${maxSaldos} suel = <b>${maxTotal} UND/T</b>`
      : `<b>${maxTotal} UND/T disponibles</b>`;
    document.getElementById('m-qty-product-info').innerHTML =
      `<b>${this.esc(i.producto_nombre)}</b>` +
      `<br><span style="color:#475569;">Lote: ${i.lote || 'N/A'}${palletTxt}</span>` +
      `<br><span style="color:#059669;">Disponible: ${dispTxt}</span>`;
    const cajasEl  = document.getElementById('m-qty-cajas');
    const saldosEl = document.getElementById('m-qty-saldos');
    cajasEl.value  = '';
    saldosEl.value = '';
    cajasEl.max    = maxCajas;
    cajasEl.placeholder  = `0 – ${maxCajas}`;
    saldosEl.max         = upc > 1 ? maxSaldos : maxTotal;
    saldosEl.placeholder = upc > 1 ? `0 – ${maxSaldos}` : `0 – ${maxTotal}`;
    const cajasWrap = cajasEl.closest('div');
    cajasWrap.style.display = upc > 1 ? '' : 'none';
    const saldosLabel = cajasWrap.nextElementSibling?.querySelector('.m-label');
    if (saldosLabel) saldosLabel.textContent = upc > 1 ? 'Sueltos a mover' : 'Cantidad a mover';
    this._updQtyTotal();
    document.getElementById('m-modal-qty').style.display = 'flex';
    setTimeout(() => (upc > 1 ? cajasEl : saldosEl).focus(), 100);
  },

  _updQtyTotal() {
    const upc      = this._qtyUpc || 1;
    const cajas    = parseFloat(document.getElementById('m-qty-cajas')?.value  || 0) || 0;
    const saldos   = parseFloat(document.getElementById('m-qty-saldos')?.value || 0) || 0;
    const total    = upc > 1 ? cajas * upc + saldos : saldos;
    const maxTotal = parseFloat(this._qtyItem?.cantidad || 0);
    const el = document.getElementById('m-qty-total');
    if (!el) return;
    if (total > maxTotal && total > 0) {
      el.style.cssText = 'background:#fee2e2;border:1px solid #fca5a5;border-radius:6px;padding:8px;font-size:.8rem;font-weight:700;color:#991b1b;margin-bottom:12px;';
      el.textContent = `Excede disponible: ${total} > ${maxTotal} UND/T`;
    } else if (total > 0) {
      el.style.cssText = 'background:#eff6ff;border:1px solid #bfdbfe;border-radius:6px;padding:8px;font-size:.8rem;font-weight:700;color:#1d4ed8;margin-bottom:12px;';
      const pend = Math.round((maxTotal - total) * 1000) / 1000;
      el.textContent = pend > 0
        ? `A mover: ${total} UND/T · Pendiente: ${pend} UND/T`
        : `A mover: ${total} UND/T (total disponible)`;
    } else {
      el.style.cssText = 'background:#f8fafc;border:1px solid #e2e8f0;border-radius:6px;padding:8px;font-size:.8rem;font-weight:400;color:#94a3b8;margin-bottom:12px;';
      el.textContent = 'Ingrese cuánto va a ubicar';
    }
  },

  _confirmQty() {
    const i = this._qtyItem;
    if (!i) return;
    const upc      = this._qtyUpc || 1;
    const cajas    = parseFloat(document.getElementById('m-qty-cajas')?.value  || 0) || 0;
    const saldos   = parseFloat(document.getElementById('m-qty-saldos')?.value || 0) || 0;
    const total    = upc > 1 ? cajas * upc + saldos : saldos;
    const maxTotal = parseFloat(i.cantidad);
    if (total <= 0)       return this.toast('Ingrese la cantidad a ubicar', 'error');
    if (total > maxTotal) return this.toast(`Máximo disponible: ${maxTotal} UND/TOTAL`, 'error');
    this._locCajas  = upc > 1 ? cajas : 0;
    this._locSaldos = saldos;
    document.getElementById('m-modal-qty').style.display = 'none';
    this.openLocationModal(i, total);
  },

  _previewDevFotos(input) {

  async guardarDevolucionODC() {
    const odc = this._op?.odc;
    if (!odc) return;
    const motivoGeneral = document.getElementById('dev-motivo-general')?.value?.trim() || 'Novedad en recepción';
    
    // Recopilar líneas con cantidad > 0
    const detalles = [];
    document.querySelectorAll('.dev-qty-odc').forEach((inp, i) => {
      const qty = parseFloat(inp.value || 0);
      if (qty <= 0) return;
      const row = inp.closest('[data-pid]');
      const pid = row?.dataset?.pid;
      if (!pid) return;
      const motivo = document.querySelectorAll('.dev-motivo-odc')[i]?.value || 'Averia';
      const obs    = document.querySelectorAll('.dev-obs-odc')[i]?.value || '';
      detalles.push({ producto_id: parseInt(pid), cantidad: qty, motivo, observacion: obs });
    });

    if (!detalles.length) return this.toast('Ingrese al menos un producto con cantidad > 0', 'error');

    this.loading(true);
    try {
      const formData = new FormData();
      formData.append('odc_id', odc.id);
      formData.append('proveedor', odc.proveedor?.razon_social || '');
      formData.append('motivo_general', motivoGeneral);
      formData.append('detalles', JSON.stringify(detalles));

      const fotosInput = document.getElementById('dev-fotos-input');
      if (fotosInput?.files?.length) {
        Array.from(fotosInput.files).slice(0,5).forEach((f, i) => formData.append(`foto_${i}`, f));
      }

      const res = await fetch(M_API + '/devoluciones/desde-odc', {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + _mToken },
        body: formData
      });
      const json = await res.json();
      if (json.error) throw new Error(json.message);

      document.getElementById('m-modal-devolucion')?.remove();
      this.toast(`✓ Devolución ${json.data?.numero_devolucion} registrada`, 'success');
    } catch(e) { this.toast(e.message, 'error'); }
    this.loading(false);
  },

  async _dvBuscarQr() {
    const qr = document.getElementById('dv-m-qr')?.value?.trim();
    if (!qr) return;
    this.loading(true);
    try {
      const r = await mApi('GET', '/recepciones/buscar-qr?q=' + encodeURIComponent(qr));
      if (r.error) throw new Error(r.message || 'Producto no encontrado');
      const p = r.data.producto;
      const upc = parseInt(p.unidades_caja || 1);
      this._devQrProd = { id: p.id, nombre: p.nombre, upc };
      document.getElementById('dv-m-qr').value = '';
      document.getElementById('dv-m-lote').value = r.data.lote_raw || '';
      const found = document.getElementById('dv-m-prod-found');
      if (found) { found.textContent = '✓ ' + p.nombre + (r.data.lote_raw ? ' · Lote: ' + r.data.lote_raw : ''); found.style.display = 'block'; }
      this._dvConfigCampos(upc);
      (upc > 1 ? document.getElementById('dv-m-cajas') : document.getElementById('dv-m-cant'))?.focus();
      this.toast(p.nombre, 'success');
    } catch(e) {
      this.toast('Producto no encontrado', 'error');
    } finally { this.loading(false); }
  },

  _dvBuscarNombre(q) {
    clearTimeout(this._dvNombreTimer);
    const drop = document.getElementById('dv-m-nombre-drop');
    if (!q || q.length < 2) { if(drop) drop.style.display='none'; return; }
    this._dvNombreTimer = setTimeout(async () => {
      try {
        const r = await mApi('GET', '/productos?q=' + encodeURIComponent(q) + '&limit=8');
        const data = r.data || [];
        if (!drop) return;
        if (!data.length) { drop.innerHTML='<div style="padding:10px;color:#94a3b8;">Sin resultados</div>'; drop.style.display='block'; return; }
        drop.innerHTML = data.map(p => `
          <div onclick="MWMS._dvSelNombre(${p.id},${JSON.stringify(p.nombre || '')},${parseInt(p.unidades_caja||1)})"
            style="padding:10px 12px;cursor:pointer;border-bottom:1px solid #f1f5f9;display:flex;flex-direction:column;gap:2px;"
            onmouseover="this.style.background='#f8fafc'" onmouseout="this.style.background=''">
            <strong>${this.esc(p.nombre)}</strong>
            <span style="color:#94a3b8;font-size:.7rem;">[${this.esc(p.codigo_interno||'')}] UxC: ${parseInt(p.unidades_caja||1)}</span>
          </div>`).join('');
        drop.style.display = 'block';
      } catch(e) { /* sin resultados */ }
    }, 350);
  },

  _dvSelNombre(id, nombre, upc) {
    this._devQrProd = { id, nombre, upc: parseInt(upc || 1) };
    const drop = document.getElementById('dv-m-nombre-drop');
    if (drop) drop.style.display = 'none';
    document.getElementById('dv-m-nombre').value = nombre;
    const found = document.getElementById('dv-m-prod-found');
    if (found) { found.textContent = '✓ ' + nombre; found.style.display = 'block'; }
    this._dvConfigCampos(parseInt(upc || 1));
    const upcVal = parseInt(upc || 1);
    (upcVal > 1 ? document.getElementById('dv-m-cajas') : document.getElementById('dv-m-cant'))?.focus();
    this.toast(nombre, 'success');
  },

  _dvConfigCampos(upc) {
    const cajasGroup = document.getElementById('dv-m-cajas-group');
    const cantLbl    = document.getElementById('dv-m-cant-label');
    if (cajasGroup) cajasGroup.style.display = upc > 1 ? '' : 'none';
    if (cantLbl)    cantLbl.textContent       = upc > 1 ? 'Sueltos' : 'Cant. (unidades)';
    const cajasEl = document.getElementById('dv-m-cajas');
    const cantEl  = document.getElementById('dv-m-cant');
    if (cajasEl) cajasEl.value = '';
    if (cantEl)  cantEl.value  = '';
    const prev = document.getElementById('dv-m-total-preview');
    if (prev) prev.style.display = 'none';
  },

  _dvUpdTotal() {
    const upc    = this._devQrProd?.upc || 1;
    const cajas  = parseFloat(document.getElementById('dv-m-cajas')?.value  || 0) || 0;
    const sueltos= parseFloat(document.getElementById('dv-m-cant')?.value   || 0) || 0;
    const total  = upc > 1 ? cajas * upc + sueltos : sueltos;
    const el     = document.getElementById('dv-m-total-preview');
    if (!el) return;
    if (total <= 0) { el.style.display = 'none'; return; }
    el.style.display = 'block';
    el.textContent = upc > 1
      ? `Total: ${cajas} caj × ${upc} + ${sueltos} sueltos = ${total} UND/T`
      : `Total: ${total} UND/T`;
  },

  _dvAgregarItem() {
    if (!this._devQrProd) { this.toast('Busque un producto primero', 'error'); return; }
    const upc    = this._devQrProd.upc || 1;
    const cajas  = parseFloat(document.getElementById('dv-m-cajas')?.value  || 0) || 0;
    const sueltos= parseFloat(document.getElementById('dv-m-cant')?.value   || 0) || 0;
    const total  = upc > 1 ? cajas * upc + sueltos : sueltos;
    if (total <= 0) { this.toast('Ingrese cantidad', 'error'); return; }
    this._devItems.push({
      producto_id:    this._devQrProd.id,
      nombre:         this._devQrProd.nombre,
      lote:           document.getElementById('dv-m-lote')?.value || null,
      cantidad:       total,
      cantidad_cajas: upc > 1 ? cajas : 0,
      saldos:         sueltos,
      condicion:      document.getElementById('dv-m-cond')?.value || 'bueno',
      motivo:         'Otro',
    });
    this._devQrProd = null;
    const found = document.getElementById('dv-m-prod-found');
    if (found) found.style.display = 'none';
    document.getElementById('dv-m-nombre').value = '';
    document.getElementById('dv-m-lote').value   = '';
    const cajasEl = document.getElementById('dv-m-cajas');
    if (cajasEl) cajasEl.value = '';
    document.getElementById('dv-m-cant').value   = '';
    const prev = document.getElementById('dv-m-total-preview');
    if (prev) prev.style.display = 'none';
    const cajasGroup = document.getElementById('dv-m-cajas-group');
    if (cajasGroup) cajasGroup.style.display = 'none';
    this._dvRenderItems();
  },

  _dvRenderItems() {
    const el = document.getElementById('dv-m-items');
    if (!el) return;
    if (!this._devItems.length) { el.innerHTML = ''; return; }
    el.innerHTML = `<div style="background:#fff;border:1px solid #e2e8f0;border-radius:8px;overflow:hidden;">
      ${this._devItems.map((it,i) => `
        <div style="padding:8px 12px;border-bottom:1px solid #f1f5f9;display:flex;justify-content:space-between;align-items:center;font-size:.78rem;">
          <div>
            <div style="font-weight:700;">${this.esc(it.nombre)}</div>
            <div style="color:#64748b;">Lote: ${it.lote||'-'} · ${it.condicion} · ${it.cantidad_cajas > 0 ? it.cantidad_cajas + ' caj + ' + it.saldos + ' sueltos = ' : ''}${it.cantidad} uds</div>
          </div>
          <button onclick="MWMS._dvQuitarItem(${i})" style="background:none;border:none;color:#dc2626;font-size:1rem;cursor:pointer;">✕</button>
        </div>`).join('')}
    </div>`;
  },

  _dvQuitarItem(i) { this._devItems.splice(i, 1); this._dvRenderItems(); },

  async _dvEnviar() {
    const motivo = document.getElementById('dv-m-motivo')?.value?.trim();
    if (!motivo) { this.toast('Ingrese el motivo', 'error'); return; }
    if (!this._devItems.length) { this.toast('Agregue al menos un producto', 'error'); return; }
    const btn = document.getElementById('dv-m-submit');
    if (btn) btn.disabled = true;
    this.loading(true);
    try {
      const r = await mApi('POST', '/devoluciones', {
        tipo:           'cliente',
        motivo_general: motivo,
        detalles:       this._devItems,
      });
      this.toast('Devolución ' + r.data.numero + ' registrada', 'success');
      this._devItems  = [];
      this._devQrProd = null;
      this.showHome();
    } catch(e) {
      this.toast(e.message || 'Error al enviar', 'error');
      if (btn) btn.disabled = false;
    } finally { this.loading(false); }
  },

  async buscarProductos() {
    const q       = (document.getElementById('pr-search')?.value  || '').trim();
    const ambId   = document.getElementById('pr-f-ambiente')?.value || '';
    const activo  = document.getElementById('pr-f-activo')?.value  || '';
    const udm     = document.getElementById('pr-f-udm')?.value     || '';
    const list    = document.getElementById('pr-list');
    if (!list) return;

    /* Requiere al menos 1 filtro activo o 2+ chars de texto para no traer todo */
    if (!q && !ambId && activo === '' && !udm) {
      list.innerHTML = '<div class="m-empty"><i class="fa-solid fa-boxes-stacked"></i><p>Use los filtros o busque por nombre</p></div>';
      return;
    }
    if (q && q.length < 2 && !ambId && activo === '' && !udm) return;

    list.innerHTML = '<div style="text-align:center;padding:20px;font-size:.8rem;color:#64748b;"><i class="fa-solid fa-circle-notch fa-spin"></i> Buscando...</div>';
    try {
      const params = new URLSearchParams({ limit: '200' });
      if (q)      params.set('q', q);
      if (ambId)  params.set('ambiente_id', ambId);
      if (activo) params.set('activo', activo);
      if (udm)    params.set('unidad_medida', udm);

      const r = await mApi('GET', '/param/productos/buscar?' + params.toString());
      const data = r.data || [];
      if (!data.length) {
        list.innerHTML = '<div class="m-empty"><p>No se encontraron productos con esos filtros</p></div>';
        return;
      }
      const ambColor = { SECO:'#1d4ed8', REFRIGERADO:'#0891b2', CONGELADO:'#7c3aed' };
      list.innerHTML = data.map(p => {
        const amb = (p.ambiente_nombre || '').toUpperCase();
        const ambBg = p.ambiente_color || ambColor[amb] || '#64748b';
        const estadoBadge = p.activo
          ? '<span style="background:#dcfce7;color:#16a34a;padding:1px 6px;border-radius:10px;font-size:.6rem;font-weight:700;">ACTIVO</span>'
          : '<span style="background:#fee2e2;color:#dc2626;padding:1px 6px;border-radius:10px;font-size:.6rem;font-weight:700;">INACTIVO</span>';
        return `
        <div style="background:#fff;border-radius:10px;border:1px solid #e2e8f0;border-left:4px solid ${ambBg};padding:10px 12px;margin-bottom:8px;cursor:pointer;"
             onclick="MWMS.viewProductoDetail(${p.id})">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;">
            <div style="flex:1;min-width:0;">
              <div style="font-weight:800;font-size:.82rem;color:#1e293b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${this.esc(p.nombre)}</div>
              <div style="font-size:.68rem;color:#64748b;margin-top:1px;">${this.esc(p.codigo_interno)} ${p.codigo_ean && p.codigo_ean !== p.codigo_interno ? '· EAN: '+this.esc(p.codigo_ean) : ''}</div>
            </div>
            ${estadoBadge}
          </div>
          <div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:6px;align-items:center;">
            ${p.ambiente_nombre && p.ambiente_nombre !== '-' ? `<span style="background:${ambBg}20;color:${ambBg};padding:2px 7px;border-radius:10px;font-size:.62rem;font-weight:700;">${this.esc(p.ambiente_nombre)}</span>` : ''}
            ${p.unidad_medida ? `<span style="background:#f1f5f9;color:#475569;padding:2px 7px;border-radius:10px;font-size:.62rem;font-weight:700;">${this.esc(p.unidad_medida)}</span>` : ''}
            <span style="background:#eff6ff;color:#1d4ed8;padding:2px 7px;border-radius:10px;font-size:.62rem;font-weight:700;">${this.esc(p.categoria_nombre||'-')}</span>
            <span style="margin-left:auto;font-size:.72rem;font-weight:800;color:#0284c7;">Stock: ${parseFloat(p.stock||0).toLocaleString('es-CO')}</span>
          </div>
        </div>`;
      }).join('');
    } catch(e) {
      list.innerHTML = '<div class="m-empty" style="color:red"><p>Error en la búsqueda</p></div>';
    }
  },

      const fotos = p.fotos || [];
      
      let galleryHtml = '';

        const baseUrl = M_API.replace('/api', '');
        galleryHtml = `<div style="display:flex;gap:8px;overflow-x:auto;padding-bottom:10px;">
          ${fotos.map(f => {
             const imgUrl = f.url.startsWith('http') ? f.url : (baseUrl + f.url);
             return `<img src="${imgUrl}" style="height:100px;min-width:100px;object-fit:cover;border-radius:8px;border:1px solid #cbd5e1;cursor:pointer;" onclick="window.open('${imgUrl}','_blank')">`;
          }).join('')}

            <div>

      document.getElementById('m-content').innerHTML = `

             <div style="font-weight:800;font-size:1rem;color:#0f172a;">${MWMS.esc(p.codigo_interno)}</div>
             <div style="font-size:.8rem;color:#334155;margin-bottom:10px;font-weight:600;">${MWMS.esc(p.descripcion||p.nombre)}</div>
             
             <div style="font-size:.75rem;color:#64748b;margin-bottom:12px;font-weight:700;display:flex;gap:10px;">
                <span>EAN: ${MWMS.esc(p.ean_principal||'-')}</span>
                <span>Unidad: ${MWMS.esc(p.unidad_medida)}</span>
             </div>

             <div style="border-top:1px solid #e2e8f0;padding-top:12px;margin-bottom:12px;">
                <div style="font-weight:700;font-size:.8rem;color:#1e293b;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;">
                  <span><i class="fa-solid fa-barcode"></i> Códigos EAN / Referencias</span>
                  <button class="m-btn-icon primary sm" onclick="MWMS.promptAddEan(${p.id})"><i class="fa-solid fa-plus"></i></button>
                </div>
                ${eansHtml}

             <div style="margin-top:10px;background:#f8fafc;border:2px dashed #94a3b8;border-radius:8px;padding:12px;">
                <p style="font-size:.75rem;color:#64748b;margin:0 0 10px 0;font-weight:600;text-align:center;">Agregar evidencia fotográfica</p>

                    style="display:flex;justify-content:center;align-items:center;gap:6px;font-size:.82rem;cursor:pointer;margin:0;">

                  <input type="file" id="pr-cam-${p.id}"

                    style="position:fixed;top:0;left:0;width:0;height:0;opacity:0;"

                  <!-- GALERÍA: input normal sin capture -->
                  <label for="pr-gal-${p.id}" class="m-btn secondary"
                    style="display:flex;align-items:center;gap:6px;padding:0 14px;font-size:.82rem;white-space:nowrap;cursor:pointer;margin:0;">

      this.loading(false);
    }
  },

  async uploadProductoFotos(id, backFn = 'MWMS.viewProductos()') {
    const input = document.getElementById('pr-foto-input');
    if(!input || !input.files || input.files.length === 0) {
      return this.toast('Seleccione una foto primero', 'warning');
    }
    
    const formData = new FormData();
    Array.from(input.files).forEach(f => formData.append('fotos[]', f));

    this.loading(true);
    try {
      const token = localStorage.getItem('wms_token');
      const res = await fetch(`${M_API}/param/productos/${id}/fotos`, {
         method: 'POST',
         headers: { 'Authorization': `Bearer ${token}` },
         body: formData
      });
      const data = await res.json();
      if(data.error) throw new Error(data.message);
      
      this.toast('Fotos subidas con éxito', 'success');
      this.viewProductoDetail(id); // recargar vista
    } catch(e) {
      this.toast(e.message||'Error subiendo fotos', 'error');
      this.loading(false);
    }
  },

  // ── AGREGAR EAN: usa SweetAlert2 (funciona sin modal propio) ─────────────
  promptAddEan(id) {
    Swal.fire({
      title: '<i class="fa-solid fa-barcode" style="color:#0F4C81;margin-right:6px;"></i>Agregar Código EAN',
      html: `
        <p style="font-size:.78rem;color:#475569;margin-bottom:12px;text-align:left;">
          Use el escáner Bluetooth/USB o la cámara del dispositivo.
        </p>
        <div style="display:flex;gap:8px;align-items:center;">
          <input type="text" id="swal-ean-input" class="swal2-input"
            placeholder="Ej: 7701234567890" inputmode="numeric" autocomplete="off"
            style="flex:1;margin:0;font-size:1rem;letter-spacing:.04em;">
          <button type="button"
            onclick="MWMS.scanBarcode(c => { document.getElementById('swal-ean-input').value=c; MWMS.toast('Código: '+c,'success'); })"
            style="height:42px;min-width:44px;background:#0F4C81;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:.9rem;display:flex;align-items:center;justify-content:center;">
            <i class="fa-solid fa-camera"></i>
          </button>
        </div>`,
      showCancelButton: true,
      confirmButtonText: '<i class="fa-solid fa-save"></i> Guardar',
      cancelButtonText: 'Cancelar',
      confirmButtonColor: '#0F4C81',
      width: '340px',
      didOpen: () => setTimeout(() => document.getElementById('swal-ean-input')?.focus(), 80),
      preConfirm: () => {
        const v = document.getElementById('swal-ean-input')?.value.trim();
        if (!v) return Swal.showValidationMessage('Ingrese el código EAN');
        return v;
      }
    }).then(result => {
      if (result.isConfirmed && result.value) this._saveEan(id, result.value);
    });
  },

  async _saveEan(id, code) {
    this.loading(true);
    try {
      await mApi('POST', '/param/productos/' + id + '/eans', { codigo_ean: code });
      this.toast('EAN agregado con éxito', 'success');
      this.viewProductoDetail(id);
    } catch(e) {
      this.toast(e.message || 'Error al agregar EAN', 'error');
      this.loading(false);
