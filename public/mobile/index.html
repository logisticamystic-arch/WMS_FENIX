<script>
const M_API = '/WMS_FENIX/public/api';
let _mToken    = localStorage.getItem('wms_token') || '';
let _mUser     = JSON.parse(localStorage.getItem('wms_user') || 'null');

// Retry queue para operaciones offline
const _offlineQueue = {
  queue: JSON.parse(localStorage.getItem('_api_queue') || '[]'),
  add(op) { this.queue.push({...op, timestamp: Date.now()}); this.save(); },
  remove(idx) { this.queue.splice(idx, 1); this.save(); },
  save() { localStorage.setItem('_api_queue', JSON.stringify(this.queue)); },
  flush() { return this.queue.length > 0 ? this.queue : null; },
};

async function mApi(method, path, data=null, _retries=0) {
  const url = M_API + path;
  const headers = { 'Content-Type': 'application/json' };
  if (_mToken) headers['Authorization'] = 'Bearer ' + _mToken;
  const cfg = { method, headers, signal: AbortSignal.timeout(20000) }; // Aumentado a 20s para estabilidad móvil
  if (data) cfg.body = JSON.stringify(data);
  
  try {
    const res = await fetch(url, cfg);
    if (res.status === 401 && !path.includes('/auth/login')) { 
      MWMS.logout(); 
      throw new Error('Sesión expirada'); 
    }
    const json = await res.json();
    
    // Si obtuvo respuesta exitosa, vaciar offline queue si existe
    if (json.data || json.success) {
      if (_offlineQueue.queue.length > 0) {
        console.log('✓ Conexión restaurada, procesando ' + _offlineQueue.queue.length + ' operaciones en cola');
      }
      _offlineQueue.queue = [];
      _offlineQueue.save();
    }
    
    if (json.error) {
      const err = new Error(json.message || 'Error desconocido');
      err.isValidationError = true;
      throw err;
    }
    return json;
  } catch(e) {
    // Timeout o error de red
    if (e.name === 'AbortError' || !navigator.onLine) {
      // Solo guardar en queue si es POST/PUT (operaciones, no lecturas)
      if (method !== 'GET') {
        _offlineQueue.add({method, path, data});
        throw new Error('📡 Operación guardada localmente. Se enviará cuando haya conexión.');
      }
      throw new Error('Sin conexión a internet');
    }
    
    // NO reintentar si es error de validación (excedentes, stock, etc) o errores 4xx
    if (e.isValidationError || (e.status && e.status < 500)) {
      throw e;
    }

    // Reintentos solo para errores críticos/transitorios del servidor (500+) o fallas de red no capturadas
    if (_retries < 3) {
      const delay = Math.pow(2, _retries) * 1000;
      console.warn(`Reintentando en ${delay}ms... (intento ${_retries + 1}/3)`);
      await new Promise(r => setTimeout(r, delay));
      return mApi(method, path, data, _retries + 1);
    }
    
    throw e;
  }
}

const MWMS = {
  _pin: '', _timer: null, _lastCnt: 0, _sCb: null, _dCb: null, _op: null,
    _expiryPollTimer: null,
    _expiryAprobacionId: null,
    _expiryOnApproved: null,

  init() { 
    // Listeners para cambios de conexión
    window.addEventListener('online', () => this._processOfflineQueue());
    window.addEventListener('offline', () => this.toast('📡 Sin conexión', 'warning'));
    
    if (_mToken && _mUser) this.showApp(); else this.showLogin(); 
  },
  
  async _processOfflineQueue() {
    if (_offlineQueue.queue.length === 0) return;
    this.toast(`Procesando ${_offlineQueue.queue.length} operación(es)...`);
    let success = 0, failed = 0;
    for (let i = _offlineQueue.queue.length - 1; i >= 0; i--) {
      try {
        const op = _offlineQueue.queue[i];
        await mApi(op.method, op.path, op.data);
        _offlineQueue.remove(i);
        success++;
      } catch(e) {
        failed++;
        console.error('Fallo al procesar cola:', e.message);
      }
    }
    this.toast(`✓ ${success} enviadas, ${failed} pendientes`, success > 0 ? 'success' : 'error');
  },
  showLogin() { document.getElementById('login-screen').style.display='flex'; document.getElementById('main-screen').style.display='none'; this._pin=''; this.updPin(); this.loadLoginEmpresas(); },
  showApp() {
    document.getElementById('login-screen').style.display='none'; document.getElementById('main-screen').style.display='flex';
    document.getElementById('m-subtitle').textContent = _mUser.rol + ' · ' + (_mUser.sucursal||'CEDE');
    this.showHome(); this.startNotif();
  },
  updPin() { for(let i=0;i<4;i++){ const d=document.getElementById('mpd'+i); d.style.background=i<this._pin.length?'#0F4C81':'#fff'; d.style.borderColor=i<this._pin.length?'#0F4C81':'#cbd5e1';} },
  pinPress(v) { if(v==='del') this._pin=this._pin.slice(0,-1); else if(this._pin.length<4) this._pin+=v; this.updPin(); if(this._pin.length===4) setTimeout(()=>this.doLogin(),200); },
  async loadLoginEmpresas() {
    const empresaSel = document.getElementById('m-empresa');
    if (!empresaSel) return;
    empresaSel.innerHTML = '<option value="">Cargando empresas...</option>';
    try {
      const r = await mApi('GET', '/auth/empresas');
      const empresas = r.data || [];
      empresaSel.innerHTML = '<option value="">— Seleccione una empresa —</option>' + empresas.map(e =>
        `<option value="${e.id}">${e.razon_social} ${e.nit ? '(' + e.nit + ')' : ''}</option>`
      ).join('');
    } catch (error) {
      empresaSel.innerHTML = '<option value="">Error cargando empresas</option>';
    }
  },

  async doLogin() {
    const doc = document.getElementById('m-doc').value.trim();
    const empresaId = document.getElementById('m-empresa').value;
    if (!doc || !empresaId || !this._pin) {
      if (!empresaId) {
        document.getElementById('m-login-err').textContent='Seleccione la empresa antes de ingresar.';
        document.getElementById('m-login-err').style.display='block';
      }
      return;
    }
    this.loading(true);
    try {
      const r = await mApi('POST','/auth/login',{documento:doc,pin:this._pin,empresa_id:empresaId});
      _mToken=r.token; _mUser=r.user; localStorage.setItem('wms_token',_mToken); localStorage.setItem('wms_user',JSON.stringify(_mUser)); this.showApp();
    } catch(e) {
        document.getElementById('m-login-err').textContent=e.message;
        document.getElementById('m-login-err').style.display='block';
        this._pin='';
        this.updPin();
    } finally {
        this.loading(false);
    }
  },
  logout() { localStorage.clear(); location.reload(); },

  showHome() {
    document.getElementById('m-title').textContent='Menú'; document.getElementById('nav-home').classList.add('active'); document.getElementById('nav-notif').classList.remove('active');
    const mods = [
      { id:'ro', l:'Rec. ODC',   i:'fa-file-invoice',        c:'indigo',  a:'viewRecO' },
      { id:'rs', l:'Rec. Sin ODC', i:'fa-box-open',          c:'emerald', a:'viewRecSinOdc' },
      { id:'ub', l:'Ubicar',     i:'fa-warehouse',            c:'teal',    a:'viewUbicar' },
      { id:'tr', l:'Traslado',   i:'fa-right-left',           c:'orange',  a:'viewTrans' },
      { id:'pk', l:'Picking',    i:'fa-boxes-stacked',        c:'purple',  a:'viewPicking' },
      { id:'pa', l:'Packing',    i:'fa-boxes-packing',       c:'fuchsia', a:'viewPacking' },
      { id:'ce', l:'Certificar', i:'fa-clipboard-check',      c:'rose',    a:'viewCert' },
      { id:'iv', l:'Inventario', i:'fa-rotate',               c:'indigo',  a:'viewInventario' },
      { id:'ci', l:'Consultar',  i:'fa-magnifying-glass-location', c:'cyan', a:'viewConsultaInteligente' },
    ];
    document.getElementById('m-content').innerHTML = `
      <div class="op-view">
        <div style="margin-bottom:15px;"><h2 style="font-size:1.1rem;font-weight:800;">Hola, ${this.esc(_mUser.nombre.split(' ')[0])}!</h2><p style="font-size:.75rem;color:#64748b;">Seleccione una operación:</p></div>
        <div class="module-grid-mobile">
          ${mods.map(m=>`<button class="module-btn-mobile" onclick="MWMS.${m.a}${m.a.includes('(')?'':'()'}" id="mod-btn-${m.id}"><div class="module-icon-circle ${m.c}"><i class="fa-solid ${m.i}"></i></div><span class="module-label">${m.l}</span></button>`).join('')}
        </div>
      </div>`;
  },

  viewDespachoMenu() {
    document.getElementById('m-title').textContent='Despachos & TMS';
    document.getElementById('nav-home').classList.remove('active');
    document.getElementById('nav-notif').classList.remove('active');
    document.getElementById('m-content').innerHTML = `
      <div class="op-view">
        <div style="margin-bottom:15px; display:flex; justify-content:space-between; align-items:center;">
          <div>
            <h2 style="font-size:1.1rem;font-weight:800; margin:0;">Despachos & TMS</h2>
            <p style="font-size:.75rem;color:#64748b; margin:4px 0 0;">Seleccione la operación de despacho.</p>
          </div>
          <button class="m-btn secondary sm" style="height:38px;" onclick="MWMS.showHome();">Volver</button>
        </div>
        <div class="module-grid-mobile">
          <button class="module-btn-mobile" onclick="MWMS.viewCert()" id="mod-btn-dt-cert">

  _actualizarPreviewRs() {
    const cajas   = parseInt(document.getElementById('rs-cant')?.value || '0') || 0;
    const upc     = parseInt(document.getElementById('rs-upc')?.value  || '1') || 1;
    const preview = document.getElementById('rs-conv-preview');
    const span    = document.getElementById('rs-conv-text');
    const label   = document.getElementById('rs-cant-label');
    if (label)   label.textContent = upc > 1 ? 'Cajas a recibir *' : 'Cantidad (unidades) *';
    if (preview) preview.style.display = upc > 1 ? 'block' : 'none';
    if (span && upc > 1) {
      const plural = cajas === 1 ? 'caja' : 'cajas';
      span.textContent = `${cajas} ${plural} × ${upc} = ${cajas * upc} unidades`;
    }
  },

  async _doSinOdcQr() {
    const input = document.getElementById('rs-qr-input');
    const qr = (input?.value || '').trim();
    if (!qr) return;
    this.loading(true);
    try {
      const r = await mApi('GET', '/recepciones/buscar-qr?q=' + encodeURIComponent(qr));
      const p = r.data.producto;
      this._sinOdc.prodSel      = p;
      this._sinOdc.fechaAuto    = r.data.fecha_vencimiento || '';
      this._sinOdc.fechaAutoRaw = r.data.fecha_raw || '';
      input.value = '';
      this.toast('Producto: ' + p.nombre, 'success');
      this._renderRecSinOdc();
    } catch (e) {
      this.toast(e.message || 'Producto no encontrado', 'error');
    } finally {
      this.loading(false);
    }
  },

  _buscarProdSinOdc() {
    this.openSearch(p => {
      this._sinOdc.prodSel = p;
      this._sinOdc.fechaAuto    = '';
      this._sinOdc.fechaAutoRaw = '';
      this._renderRecSinOdc();
    }, 'Buscar Producto', 'prod');
  },

  async _guardarSinOdc() {
    const s       = this._sinOdc;
    const prodId  = document.getElementById('rs-prod-id')?.value;
    const cantCajas = parseInt(document.getElementById('rs-cant')?.value || '0');
    const upc     = parseInt(document.getElementById('rs-upc')?.value   || '1') || 1;
    const lote    = document.getElementById('rs-lote')?.value || '';
    const fv      = document.getElementById('rs-fecha-venc')?.value || '';
    const estado  = document.getElementById('rs-estado')?.value || 'BuenEstado';
    const palletNum = s.palletNum || null;

    if (!prodId) return this.toast('Seleccione un producto', 'error');
    if (cantCajas <= 0) return this.toast('Cantidad debe ser mayor a cero', 'error');

    const totalUnidades = cantCajas * upc;
    this.loading(true);
    try {
      const r = await mApi('POST', '/recepciones/sin-odc', {
        producto_id:      prodId,
        cantidad_cajas:   cantCajas,
        cantidad:         totalUnidades,
        lote:             lote || undefined,
        fecha_vencimiento:fv   || undefined,
        estado_mercancia: estado,
        numero_pallet:    palletNum || undefined,
      });

      s.recepcionId = r.data?.recepcion?.id || s.recepcionId;
      s.lineas.push({
        detalleId:    r.data?.detalle?.id || null,
        nombre:       s.prodSel?.nombre || 'Producto',
        cant:         totalUnidades,
        cajas:        cantCajas,
        upc,
        lote,
        fv:           fv ? fv.split('-').reverse().join('/') : '',
        numero_pallet: palletNum,
      });

      // Reset para siguiente captura (mantener producto y pallet)
      s.fechaAuto    = '';
      s.fechaAutoRaw = '';
      this.toast('Captura registrada ✓', 'success');
      this._renderRecSinOdc();
    } catch (e) {
      this.toast(e.message, 'error');
    } finally {
      this.loading(false);
    }
  },
  async _cerrarRecepcionSinOdc() {
    const id = this._sinOdc?.recepcionId;
    if (!id) return this.toast('No hay recepción activa', 'error');
    if (!confirm('¿Cerrar recepción? No podrá agregar más líneas.')) return;
    this.loading(true);
    try {
      const r = await mApi('POST', '/recepciones/' + id + '/cerrar', {});
      if (r.error) throw new Error(r.message);
      this.toast('Recepción cerrada ✓', 'success');
      this._sinOdc.recepcionId = null;
      this._sinOdc.lineas = [];
      this._sinOdc.prodSel = null;
      if (confirm('¿Desea ir ahora a dar ubicación a los productos en el almacén?')) {
        this.viewUbicar();
      } else {
        this._renderRecSinOdc();
      }
    } catch (e) {
      this.toast(e.message || 'Error al cerrar', 'error');
    } finally {
      this.loading(false);
    }
  },

  async _editarLineaSinOdc(lineaIndex) {
    const s = this._sinOdc;
    const linea = s.lineas[lineaIndex];
    if (!linea || !linea.detalleId) return this.toast('Línea no editable', 'error');

    const upc = linea.upc || 1;
    const labelQty = upc > 1
      ? `Cajas a recibir (UxC: ${upc}, actual: ${linea.cajas || Math.round(linea.cant / upc)} cajas)`
      : `Cantidad en unidades (actual: ${linea.cant})`;
    const currentVal = upc > 1 ? (linea.cajas || Math.round(linea.cant / upc)) : linea.cant;

    const newVal = prompt(`${linea.nombre}\n${labelQty}:`, currentVal);
    if (newVal === null) return;
    const parsed = parseInt(newVal);
    if (isNaN(parsed) || parsed <= 0) return this.toast('Cantidad inválida', 'error');

    const cantidad = parsed * upc;
    this.loading(true);
    try {
      const r = await mApi('PATCH', `/recepciones/${s.recepcionId}/detalle/${linea.detalleId}`, { cantidad });
      if (r.error) throw new Error(r.message);
      s.lineas[lineaIndex].cant  = cantidad;
      s.lineas[lineaIndex].cajas = parsed;
      this.toast('Cantidad actualizada ✓', 'success');
      this._renderRecSinOdc();
    } catch (e) {
      this.toast(e.message || 'Error al actualizar', 'error');
    } finally {
      this.loading(false);
    }
  },

  async _eliminarLineaSinOdc(lineaIndex) {
    const s = this._sinOdc;
    const linea = s.lineas[lineaIndex];
    if (!linea || !linea.detalleId) return this.toast('Línea no eliminable', 'error');
    if (!confirm(`¿Eliminar "${linea.nombre}"? El inventario será revertido.`)) return;

    this.loading(true);
    try {
      const r = await mApi('DELETE', `/recepciones/${s.recepcionId}/detalle/${linea.detalleId}`);
      if (r.error) throw new Error(r.message);
      s.lineas.splice(lineaIndex, 1);
      this.toast('Línea eliminada ✓', 'success');
      if (r.data?.recepcion_eliminada) {
        s.recepcionId = null;
        s.lineas = [];
        s.prodSel = null;
      }
      this._renderRecSinOdc();
    } catch (e) {
      this.toast(e.message || 'Error al eliminar', 'error');
    } finally {
      this.loading(false);
    }
  },

  selP(p){ this.closeSearch(); this._sCb(p); },
  closeSearch(){ document.getElementById('m-modal-search').style.display='none'; },

  openCapture(p, cb, pending = null) {
    this._cCB = cb;
    this._currentCapProd = p;
    this._currentCapPending = pending;
    document.getElementById('m-capture-prod-name').textContent = p.nombre || p.descripcion;
    
    const factor = parseInt(p.unidades_caja || 0);
    document.getElementById('m-cap-factor').value = factor > 0 ? factor : "N/D";
    document.getElementById('m-cap-uxc-alert').style.display = (factor > 0 ? 'none' : 'block');
    
    // Mostrar badge de pendiente si aplica
    const pBadge = document.getElementById('m-cap-pending-badge');
    if (pending !== null) {
        pBadge.textContent = "PTE: " + pending + " UND";
        pBadge.style.display = 'block';
    } else {
        pBadge.style.display = 'none';
    }

    // Default mode: box if factor exists, else unit
    document.getElementById('m-cap-mode').value = (factor > 0 ? 'box' : 'unit');
    
    document.getElementById('m-cap-qty').value = "1";
    document.getElementById('m-cap-lote').value = "";
    document.getElementById('m-cap-fv').value = "";
    document.getElementById('m-cap-fv2').value = "";
    document.getElementById('m-cap-fv-group').style.display = (p.controla_vencimiento ? 'block' : 'none');
    document.getElementById('m-modal-capture').style.display = 'flex';
    
    this.updCapTotal();
    setTimeout(() => document.getElementById('m-cap-qty').focus(), 300);
  },
  updCapTotal() {
    const p = this._currentCapProd;
    const mode = document.getElementById('m-cap-mode').value;
    const qty = parseInt(document.getElementById('m-cap-qty').value || 0);
    const factor = parseInt(p.unidades_caja || 1);
    const total = (mode === 'box') ? (qty * factor) : qty;
    
    document.getElementById('m-cap-total').value = total;
    document.getElementById('m-cap-qty-label').textContent = (mode === 'box' ? 'Cant. Cajas' : 'Cant. Unidades');
    
    // Si esta en modo caja pero no hay factor, forzar modo unidades o advertir
    if (mode === 'box' && parseInt(p.unidades_caja || 0) <= 0) {
        document.getElementById('m-cap-total').value = "Factor Req.";
    }

    // Validación visual de excedente
    if (this._currentCapPending !== null && total > this._currentCapPending) {
        document.getElementById('m-cap-total').style.background = '#fee2e2';
        document.getElementById('m-cap-total').style.color = '#991b1b';
    } else {
        document.getElementById('m-cap-total').style.background = '#e0f2fe';
        document.getElementById('m-cap-total').style.color = '#0369a1';
    }
  },
  confirmCapture() {
    const p = this._currentCapProd;
    const mode = document.getElementById('m-cap-mode').value;
    const q = parseInt(document.getElementById('m-cap-qty').value);
    const l = document.getElementById('m-cap-lote').value.trim() || 'N/A';
    const fv = document.getElementById('m-cap-fv').value;
    const fv2 = document.getElementById('m-cap-fv2').value;
    const fvGroup = document.getElementById('m-cap-fv-group').style.display;
    const factor = parseInt(p.unidades_caja || 0);

    if (isNaN(q) || q <= 0) return this.toast("Cantidad inválida", "error");
    
    if (mode === 'box' && factor <= 0) {
        return this.toast("No puede recibir por cajas si no configuró Unidades x Caja", "error");
    }

    const totalUnits = (mode === 'box') ? (q * factor) : q;

    if (this._currentCapPending !== null && totalUnits > this._currentCapPending) {
        this.pA();
        return this.toast(`EXCEDIDO: Máximo permitido ${this._currentCapPending} unidades.`, "error");
    }

    if (fvGroup === 'block') {
      if (!fv) return this.toast("Fecha de vencimiento requerida", "error");
      if (fv !== fv2) return this.toast("LAS FECHAS NO COINCIDEN", "error");
    }

    const qtyCajas = (mode === 'box') ? q : Math.ceil(q / (factor || 1));

    this.closeCapture();
    if (this._cCB) this._cCB({ q: totalUnits, l, fv, cantidad_cajas: qtyCajas });
  },

  async validateLocationCode(codigo) {
    if (!codigo || codigo.trim().length === 0) {
      document.getElementById('m-loc-validation').style.display = 'none';
      document.getElementById('m-loc-suggestions').style.display = 'none';
      return;
    }
    const codNorm = (codigo || '').replace(/[^A-Za-z0-9]/g, '');
    try {
      const r = await mApi('GET', '/param/ubicaciones?codigo=' + encodeURIComponent(codNorm));
      const locations = Array.isArray(r.data) ? r.data : [];
      const exactMatch = locations.find(x => (x.codigo || '').replace(/[^A-Za-z0-9]/g, '') === codNorm);
      const val = document.getElementById('m-loc-validation');
      if (exactMatch) {
        val.style.background = '#dcfce7';
        val.style.color = '#166534';
        val.innerHTML = `<i class="fa-solid fa-check-circle"></i> Ubicación encontrada: <b>${exactMatch.codigo}</b>`;
        val.style.display = 'block';
        this._selectedLocation = exactMatch;
        document.getElementById('m-loc-confirm-btn').disabled = false;
        document.getElementById('m-loc-confirm-btn').style.opacity = '1';
        document.getElementById('m-loc-suggestions').style.display = 'none';
      } else if (locations.length > 0) {
        val.style.background = '#fef3c7';
        val.style.color = '#92400e';
        val.innerHTML = `<i class="fa-solid fa-exclamation-triangle"></i> Ubicación no encontrada. Seleccione una de las sugerencias:`;
        val.style.display = 'block';
        const sugList = document.getElementById('m-loc-suggestions-list');
        sugList.innerHTML = locations.map(loc => `<div style="padding:8px;border-bottom:1px solid #e2e8f0;cursor:pointer;" onclick="MWMS.selectLocationFromList(${JSON.stringify(loc).replace(/"/g,'&quot;')})">${this.esc(loc.codigo)} (${loc.tipo_ubicacion})</div>`).join('');
        document.getElementById('m-loc-suggestions').style.display = 'block';
        this._selectedLocation = null;
        document.getElementById('m-loc-confirm-btn').disabled = true;
        document.getElementById('m-loc-confirm-btn').style.opacity = '0.5';
      } else {
        val.style.background = '#fee2e2';
        val.style.color = '#991b1b';
        val.innerHTML = `<i class="fa-solid fa-times-circle"></i> Ubicación "${codigo}" no existe`;
        val.style.display = 'block';
        document.getElementById('m-loc-suggestions').style.display = 'none';
        this._selectedLocation = null;
        document.getElementById('m-loc-confirm-btn').disabled = true;
        document.getElementById('m-loc-confirm-btn').style.opacity = '0.5';
      }
    } catch (e) {
      const val = document.getElementById('m-loc-validation');
      val.style.background = '#fee2e2';
      val.style.color = '#991b1b';
      val.innerHTML = `<i class="fa-solid fa-exclamation-circle"></i> Error: ${e.message}`;
      val.style.display = 'block';
    }
  },

  selectLocationFromList(location) {
    this._selectedLocation = location;

    document.getElementById('m-loc-validation').style.background = '#dcfce7';
    document.getElementById('m-loc-validation').style.color = '#166534';

    document.getElementById('m-loc-suggestions').style.display = 'none';
    document.getElementById('m-loc-confirm-btn').disabled = false;

  },

  async confirmLocationSelection() {
    if (!this._selectedLocation || !this._locationData) {
      this.toast('Seleccione una ubicación válida', 'error');
      return;
    }
    this.loading(true);
    try {
      if (this._palletMove) {
        // Mover todos los items del pallet
        for (const i of this._palletMove) {
           await mApi('POST', '/inventario/traslado', {
              producto_id: i.producto_id,
              ubicacion_origen_id: i.ubicacion_id,
              ubicacion_destino_id: this._selectedLocation.id,
              cantidad: i.cantidad,
              lote: i.lote,
              fecha_vencimiento: i.fecha_vencimiento,
              numero_pallet: i.numero_pallet
           });
        }
        const movedLabel = (this._palletMove[0].numero_pallet != null && this._palletMove[0].numero_pallet !== '')
          ? `Pallet #${this._palletMove[0].numero_pallet}` : 'Artículos sin pallet';
        this.toast(`${movedLabel} ubicado completo.`, "success");
        this._palletMove = null;
      } else {
        // Mover item individual/parcial
        await mApi('POST', '/inventario/traslado', {
          producto_id: this._locationData.item.producto_id,
          ubicacion_origen_id: this._locationData.item.ubicacion_id,
          ubicacion_destino_id: this._selectedLocation.id,
          cantidad: this._locationData.cantidad,
          lote: this._locationData.item.lote,
          fecha_vencimiento: this._locationData.item.fecha_vencimiento,
          numero_pallet: this._locationData.item.numero_pallet
        });
        const pendiente = parseFloat(this._locationData.item.cantidad) - parseFloat(this._locationData.cantidad);
        if (pendiente > 0) {
          this.toast(`Ubicado OK (${this._locationData.cantidad}). Quedan ${pendiente} por ubicar en este pallet.`, "success");
        } else {
          this.toast(`Ubicado OK (${this._locationData.cantidad})`, "success");
        }
      }
      this.closeLocationModal();
      this.viewUbicar();
    } catch(e) {
      this.toast(e.message, "error");
    }
    this.loading(false);
  },

  loading(s){ let l=document.getElementById('m-loading'); if(s&&!l)document.body.insertAdjacentHTML('beforeend','<div id="m-loading" style="position:fixed;inset:0;background:rgba(255,255,255,.7);z-index:90000;display:flex;align-items:center;justify-content:center;font-size:2rem;color:#0F4C81;"><i class="fa-solid fa-spinner fa-spin"></i></div>'); else if(!s&&l)l.remove(); },
  toast(m,t='info'){ const c=document.getElementById('m-toast'), e=document.createElement('div'); e.className='m-toast-item '+t; e.innerHTML=m; c.appendChild(e); setTimeout(()=>{e.style.opacity='0';setTimeout(()=>e.remove(),500);},3000); },
  esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); },
  formatDate(d){ if(!d)return'-'; const date=new Date(d); return isNaN(date.getTime()) ? d : date.toISOString().split('T')[0]; },
  formatDateShort(d){ if(!d)return'N/A'; const date=new Date(d); if(isNaN(date.getTime()))return d; const day=String(date.getDate()).padStart(2,'0'); const month=String(date.getMonth()+1).padStart(2,'0'); const year=date.getFullYear(); return `${day}/${month}/${year}`; },
  getDaysToExpiry(fechaVenc){ if(!fechaVenc)return null; const hoy=new Date(); hoy.setHours(0,0,0,0); const fv=new Date(fechaVenc); fv.setHours(0,0,0,0); const diff=fv-hoy; const dias=Math.ceil(diff/(1000*60*60*24)); return dias; },

  async viewUbicar() {
    document.getElementById('m-title').textContent = 'Ubicar (Yard)';

          groups[pKey].items.push(i);

      const pallets = Object.values(groups);

      document.getElementById('m-content').innerHTML = `

  togglePallet(id) {
    const card = document.getElementById(`pallet-${id}`);
    const details = card.querySelector('.pallet-details');
    const icon = card.querySelector('.toggle-icon');
    if (details.style.display === 'none') {
      details.style.display = 'block';
      icon.style.transform = 'rotate(180deg)';
    } else {
      details.style.display = 'none';
      icon.style.transform = 'rotate(0deg)';
    }

  async ubicarPalletTodo(palletId) {
    const label = palletId === '__sin_pallet__' ? 'artículos sin pallet' : `pallet #${palletId}`;
    this.toast(`Seleccione una ubicación para todos los ${label}`, "info");
    const src = this._ubicarItems || [];
    const pItems = src.filter(x => {
      if (palletId === '__sin_pallet__') return x.numero_pallet == null || x.numero_pallet === '';
      return String(x.numero_pallet) === String(palletId);
    });
    if (!pItems.length) return this.toast("Artículos no encontrados", "error");
    this._palletMove = pItems;
    this.openLocationModal(pItems[0], pItems[0].cantidad, true);
  },

  stUb(idx) {
    const i = (this._ubicarItems || [])[idx];
    if (!i) return this.toast("Artículo no encontrado", "error");
    const palletLabel = (i.numero_pallet != null && i.numero_pallet !== '')
      ? `Pallet #${i.numero_pallet}` : 'artículo sin pallet';
    Swal.fire({
      title: 'Ubicar Parcial',
      text: `¿Cuántas unidades del ${palletLabel} desea mover?`,
      input: 'number',
      inputValue: i.cantidad,
      showCancelButton: true,
      confirmButtonText: 'Seleccionar Destino'
    }).then((res) => {
      if (res.isConfirmed) {
        const q = parseFloat(res.value);
        if (q > 0 && q <= parseFloat(i.cantidad)) this.openLocationModal(i, q);
        else this.toast("Cantidad inválida", "error");
      }
    });
  },

  _previewDevFotos(input) {
    const preview = document.getElementById('dev-fotos-preview');
    if (!preview) return;
    preview.innerHTML = '';
    const files = Array.from(input.files).slice(0, 5);
    files.forEach((f, i) => {

      preview.innerHTML += `<div style="position:relative;"><img src="${url}" style="width:70px;height:70px;object-fit:cover;border-radius:6px;border:2px solid #e2e8f0;"><span style="position:absolute;top:-4px;right:-4px;background:#dc2626;color:#fff;border-radius:50%;width:18px;height:18px;font-size:.6rem;display:flex;align-items:center;justify-content:center;">${i+1}</span></div>`;

  async guardarDevolucionODC() {
    const odc = this._op?.odc;
    if (!odc) return;
    const motivoGeneral = document.getElementById('dev-motivo-general')?.value?.trim() || 'Novedad en recepción';
    
    // Recopilar líneas con cantidad > 0
    const detalles = [];
    document.querySelectorAll('.dev-qty-odc').forEach((inp, i) => {
      const qty = parseFloat(inp.value || 0);
      if (qty <= 0) return;
      const row = inp.closest('[data-pid]');
      const pid = row?.dataset?.pid;
      if (!pid) return;
      const motivo = document.querySelectorAll('.dev-motivo-odc')[i]?.value || 'Averia';
      const obs    = document.querySelectorAll('.dev-obs-odc')[i]?.value || '';
      detalles.push({ producto_id: parseInt(pid), cantidad: qty, motivo, observacion: obs });
    });

    if (!detalles.length) return this.toast('Ingrese al menos un producto con cantidad > 0', 'error');

    this.loading(true);
    try {
      const formData = new FormData();
      formData.append('odc_id', odc.id);
      formData.append('proveedor', odc.proveedor?.razon_social || '');
      formData.append('motivo_general', motivoGeneral);
      formData.append('detalles', JSON.stringify(detalles));

      const fotosInput = document.getElementById('dev-fotos-input');
      if (fotosInput?.files?.length) {
        Array.from(fotosInput.files).slice(0,5).forEach((f, i) => formData.append(`foto_${i}`, f));
      }

      const res = await fetch(M_API + '/devoluciones/desde-odc', {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + _mToken },
        body: formData
      });
      const json = await res.json();
      if (json.error) throw new Error(json.message);

      document.getElementById('m-modal-devolucion')?.remove();
      this.toast(`✓ Devolución ${json.data?.numero_devolucion} registrada`, 'success');
    } catch(e) { this.toast(e.message, 'error'); }
    this.loading(false);
  },

  async runConsultaInteligente() {
    const q = document.getElementById('ci-query')?.value?.trim();
    if (!q || q.length < 2) return this.toast('Escriba al menos 2 caracteres', 'warning');
    clearTimeout(this._ciTimer);
    const sugg = document.getElementById('ci-suggestions');
    if (sugg) sugg.innerHTML = '';
    this._ciSuggs = [];
    const results = document.getElementById('ci-results');
    results.innerHTML = '<div style="text-align:center;padding:20px;"><i class="fa-solid fa-spinner fa-spin" style="color:#0ea5e9;font-size:1.5rem;"></i></div>';
    this.loading(true);
    try {
      if (this._ciMode === 'producto') {
        const rP = await mApi('GET', '/odc/buscar-producto?q=' + encodeURIComponent(q));
        const prods = rP.data || [];
        if (!prods.length) { 
          results.innerHTML = '<div class="m-empty"><i class="fa-solid fa-box-open"></i><p>Sin productos encontrados</p></div>'; 
          return; 
        }
        
        if (prods.length > 1) {
          results.innerHTML = `
            <div style="font-size:.7rem;font-weight:700;color:#64748b;margin-bottom:8px;">SELECCIONE UN PRODUCTO:</div>
            ${prods.slice(0,10).map(p => `
              <div class="op-card" onclick="MWMS._loadStockProducto(${p.id},'${this.esc(p.nombre)}')"
                style="padding:10px;display:flex;justify-content:space-between;align-items:center;">
                <div><div style="font-weight:700;font-size:.82rem;">${this.esc(p.nombre)}</div><small style="color:#64748b;">SKU: ${this.esc(p.codigo_interno||'-')}</small></div>
                <i class="fa-solid fa-chevron-right" style="color:#94a3b8;"></i>
              </div>`).join('')}`;
        } else {
          await this._loadStockProducto(prods[0].id, prods[0].nombre);
        }
      } else {
        const rU = await mApi('GET', '/param/ubicaciones?codigo=' + encodeURIComponent(q));
        const ubics = Array.isArray(rU.data) ? rU.data : [];
        const exact = ubics.find(u => (u.codigo||'').toUpperCase() === q.toUpperCase()) || ubics[0];
        if (!exact) { 
          results.innerHTML = '<div class="m-empty"><i class="fa-solid fa-location-dot"></i><p>Ubicación no encontrada</p></div>'; 
          return; 
        }
        await this._loadStockUbicacion(exact);
      }
    } catch(e) { 
        results.innerHTML = `<div style="padding:16px;color:#dc2626;font-size:.8rem;"><i class="fa-solid fa-exclamation-circle"></i> ${this.esc(e.message)}</div>`; 
    } finally {
        this.loading(false);
    }
  },

  async doRecOScan() {
    const input = document.getElementById('m-odc-scan');
    const ean = input.value.trim();
    if (!ean) return;
    input.value = '';
    this.loading(true);
    try {
      const r = await mApi('GET', `/odc/${this._op.odc.id}/verificar-ean?q=${encodeURIComponent(ean)}`);
      const p = r.data.producto;
      const det = r.data.detalle;
      
      this.openCapture(p, async res => {
          this.loading(true);
          try {
              await mApi('POST', '/recepciones/detalles-operativa', {
                  odc_id: this._op.odc.id,
                  producto_id: p.id,
                  cantidad: res.q,
                  cantidad_cajas: res.cantidad_cajas,
                  lote: res.l,
                  fecha_vencimiento: res.fv,
                  numero_pallet: this._op.currentPallet
              });
              
              this.loading(false);
              const result = await Swal.fire({
                title: 'Item Guardado',
                text: `¿Desea añadir más productos al PALLET #${this._op.currentPallet} o crear uno nuevo?`,
                icon: 'question',
                showCancelButton: true,
                confirmButtonText: 'Añadir a este Pallet',
                cancelButtonText: 'Nuevo Pallet',
                confirmButtonColor: '#3b82f6',
                cancelButtonColor: '#10b981'
              });

              if (!result.isConfirmed) {
                this.loading(true);
                try {
                    const next = await mApi('GET', '/recepciones/proximo-pallet');
                    this._op.currentPallet = next.proximo;
                    this.renderRecO();
                } finally {
                    this.loading(false);
                }
              }

              this.toast("Producto capturado", "success");
              await this.refreshRecOLines();
              await this.checkODCCompletion();
          } catch(e) { 
              this.toast(e.message, "error"); 
          } finally {
              this.loading(false);
          }
      });
    } catch(e) { 
        this.toast(e.message, "error"); 
        this.pA(); 
    } finally {
        this.loading(false);
    }
  },

  async checkODCCompletion() {
      try {
          const r = await mApi('GET', `/odc/${this._op.odc.id}`);
          const odc = r.data || r;
          const totalSolicitado = odc.detalles.reduce((acc, d) => acc + parseFloat(d.cantidad_solicitada), 0);
          const totalRecibido = odc.detalles.reduce((acc, d) => acc + parseFloat(d.cantidad_recibida), 0);
          
          if (totalRecibido >= totalSolicitado && totalSolicitado > 0) {
              // Notificar al backend para cerrar/completar si no lo hace ya
              await mApi('POST', `/odc/${odc.id}/cerrar`);
              
              // Alerta visual pro
              this.loading(false);
              alert(`¡ORDEN #${odc.numero_odc} COMPLETADA!\n\nSe han recibido todos los productos solicitados.`);
              this.viewRecO();
              return true;
          }
      } catch(e) { console.error("Error checkODC:", e); }
      return false;
  },

      const container = document.getElementById('m-lines-odc');

          // Obtener las líneas de la recepción actual para esta ODC

          if (items.length === 0) {
              container.innerHTML = '<div style="text-align:center;padding:20px;color:#94a3b8;font-size:.8rem;">No hay productos registrados aún</div>';

            ${items.map(i => `
              <div class="op-card" style="padding:8px; margin-bottom:6px; border-left:4px solid #10b981;">
                <div style="display:flex; justify-content:space-between; align-items:center;">

                    <div style="font-weight:700; font-size:.8rem;">${this.esc(i.producto?.nombre)}</div>

  async lTS(preSelected = false) {
    let locs = [];
    if (preSelected && this._tmpLoc) {
        locs = [this._tmpLoc];
        this._tmpLoc = null;
    } else {
        const q=document.getElementById('m-t-o').value.trim(); if(!q) return;
        this.loading(true);
        try {
            const rl = await mApi('GET','/param/ubicaciones?codigo='+encodeURIComponent(q));
            locs = Array.isArray(rl.data) ? rl.data : [];
        } catch(e) { this.toast(e.message, "error"); this.loading(false); return; }
    }

    try {
      if(locs.length === 0) throw new Error("Ubicación no encontrada");
      
      const selectUbic = async (loc) => {
        this.loading(true);
        try {
            const rs=await mApi('GET','/inventario/stock?ubicacion_id='+loc.id);
            const stock = (rs.data||[]).filter(x => parseFloat(x.cantidad) > 0);
            
            if(stock.length === 0) {
                this.toast("Sin stock disponible en esa ubicación", "warning");
                document.getElementById('m-t-s').innerHTML = '';
                return;
            }
            
            if(stock.length === 1) {
              this.selT(loc, stock[0]);
            } else {
              document.getElementById('m-t-s').innerHTML = `
                <div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:10px;margin-top:10px;">
                  <p style="font-size:.7rem;font-weight:700;margin-bottom:8px;color:#64748b;">MÚLTIPLES LOTES ENCONTRADOS:</p>
                  ${stock.map(s => `
                    <div onclick="MWMS.selT(${JSON.stringify(loc).replace(/"/g,'&quot;')}, ${JSON.stringify(s).replace(/"/g,'&quot;')})" 
                         style="padding:10px;background:#fff;border:1px solid #cbd5e1;border-radius:8px;margin-bottom:6px;cursor:pointer;">
                      <div style="font-size:.8rem;font-weight:700;">${this.esc(s.producto_nombre)}</div>
                      <div style="font-size:.65rem;color:#64748b;">Cant: ${s.cantidad} | Lote: ${s.lote||'N/A'}</div>
                    </div>
                  `).join('')}
                </div>`;
                document.getElementById('m-t-a').style.display='none';
            }
        } finally { this.loading(false); }
      };

      if (locs.length === 1) {
          await selectUbic(locs[0]);
      } else {
          // Mostrar lista de ubicaciones para seleccionar
          document.getElementById('m-t-s').innerHTML = `
            <div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:10px;margin-top:10px;">
              <p style="font-size:.7rem;font-weight:700;margin-bottom:8px;color:#64748b;">SELECCIONE LA UBICACIÓN:</p>
              ${locs.map(l => `
                <div onclick='MWMS._tmpLoc=${JSON.stringify(l).replace(/"/g,'&quot;')}; MWMS.lTS(true)' 
                     style="padding:10px;background:#fff;border:1px solid #cbd5e1;border-radius:8px;margin-bottom:6px;cursor:pointer;">
                  <div style="font-size:.8rem;font-weight:700;">${this.esc(l.codigo)}</div>
                  <div style="font-size:.65rem;color:#64748b;">${this.esc(l.descripcion || 'Sin descripción')}</div>
                </div>
              `).join('')}
            </div>`;
            document.getElementById('m-t-a').style.display='none';
      }
    } catch(e) { 
        this.toast(e.message,"error"); 
        document.getElementById('m-t-s').innerHTML=''; 
    } finally {
        this.loading(false);
    }
  },
  selT(loc, item) {
    this._td={o:loc, i:item, d:null};
    document.getElementById('m-t-prod-info').innerHTML='<div style="background:#f1f5f9;padding:12px;border-radius:8px;font-size:.8rem;border-left:4px solid #3b82f6;"><b>'+this.esc(item.producto_nombre)+'</b><br><small>Disp: '+item.cantidad+' | Lote: '+(item.lote||'N/A')+'</small></div>';

  _clearTDest() {
    this._td.d = null;
    document.getElementById('m-t-d-locked').style.display = 'none';
    const wrap = document.getElementById('m-t-d-input-wrap');
    wrap.style.display = 'block';
    const i = document.getElementById('m-t-d');
    i.value = "";
    i.focus();
  },
  async doT() {
    const q=document.getElementById('m-t-q').value;
    const dest = this._td.d;
    if(!dest) {
       // Si no seleccionó de la lista, intentar validar lo que hay en el input
       const dVal = document.getElementById('m-t-d').value.trim();
       if(!dVal) return this.toast("Seleccione un destino", "warning");
       this.loading(true);
       try {
         const rl=await mApi('GET','/param/ubicaciones?codigo='+encodeURIComponent(dVal));
         const locs = Array.isArray(rl.data) ? rl.data : [];
         if(locs.length === 0) throw new Error("Ubicación destino no encontrada");
         this._td.d = locs[0];
       } catch(e) { this.toast(e.message, "error"); this.loading(false); return; }
    }
    
    this.loading(true);
    try {
      const s = this._td.i;
      const loc = this._td.d;
      await mApi('POST','/inventario/traslado',{
        producto_id: s.producto_id, 
        ubicacion_origen_id: this._td.o.id, 
        ubicacion_destino_id: loc.id, 
        cantidad: q, 
        lote: s.lote, 
        fecha_vencimiento: s.fecha_vencimiento
      });
      this.toast("Traslado registrado correctamente","success"); 
      this.showHome();
    } catch(e) { 
        this.toast(e.message,"error"); 
    } finally {
        this.loading(false);
    }
  },


  async viewInventario() {
    document.getElementById('m-title').textContent='Mis Tareas'; document.getElementById('m-content').innerHTML='Cargando asignaciones...';

      const r = await mApi('GET', '/v2/inventario/mis-asignaciones');
      const assignments = r.data || [];
      
      // Agrupar por sesión para no repetir si hay varios productos asignados en la misma sesión
      const sessionsMap = {};

          if(!a.sesion) return;
          if(!sessionsMap[a.sesion_id]) {
              sessionsMap[a.sesion_id] = {
                  id: a.sesion_id,
                  nombre: a.sesion.nombre,
                  tipo: a.sesion.tipo,
                  created_at: a.sesion.created_at || a.created_at,
                  ronda: a.sesion.ronda_actual || 1,
                  items: []
              };
          }
          sessionsMap[a.sesion_id].items.push(a);
      });
      
      const items = Object.values(sessionsMap);

      document.getElementById('m-content').innerHTML = `
        <div class="op-view">
          <div style="margin-bottom:12px;"><h3 style="font-size:.9rem;font-weight:700;">Inventarios En Curso (V2)</h3></div>
          ${items.map(s => `
            <div class="op-card" onclick="MWMS.startIv(${s.id})">
              <div style="display:flex;justify-content:space-between;align-items:center;">
                <b style="color:#1e293b;">${this.esc(s.nombre)}</b>
                <span class="badge ${s.ronda>1?'badge-warning':'badge-info'}">R${s.ronda}</span>
              </div>
              <div style="display:flex;justify-content:space-between;align-items:center;margin-top:4px;">
                <small style="color:#64748b;">ID: #${s.id} | ${this.esc(s.tipo)}</small>
                <small style="color:#94a3b8;font-size:.65rem;">${this.formatDate(s.created_at)}</small>
              </div>
              ${s.items.length > 0 ? `<div style="margin-top:6px;border-top:1px dashed #e2e8f0;padding-top:4px;">
                <small style="color:#0ea5e9;font-weight:700;"><i class="fa-solid fa-clipboard-list"></i> ${s.items.length} tareas asignadas</small>
              </div>` : ''}
            </div>
          `).join('') || '<div class="m-empty"><i class="fa-solid fa-check-circle"></i><p>No tiene inventarios asignados en V2</p></div>'}
        </div>`;
    } catch(e) { this.toast(e.message, "error"); }
  },

  async refreshIvLines() {
      // Opcional: mostrar las últimas líneas contadas por este auxiliar
  },

  async doIv() {
    const i = document.getElementById('m-iv-scan'); const q = i.value.trim(); if(!q) return;
    this.loading(true);
    try {
      if (!this._curLoc) {
          const rl = await mApi('GET', '/param/ubicaciones?codigo=' + encodeURIComponent(q));
          const locs = Array.isArray(rl.data) ? rl.data : [];
          
          if (locs.length === 1) {
              this.selectIvLocation(locs[0]);
          } else if (locs.length > 1) {
              // Mostrar lista de ubicaciones
              const container = document.getElementById('m-iv-suggestions-list');
              document.getElementById('m-iv-suggestions').style.display = 'block';
              container.innerHTML = locs.map(l => `
                <div class="list-item" onclick="MWMS.selectIvLocation(${JSON.stringify(l).replace(/"/g,'&quot;')}); document.getElementById('m-iv-suggestions').style.display='none';">
                   <b>${this.esc(l.codigo)}</b><br><small>${this.esc(l.descripcion || 'Sin descripción')}</small>
                </div>
              `).join('');
          } else {
              this.toast("Ubicación no válida o no encontrada", "error");
          }
      } else {
          const rp = await mApi('GET', '/odc/buscar-producto?q=' + encodeURIComponent(q));
          const prods = rp.data || [];

          const startCapture = (p) => {
              const u = this._curLoc;
              this.openCapture(p, async r => {
                  this.loading(true);
                  try {
                      await mApi('POST', `/v2/inventario/sesiones/${this._op.id}/conteo-manual`, {
                          producto_codigo: p.codigo_interno,
                          ubicacion_codigo: u.codigo,
                          cantidad: r.q,
                          lote: r.l,
                          fecha_vencimiento: r.fv,
                          ronda: this._op.ronda_actual || 1
                      });
                      this.toast("Contado OK (V2)", "success");
                      this._curLoc = null;
                      const scanner = document.getElementById('m-iv-scan');
                      if (scanner) {
                          scanner.placeholder = "Ubicación...";
                          scanner.value = "";
                      }
                      document.getElementById('m-iv-header').textContent = "DIGITE O ESCANEE LA UBICACIÓN";
                      this.renderIv();
                  } catch(e) { 
                      this.toast(e.message, "error"); 
                  } finally {
                      this.loading(false);
                  }
              });
          };

          if (prods.length === 1) {
              startCapture(prods[0]);
          } else if (prods.length > 1) {
              // Mostrar lista de productos encontrados
              const container = document.getElementById('m-iv-suggestions-list');
              document.getElementById('m-iv-suggestions').style.display = 'block';
              document.getElementById('m-iv-header').textContent = "SELECCIONE PRODUCTO:";
              container.innerHTML = prods.map(p => `
                <div class="list-item" onclick="document.getElementById('m-iv-suggestions').style.display='none'; MWMS._tmpP=${JSON.stringify(p).replace(/"/g,'&quot;')}; MWMS.startIvCaptureFromList();">
                   <b>${this.esc(p.nombre)}</b><br><small>Ref: ${p.codigo_interno} | EAN: ${p.codigo_ean || 'N/A'}</small>
                </div>
              `).join('');
          } else {
              this.toast("Producto no reconocido", "error");
              i.value = "";
              i.focus();
          }
      }
    } catch(e) { 
        this.toast(e.message, "error"); 
    } finally {
        this.loading(false);
    }
  },

  _tmpP: null,
  startIvCaptureFromList() {
      if(!this._tmpP) return;
      const p = this._tmpP;
      this._tmpP = null;
      const u = this._curLoc;
      this.openCapture(p, async r => {
          this.loading(true);
          try {
              await mApi('POST', `/v2/inventario/sesiones/${this._op.id}/conteo-manual`, {
                  producto_codigo: p.codigo_interno,
                  ubicacion_codigo: u.codigo,
                  cantidad: r.q,
                  lote: r.l,
                  fecha_vencimiento: r.fv,
                  ronda: this._op.ronda_actual || 1
              });
              this.toast("Contado OK (V2)", "success");
              this._curLoc = null;
              this.renderIv();
          } catch(e) { this.toast(e.message, "error"); }
          finally { this.loading(false); }
      });
  },

  _ivTimeout: null,
  async validateIvLocation(q) {
    if (this._curLoc) return; // Si ya hay ubicación, no sugerimos más
    clearTimeout(this._ivTimeout);
    if (!q || q.length < 3) {
      document.getElementById('m-iv-suggestions').style.display = 'none';

      try {
        const r = await mApi('GET', '/param/ubicaciones?codigo=' + encodeURIComponent(q));

          const list = document.getElementById('m-iv-suggestions-list');
          list.innerHTML = locs.slice(0, 8).map(loc => `
            <div style="padding:10px; border-bottom:1px solid #f1f5f9; display:flex; justify-content:space-between; align-items:center;" 
                 onclick="MWMS.selectIvLocation(${JSON.stringify(loc).replace(/"/g,'&quot;')})">
              <span style="font-weight:700; color:#1e293b;">${this.esc(loc.codigo)}</span>
              <small style="color:#64748b; font-size:.65rem;">${this.esc(loc.tipo_ubicacion)}</small>

          `).join('');

        } else {
          document.getElementById('m-iv-suggestions').style.display = 'none';

  },

  startNotif() { this.chkN(); if(this._timer) clearInterval(this._timer); this._timer=setInterval(()=>this.chkN(),15000); },
  async chkN() {
    if(!_mUser) return;
    try {
      const r=await mApi('GET','/notificaciones/badge'); 
      const c = parseInt(r.badge || 0);
      const b=document.getElementById('m-notif-badge'), b2=document.getElementById('nav-badge');
      if(c>0) { 
        b.textContent=c; b.classList.remove('hidden'); 
        b2.textContent=c; b2.classList.remove('hidden'); 
        if(c>this._lastCnt) { this.pA(); b2.classList.add('pulse'); setTimeout(()=>b2.classList.remove('pulse'),2000); }
      } else { b.classList.add('hidden'); b2.classList.add('hidden'); }
      this._lastCnt=c;
    } catch(e){}
  },
  pA() { if(navigator.vibrate)navigator.vibrate([200,100,200]); const s=document.getElementById('notif-sound'); if(s){s.currentTime=0;s.play().catch(()=>{});} },
  async viewNotifications() {
    document.getElementById('m-title').textContent='Tareas'; document.getElementById('nav-notif').classList.add('active'); document.getElementById('nav-home').classList.remove('active');
    const r=await mApi('GET','/notificaciones'); const items=r.data||[];
    document.getElementById('m-content').innerHTML = `<div class="op-view">${items.length===0?'<p>Sin tareas</p>':items.map(n=>`<div class="op-card ${n.leido?'':'unread'}" style="border-left:4px solid ${n.prioridad==='Alta'?'#ef4444':'#3b82f6'}" onclick="MWMS.opT(${n.id},'${n.modulo}')"><b>${this.esc(n.titulo)}</b><br><small>${this.esc(n.mensaje)}</small></div>`).join('')}</div>`;
  },
  async opT(id,mod) { 
    try {
      await mApi('PUT','/notificaciones/'+id+'/leer'); 
      this.chkN(); 
      // Si estamos viendo las notificaciones, refrescar la lista para que desaparezca la leída
      if (document.getElementById('nav-notif').classList.contains('active')) {

      else if(mod==='Picking') this.viewPicking(); 
      else this.showHome();

  async saveCita() {
    const proveedor = document.getElementById('m-cita-proveedor').value.trim();
    const fecha = document.getElementById('m-cita-fecha').value;
    const hora = document.getElementById('m-cita-hora').value;
    const cajas = document.getElementById('m-cita-cajas').value;
    const vehiculo = document.getElementById('m-cita-vehiculo').value.trim();
    const kilos = document.getElementById('m-cita-kilos').value;

    if (!proveedor || !fecha || !hora) {
      return this.toast('Proveedor, fecha y hora son requeridos', 'error');
    }

    this.loading(true);
    try {
      await mApi('POST', '/citas', {
        proveedor,
        fecha,
        hora_programada: hora,
        cantidad_cajas: parseInt(cajas) || 0,
        tipo_vehiculo: vehiculo || null,
        kilos: parseFloat(kilos) || 0
      });
      this.toast('Cita programada correctamente', 'success');
      this.viewCitas();
    } catch(e) { this.toast(e.message, 'error'); }
    this.loading(false);
  },

  async checkInCita(id) {
    this.loading(true);
    try {
      await mApi('POST', `/citas/${id}`, { estado: 'EnPatio', hora_llegada: new Date().toISOString() });
      this.toast('Check-in registrado', 'success');
      this.viewCitaDetail(id);
    } catch(e) { this.toast(e.message, 'error'); }
    this.loading(false);
  },

  async completeCita(id) {
    const evaluacion = prompt('Evalúe al proveedor (1-10):', '8');
    if (!evaluacion || isNaN(evaluacion) || parseInt(evaluacion) < 1 || parseInt(evaluacion) > 10) {
      return this.toast('Evaluación debe ser de 1 a 10', 'error');
    }
    this.loading(true);
    try {
      const now = new Date();
      const hora = now.toTimeString().split(' ')[0];
      await mApi('POST', `/citas/${id}`, {
        estado: 'Completada',
        hora_fin_descargue: hora,
        evaluacion_proveedor: parseInt(evaluacion)
      });
      this.toast('Cita completada con evaluación', 'success');
      this.viewCitas();
    } catch(e) { this.toast(e.message, 'error'); }
    this.loading(false);
  },

                 <div style="font-size:3rem;font-weight:900;color:#0F4C81;line-height:1;">${it.cantidad_total}</div>
              </div>
            </div>
          </div>

          <div class="scanner-card" style="margin-top:15px;background:${prodValidated ? '#f0f9ff' : (locValidated ? '#ecfdf5' : '#fef2f2')};border:2px solid ${prodValidated ? '#0ea5e9' : (locValidated ? '#10b981' : '#ef4444')};padding:15px;border-radius:15px;">
             ${!prodValidated ? `
                <label style="font-size:.75rem;font-weight:800;color:#1e293b;margin-bottom:8px;display:block;text-align:center;text-transform:uppercase;">
                   ${locValidated
                     ? '<span style="color:#059669;"><i class="fa-solid fa-barcode"></i> ESCANEÉ CÓDIGO PRODUCTO</span>'
                     : '<span style="color:#dc2626;"><i class="fa-solid fa-location-dot"></i> ESCANEÉ LA UBICACIÓN</span>'}
                </label>
                <input type="text" id="m-pk-scan" class="m-input-full" placeholder="${locValidated ? 'Código de Barras...' : 'Código de Ubicación...'}" style="font-size:1.2rem;height:55px;text-align:center;letter-spacing:2px;font-weight:700;background:#fff;">
                <div style="margin-top:10px;text-align:center;font-size:.65rem;color:#64748b;font-weight:600;">
                   VERIFIQUE UBICACIÓN Y REFERENCIA ANTES DE SEPARAR
                </div>
             ` : `
                <div style="text-align:center;">
                   <div style="color:#0369a1;font-weight:800;font-size:.9rem;margin-bottom:12px;"><i class="fa-solid fa-circle-check"></i> PRODUCTO VALIDADO</div>
                   <button class="m-btn primary full" style="height:60px;font-size:1.1rem;" onclick="MWMS.confirmarPKActual('${planillaNumero}')">
                      <i class="fa-solid fa-check-double"></i> CONFIRMAR ${it.cantidad_total} UNID.
                   </button>
                   <button class="m-btn secondary full" style="margin-top:12px;" onclick="MWMS.promptPKActualQty('${planillaNumero}')">
                      <i class="fa-solid fa-pen-to-square"></i> CAMBIAR CANTIDAD / FALTANTE
                   </button>
                </div>
             `}
          </div>

          <div style="display:flex;gap:10px;margin-top:20px;">
             <button class="m-btn secondary full" onclick="MWMS.viewPlanilla('${planillaNumero}')"><i class="fa-solid fa-list-ul"></i> Lista de Tareas</button>
          </div>
        </div>`;
      
      const inp = document.getElementById('m-pk-scan');
      if (inp) {
        inp.focus();
        inp.onkeydown = e => {
          if (e.key === 'Enter') {
            const val = inp.value.trim();
            if (!val) return;
            
            if (!locValidated) {
              const targetLoc = (it.ubicacion_codigo || "").toUpperCase();
              const targetId  = (it.ubicacion_id || "").toString();
              if (val.toUpperCase() === targetLoc || val === targetId) {
                 locValidated = true;
                 this.toast("UBICACIÓN VALIDADA", "success");
                 renderContent();
              } else {
                 this.pA(); this.toast("UBICACIÓN INCORRECTA", "error");
                 inp.value = ""; inp.focus();
              }
            } else {
              const targetEan  = (it.producto_ean || "").toString();
              const targetCode = (it.producto_codigo || "").toString();
              if (val === targetEan || val === targetCode) {
                 prodValidated = true;
                 this.toast("PRODUCTO VALIDADO", "success");
                 renderContent();
              } else {
                 this.pA(); this.toast("PRODUCTO INCORRECTO", "error");
                 inp.value = ""; inp.focus();
              }
            }
          }
        };
      }
    };

    renderContent();
  },

  async confirmarPKActual(planillaNumero, qtyTomada = null) {
    const it = this._itemsPlanilla[this._idxActual];
    const qtyActual = qtyTomada !== null ? qtyTomada : it.cantidad_total;
    this.loading(true);
    try {
      await mApi('POST', '/picking/confirmar-consolidado', {
        ids: it.ids,
        cantidad_tomada: qtyActual,
        planilla_numero: planillaNumero
      });
      this.toast("Confirmado " + qtyActual + " und", "success");
      
      // Pasar a la siguiente tarea automáticamente
      const r = await mApi('GET', `/picking/planilla/${planillaNumero}`);
      this._itemsPlanilla = r.data || [];
      const nextIdx = this._itemsPlanilla.findIndex(x => x.cantidad_pick < x.cantidad_total);
      
      if (nextIdx !== -1) {
        this.initPKConsolidado(nextIdx, planillaNumero);
      } else {
        this.toast("¡Planilla Completada!", "success");
        this.viewPlanilla(planillaNumero);
      }
    } catch(e) { this.toast(e.message, "error"); }
    this.loading(false);
  },

  async promptPKActualQty(planillaNumero) {
    const it = this._itemsPlanilla[this._idxActual];
    const qty = prompt(`PRODUCTO CORRECTO.\n\nIngrese cantidad total tomada:\n(Máximo: ${it.cantidad_total})`, it.cantidad_total);
    if (qty === null) return;
    
    const nQty = parseInt(qty);
    if (isNaN(nQty) || nQty < 0) return this.toast("Cantidad inválida", "error");
    if (nQty > it.cantidad_total) return this.toast("No puede ingresar más de lo solicitado ("+it.cantidad_total+")", "error");

    if (nQty < it.cantidad_total) {
      if (!confirm("ESTÁ INGRESANDO UNA CANTIDAD MENOR.\n\nSe generará una NOVEDAD (Faltante).\n¿Desea continuar?")) return;
    }

    this.confirmarPKActual(planillaNumero, nQty);
  },

  async reportPKError(lineaId, ordenId) {
    const causa = prompt("Reportar problema (Ej: Pasillo Obstruido, Stock no físico, Dañado):");
    if (!causa) return;
    this.loading(true);
    try {
      await mApi('POST', `/picking/${ordenId}/marcar-faltante`, { 
        linea_id: lineaId, 
        observacion: causa 
      });
      this.toast("Novedad reportada", "warning");
      this.viewPicking();
    } catch(e) { 
        this.toast(e.message, "error"); 
    } finally {
        this.loading(false);
    }
  },

  async doPKScan(d) {
    const i = document.getElementById('m-pk-scan'); 
    const q = i.value.trim(); 
    if (!q) return;
    i.value = '';
    
    if (q !== d.linea.producto_ean && q !== d.linea.producto_codigo) {
      this.pA(); 
      return this.toast("CÓDIGO INCORRECTO: " + q, "error");
    }
    
    const qty = prompt(`Cantidad confirmada (Esperado: ${d.linea.cantidad_solicitada}):`, d.linea.cantidad_solicitada);
    if (qty === null) return;
    const nQty = parseInt(qty);
    if (isNaN(nQty) || nQty <= 0) return this.toast("Cantidad inválida", "error");

    const ordenId  = d.orden.id;
    const lineaId  = d.linea.id;
    this.loading(true);
    try {
      const r = await mApi('POST', `/picking/${ordenId}/confirmar-linea`, {
        linea_id: lineaId,
        cantidad_tomada: nQty
      });
      if (r.status === 'pending_approval') {
        this.loading(false);
        this._showExpiryModal(r.aprobacion_id, r.message, async () => {
          this.loading(true);
          try {
            await mApi('POST', `/picking/${ordenId}/confirmar-linea`, {
              linea_id: lineaId,
              cantidad_tomada: nQty
            });
            this.toast("Línea confirmada", "success");
            this.goPK(ordenId);
          } catch(e) {
            this.toast(e.message, "error");
          } finally {
            this.loading(false);
          }
        });
        return;
      }
      this.toast("Línea confirmada", "success");
      this.goPK(ordenId);
    } catch(e) {
        this.toast(e.message, "error");
    } finally {
        this.loading(false);
    }
  },

  // ── CERTIFICACIÓN ──
  async viewPacking() {
    this._isPackingView = true;
    await this.viewCert();
    document.getElementById('m-title').textContent='Packing';
    this._isPackingView = false;
  },

  async viewCert() {
    document.getElementById('m-title').textContent=this._isPackingView ? 'Packing' : 'Certificar';
    document.getElementById('m-content').innerHTML='<div class="pull-indicator"><i class="fa-solid fa-spinner fa-spin"></i> Cargando planillas...</div>';
    try {
      const r = await mApi('GET', '/planillas');
      const archivos = (r.data||[]).filter(a => ['Separado','EnCertificacion','EnPicking'].includes(a.estado));
      if (archivos.length === 0) {
        document.getElementById('m-content').innerHTML = '<div class="m-empty"><i class="fa-solid fa-clipboard-check"></i><p>No hay planillas disponibles para certificar</p><small style="color:#94a3b8;">El supervisor debe completar el picking primero</small></div>';
        return;
      }
      
      let planillasDisp = [];
      for (const archivo of archivos) {
        const rd = await mApi('GET', '/planillas/' + archivo.id);
        const pl = (rd.data?.planillas || []).filter(p => p.estado_cert !== 'Completada');
        pl.forEach(p => { p._archivo_id = archivo.id; p._archivo_nombre = archivo.nombre_archivo; });
        planillasDisp = planillasDisp.concat(pl);
      }

      if (planillasDisp.length === 0) {
        document.getElementById('m-content').innerHTML = '<div class="m-empty"><i class="fa-solid fa-clipboard-check"></i><p>Todas las planillas ya fueron certificadas</p></div>';
        return;
      }

      document.getElementById('m-content').innerHTML = `
        <div class="op-view">
          <div style="margin-bottom:12px;">
            <div style="font-size:.75rem;font-weight:700;color:#64748b;margin-bottom:8px;">SELECCIONE PLANILLA A CERTIFICAR</div>
            ${planillasDisp.map(p => `
              <div class="op-card" onclick="MWMS.startCert(${p._archivo_id},'${this.esc(p.numero_planilla)}')" style="cursor:pointer;border-left:4px solid ${p.estado_cert==='EnProceso'?'#f59e0b':'#3d44db'};">
                <div style="display:flex;justify-content:space-between;align-items:center;">
                  <div><div style="font-weight:800;font-size:.9rem;">${this.esc(p.numero_planilla)}</div>
                  <div style="font-size:.7rem;color:#64748b;">${this.esc(p._archivo_nombre)}</div></div>
                  <span class="m-badge ${p.estado_cert==='EnProceso'?'warning':'info'}">${p.estado_cert==='EnProceso'?'En proceso':'Pendiente'}</span>
                </div>
              </div>`).join('')}
          </div>
        </div>`;
    } catch(e) { this.toast(e.message, 'error'); }
  },

  async startCert(archivoId, numeroPlanilla) {
    this.loading(true);
    try {
      const r = await mApi('POST', '/planillas/cert/iniciar', { archivo_id: archivoId, numero_planilla: numeroPlanilla });
      this._op = { cert: r.data };
      this.renderCert();
    } catch(e) { 
        this.toast(e.message, "error"); 
    } finally {
        this.loading(false);
    }
  },

  renderCert() {
    const cert = this._op.cert;
    const detalles = cert.detalles || [];
    const completados = detalles.filter(d => d.es_correcto).length;

    document.getElementById('m-content').innerHTML = `
      <div class="op-view">
        <div class="op-card" style="background:#0f172a;color:#fff;">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
            <div><div style="font-size:.6rem;opacity:.7;">CERTIFICANDO</div><b style="font-size:1.1rem;">${this.esc(cert.numero_planilla)}</b></div>
            <div style="text-align:right;"><div style="font-size:.6rem;opacity:.7;">PROGRESO</div><b>${completados} / ${detalles.length}</b></div>
          </div>
          <div class="m-progress-bar" style="height:6px;background:rgba(255,255,255,.1);"><div class="m-progress-fill" style="width:${(completados/detalles.length)*100}%;background:#10b981;"></div></div>
        </div>

        <div class="scanner-card" style="position:sticky;top:0;z-index:10;box-shadow:0 10px 15px -3px rgba(0,0,0,0.1);">
          <input type="text" id="m-cert-scan" class="m-input-full" placeholder="ESCANEE EAN DEL PRODUCTO..." autocomplete="off">
        </div>

        <div id="m-cert-items" style="margin-top:10px;">
          ${detalles.map(det => `
            <div class="op-card cert-line-item" id="cert-det-${det.id}" style="border-left:4px solid ${det.es_correcto?'#10b981':'#f59e0b'}; opacity:${det.es_correcto?'.6':'1'}">
              <div style="display:flex;justify-content:space-between;align-items:center;">
                <div style="flex:1;">
                   <div style="font-weight:700;font-size:1rem;">${this.esc(det.producto_nombre)}</div>
                   <div style="font-size:.75rem;color:#64748b;">EAN: ${det.producto_codigo||'N/A'}</div>
                </div>
                <div style="text-align:right;">
                   <div style="font-size:1.2rem;font-weight:900;color:${det.es_correcto?'#10b981':'#f59e0b'};">${det.cantidad_certificada}</div>
                   <div style="font-size:.6rem;color:#94a3b8;">CERTIFICADO</div>
                </div>
              </div>
            </div>
          `).join('')}
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:20px;">
          <button class="m-btn secondary full" onclick="MWMS.showFaltantes()"><i class="fa-solid fa-list-check"></i> Faltantes</button>
          <button class="m-btn success full" onclick="MWMS.endCert()"><i class="fa-solid fa-check-double"></i> Finalizar</button>
        </div>
      </div>`;

    const input = document.getElementById('m-cert-scan');
    input.focus();
    input.onkeydown = e => { if(e.key === 'Enter') this.doCertScan(); };
  },

  async doCertScan() {
    const input = document.getElementById('m-cert-scan');
    const ean = input.value.trim();
    input.value = '';
    if(!ean) return;

    this.loading(true);
    try {
      const r = await mApi('POST', `/planillas/cert/${this._op.cert.id}/linea`, { ean: ean, cantidad: 1 });
      this.toast(r.mensaje, r.es_completo ? 'success' : 'info');
      
      const detIdx = this._op.cert.detalles.findIndex(d => d.id === r.det_id);
      if (detIdx !== -1) {
        this._op.cert.detalles[detIdx].cantidad_certificada = r.cantidad_nueva;
        this._op.cert.detalles[detIdx].es_correcto = r.es_completo;
        this.renderCert();
      }
    } catch(e) {
      this.toast(e.message, 'error');
      this.pA();
    } finally {
      this.loading(false);
    }
  },

  showFaltantes() {
    const faltantes = this._op.cert.detalles.filter(d => !d.es_correcto);
    if (faltantes.length === 0) return this.toast("¡Carga completa!", "success");
    
    let html = `<div style="text-align:left;">`;
    faltantes.forEach(f => {
      html += `<div style="padding:10px;border-bottom:1px solid #eee;">
        <b>${this.esc(f.producto_nombre)}</b><br>
        <small>Faltan: ${f.cantidad_esperada - f.cantidad_certificada} unidades</small>
      </div>`;
    });
    html += `</div>`;
    
    WMS.showModal('Items Pendientes', html); // Note: MWMS uses context-dependent modals, but here we'll use a generic alert for simplicity if WMS is not globally accessible as such
    // Better: use SweetAlert if available, but let's stick to MWMS style
    alert("PENDIENTES:\n" + faltantes.map(f => `- ${f.producto_nombre}: Faltan ${f.cantidad_esperada - f.cantidad_certificada}`).join("\n"));
  },

  async endCert() {
    if (!confirm('¿Finalizar certificación? Los items sin contar quedarán como pendientes.')) return;
    this.loading(true);
    try {
      const d = this._op;
      const r = await mApi('POST', `/planillas/cert/${d.cert.id}/finalizar`, {});
      this.toast(r.hay_novedad ? '⚠ Certificación con novedades' : '✓ Certificación completada', r.hay_novedad ? 'warning' : 'success');
      this.showHome();
    } catch(e) { 
        this.toast(e.message, "error"); 
    } finally {
        this.loading(false);
    }
  },

  openSearch(cb, t, mode='prod') {
    this._sCb=cb; this._sMode=mode;
    document.getElementById('m-modal-search-title').textContent=t;
    document.getElementById('m-modal-search').style.display='flex';
    const i=document.getElementById('m-search-input'); i.value=''; i.focus();
    document.getElementById('m-search-results').innerHTML='';
    // Reset handler so it gets the new mode each time
    i._h=0;
    if(!i._h){ i._h=1; let tm; i.oninput=e=>{ clearTimeout(tm); const q=e.target.value.trim(); if(q.length<2)return; tm=setTimeout(async()=>{
      const mode=this._sMode;
      if(mode==='prov') {
        // Search suppliers
        const r=await mApi('GET','/param/proveedores');
        const list=(r.data||[]).filter(p=>(p.razon_social||'').toLowerCase().includes(q.toLowerCase())||(p.nit||'').includes(q));
        document.getElementById('m-search-results').innerHTML=list.length===0?'<div style="padding:10px;color:#94a3b8;">Sin resultados</div>':list.map(p=>`<div class="search-result-item" onclick="MWMS.selP(${JSON.stringify(p).replace(/"/g,'&quot;')})"><b>${this.esc(p.razon_social)}</b><br><small>NIT: ${p.nit||'N/A'}</small></div>`).join('');
      } else {
        // Search products
        const r=await mApi('GET','/odc/buscar-producto?q='+encodeURIComponent(q));
        document.getElementById('m-search-results').innerHTML=(r.data||[]).map(p=>`<div class="search-result-item" onclick="MWMS.selP(${JSON.stringify(p).replace(/"/g,'&quot;')})"><b>${this.esc(p.nombre)}</b><br><small>COD: ${p.codigo_interno}</small></div>`).join('');
      }
    },400);};}
  },
  selP(p){ this.closeSearch(); this._sCb(p); },
  closeSearch(){ document.getElementById('m-modal-search').style.display='none'; },
  openDV(cb){ this._dCb=cb; document.getElementById('m-modal-date').style.display='flex'; const d1=document.getElementById('m-date-1'), d2=document.getElementById('m-date-2'), b=document.getElementById('m-btn-date-confirm'); d1.value=''; d2.value=''; b.disabled=1; const chk=()=>{b.disabled=!(d1.value&&d1.value===d2.value);}; d1.onchange=chk; d2.onchange=chk; },
  confirmDateVerify(){ this.closeDateVerify(); this._dCb(document.getElementById('m-date-1').value); },
  closeDateVerify(){ document.getElementById('m-modal-date').style.display='none'; },
  pQty(p,cb){ const q=prompt("Cantidad para "+p.nombre+":","1"); if(parseInt(q)>0)cb(parseInt(q)); else this.toast("Invalida","error"); },
  _loadTm: null,
  loading(s){ 
      let l=document.getElementById('m-loading'); 
      if(s){
          if(!l) {
              document.body.insertAdjacentHTML('beforeend',`
                <div id="m-loading" style="position:fixed;inset:0;background:rgba(255,255,255,.7);z-index:90000;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:2rem;color:#0F4C81;">
                  <i class="fa-solid fa-spinner fa-spin"></i>
                  <p style="font-size:.8rem;color:#64748b;margin-top:10px;font-weight:700;">PROCESANDO...</p>
                  <button id="m-loading-close" onclick="MWMS.loading(false)" 
                    style="display:none;margin-top:20px;background:#f1f5f9;border:1px solid #cbd5e1;padding:8px 16px;border-radius:8px;font-size:.7rem;color:#475569;font-weight:700;cursor:pointer;">
                    FORZAR CIERRE (ESC)
                  </button>
                </div>`);
          }
          // Temporizador de seguridad: si tarda > 5s, mostrar botón de cierre
          clearTimeout(this._loadTm);
          this._loadTm = setTimeout(() => {
              const btn = document.getElementById('m-loading-close');
              if (btn) btn.style.display = 'block';
          }, 5000);
          // Si tarda > 30s, cerrar solo
          setTimeout(() => { if (document.getElementById('m-loading')) this.loading(false); }, 30000);
      } else {
          if(l) l.remove();
          clearTimeout(this._loadTm);
      }
  },
  toast(m,t='info'){ const c=document.getElementById('m-toast'), e=document.createElement('div'); e.className='m-toast-item '+t; e.innerHTML=m; c.appendChild(e); setTimeout(()=>{e.style.opacity='0';setTimeout(()=>e.remove(),500);},3000); },
  esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); },
  showNotif() { this.viewNotifications(); },

    _showExpiryModal(aprobacionId, message, onApproved) {
      this._expiryAprobacionId = aprobacionId;
      this._expiryOnApproved   = onApproved;
      document.getElementById('m-expiry-msg').textContent = message;
      const modal = document.getElementById('m-expiry-modal');
      modal.style.display = 'flex';
      this._expiryPollTimer = setInterval(() => this._pollExpiry(), 10000);
    },

    async _pollExpiry() {
      if (!this._expiryAprobacionId) return;
      try {
        const r = await mApi('GET', '/aprobaciones/' + this._expiryAprobacionId + '/estado');
        if (r.data?.estado === 'aprobada') {
          this._closeExpiryModal();
          this.toast('Solicitud aprobada. Continuando...', 'success');
          if (this._expiryOnApproved) await this._expiryOnApproved();
        } else if (r.data?.estado === 'rechazada') {
          this._closeExpiryModal();
          this.toast('Solicitud rechazada por el supervisor.', 'error');
        }
      } catch(_) {}
    },

    _closeExpiryModal() {
      clearInterval(this._expiryPollTimer);
      this._expiryPollTimer    = null;
      this._expiryAprobacionId = null;
      this._expiryOnApproved   = null;
      const modal = document.getElementById('m-expiry-modal');
      if (modal) modal.style.display = 'none';
    },

    async _cancelarExpiry() {
      if (!this._expiryAprobacionId) return;
      try {
        await mApi('DELETE', '/aprobaciones/' + this._expiryAprobacionId);
      } catch(_) {}
      this._closeExpiryModal();
      this.toast('Solicitud cancelada', 'info');
    },
};

document.addEventListener('DOMContentLoaded',()=>{
  MWMS.init();
  const locCodInput = document.getElementById('m-loc-codigo');
  if (locCodInput) {
    let timeout;
    locCodInput.addEventListener('input', function() {
      this.value = this.value.toUpperCase().replace(/[^A-Z0-9\/\-]/g, '');
      clearTimeout(timeout);
      timeout = setTimeout(() => MWMS.validateLocationCode(this.value), 600);
    });
    locCodInput.addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        clearTimeout(timeout);
        MWMS.validateLocationCode(this.value);
      }
    });
  }
});
</script>

<!-- Expiry waiting modal -->
<div id="m-expiry-modal" style="display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.6);
  align-items:center;justify-content:center;">
  <div style="background:#fff;border-radius:12px;padding:24px;max-width:320px;width:90%;text-align:center;">
    <div style="font-size:2rem;margin-bottom:12px;">⏳</div>
    <div style="font-weight:700;font-size:1rem;margin-bottom:6px;">Esperando aprobación del supervisor</div>
    <div id="m-expiry-msg" style="font-size:.85rem;color:#64748b;margin-bottom:16px;"></div>
    <button onclick="MWMS._cancelarExpiry()" style="background:#ef4444;color:#fff;border:none;
      border-radius:6px;padding:8px 16px;cursor:pointer;font-size:.85rem;">
      Cancelar solicitud
    </button>
  </div>
</div>
</body>
</html>
